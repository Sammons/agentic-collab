services:
  orchestrator:
    build:
      context: .
    ports:
      - "3000:3000"
    volumes:
      - orchestrator-data:/data/.agentic-collab
      - ${HOME}/.config/agentic-collab:/config/agentic-collab
      # PERSONAS_HOST_DIR should point to the canonical personas directory.
      # Default ./persistent-agents works as a directory or symlink to the real location.
      - ${PERSONAS_HOST_DIR:-./persistent-agents}:/app/persistent-personas
      # Dev: bind-mount src for hot-reload without rebuild. Dockerfile COPY
      # still bakes src/ into the image for prod/CI (self-contained deploys).
      - ./src:/app/src
      # Q8 crash recovery: worktrees are created on the HOST by the proxy, so
      # ephemeral-template `cwd_base` directories are NOT visible from inside
      # this container. Per-instance cleanup probes route through the proxy
      # and work without a mount, but the orphaned-worktree SWEEP stats bases
      # locally — without a mount it logs a one-time warning per base and
      # skips. To enable the sweep for a base, bind-mount it read-only at the
      # same path, e.g.:
      #   - /home/you/worktree-base:/home/you/worktree-base:ro
    # host.docker.internal resolves to the host on Docker Desktop (macOS/Windows).
    # On Linux, this requires Docker Engine 20.10+ with the host-gateway feature.
    # If host-gateway is unavailable, use --network=host or set
    # PROXY_HOST=172.17.0.1:3100 (docker0 bridge gateway) on the proxy instead.
    user: "${UID:-1000}:${GID:-1000}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - AGENTIC_COLLAB_CONFIG_DIR=/config/agentic-collab
      - PERSONAS_DIR=/app/persistent-personas
      - PERSONAS_HOST_DIR=${PERSONAS_HOST_DIR:-}
      - ORCHESTRATOR_HOST=${ORCHESTRATOR_HOST:-http://localhost:3000}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      # Whisper STT (OpenAI-compatible). Set WHISPER_URL to enable a
      # batch PTT path alongside ElevenLabs. Optional API key; optional
      # model + language hint. STT_PROVIDER pins the dashboard default
      # when both providers are configured (auto|elevenlabs|whisper).
      - WHISPER_URL=${WHISPER_URL:-}
      - WHISPER_API_KEY=${WHISPER_API_KEY:-}
      - WHISPER_MODEL=${WHISPER_MODEL:-}
      - WHISPER_LANGUAGE=${WHISPER_LANGUAGE:-}
      - STT_PROVIDER=${STT_PROVIDER:-auto}
      # Claude Code --add-dir path for persistent personas / knowledge
      - CLAUDE_HOME_DIR=${CLAUDE_HOME_DIR:-/home/sammons/Desktop/claude-home}
    labels:
      io.agentic-collab.role: orchestrator
    restart: unless-stopped

volumes:
  orchestrator-data:

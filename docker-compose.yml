services:
  orchestrator:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - orchestrator-data:/data/.agentic-collab
    # host.docker.internal resolves to the host on Docker Desktop (macOS/Windows).
    # On Linux, this requires Docker Engine 20.10+ with the host-gateway feature.
    # If host-gateway is unavailable, use --network=host or set
    # PROXY_HOST=172.17.0.1:3100 (docker0 bridge gateway) on the proxy instead.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ORCHESTRATOR_SECRET=${ORCHESTRATOR_SECRET:-}
      - ORCHESTRATOR_HOST=${ORCHESTRATOR_HOST:-http://localhost:3000}
    restart: unless-stopped

volumes:
  orchestrator-data:

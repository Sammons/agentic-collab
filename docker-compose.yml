services:
  orchestrator:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - orchestrator-data:/data/.agentic-collab
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - ORCHESTRATOR_SECRET=${ORCHESTRATOR_SECRET:-}
      - ORCHESTRATOR_HOST=${ORCHESTRATOR_HOST:-http://localhost:3000}
    restart: unless-stopped

volumes:
  orchestrator-data:

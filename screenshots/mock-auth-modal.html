<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Collab — Auth Modal</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #d18616;
    --purple: #bc8cff;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* -- Header -- */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 16px; font-weight: 600; }
  .conn-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
  }
  .conn-dot.connected { background: var(--green); }

  /* -- Layout -- */
  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 49px);
  }

  /* -- Agent Grid -- */
  .agent-list {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  /* -- Create Form -- */
  .create-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .create-form-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .create-form-body {
    display: none;
  }

  /* -- Thread Panel -- */
  .thread-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .thread-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .thread-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .thread-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
  }

  /* -- Auth Modal -- */
  .auth-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10001;
  }
  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    max-width: 380px;
    width: 90%;
    box-shadow: var(--shadow);
  }
  .auth-box h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .auth-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.5; }
  .auth-box input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
  }
  .auth-box input:focus { border-color: var(--accent); }
  .auth-box .auth-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .auth-box button {
    padding: 8px 20px;
    border-radius: 6px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .auth-box button.primary { background: var(--accent); color: #fff; }
  .auth-box button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .auth-box button:hover { opacity: 0.9; }
</style>
</head>
<body>
<header>
  <h1>Agentic Collab</h1>
  <div class="conn-status">
    <div class="conn-dot"></div>
    <span>Disconnected</span>
  </div>
</header>
<div class="layout">
  <div class="agent-list">
    <div class="create-form">
      <div class="create-form-toggle">
        <span>+ New Agent</span>
        <span class="chevron">&#9656;</span>
      </div>
      <div class="create-form-body"></div>
    </div>
  </div>
  <div class="thread-panel">
    <div class="thread-header">Select an agent</div>
    <div class="thread-messages">
      <div class="thread-empty">Select an agent to view messages</div>
    </div>
  </div>
</div>

<!-- Auth overlay -->
<div class="auth-overlay">
  <div class="auth-box">
    <h2>Agentic Collab</h2>
    <p>Enter your orchestrator token to connect, or skip for dev mode (no auth).</p>
    <input type="password" placeholder="Orchestrator token" autocomplete="off" />
    <div class="auth-actions">
      <button class="secondary">Dev Mode</button>
      <button class="primary">Connect</button>
    </div>
  </div>
</div>
</body>
</html>

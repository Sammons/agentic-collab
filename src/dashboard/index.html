      e.stopPropagation();
      const btn = e.target;
      navigator.clipboard.writeText(displayMsg).then(() => {
        btn.textContent = '\u2713';
        setTimeout(() => { btn.innerHTML = '&#128203;'; }, 1500);
      }).catch(() => {
        btn.textContent = '\u2717';
        setTimeout(() => { btn.innerHTML = '&#128203;'; }, 1500);
      });
    });
    return div;
  }

  function getActiveTopic() {
    if (!state.selected) return 'general';
    return state.topicPerAgent[state.selected] || 'general';
  }

  function setActiveTopic(topic) {
    if (state.selected) state.topicPerAgent[state.selected] = topic;
  }

  function renderTopicBreadcrumbs() {
    const container = document.getElementById('topicBreadcrumbs');
    if (!state.selected) { container.innerHTML = ''; return; }
    const thread = state.threads[state.selected] || [];
    // Always start with "general", then unique topics from thread (most recent first), capped at 15
    const seen = new Set(['general']);
    const topics = ['general'];
    for (let i = thread.length - 1; i >= 0 && topics.length < 15; i--) {
      const t = thread[i].topic;
      if (t && !seen.has(t)) { seen.add(t); topics.push(t); }
    }
    const current = getActiveTopic();
    container.innerHTML = topics.map(t =>
      `<span class="topic-chip${t === current ? ' active' : ''}" data-topic="${esc(t)}">${esc(t)}</span>`
    ).join('');
  }

  // Prevent mousedown on chips from stealing focus/closing mobile keyboard
  document.getElementById('topicBreadcrumbs').addEventListener('mousedown', (e) => {
    e.preventDefault();
  });
  document.getElementById('topicBreadcrumbs').addEventListener('click', (e) => {
    const chip = e.target.closest('.topic-chip');
    if (!chip) return;
    setActiveTopic(chip.dataset.topic);
    renderTopicBreadcrumbs();
    document.getElementById('msgInput')?.focus();
  });

  function updatePageTitle() {
    const totalUnread = Object.values(state.unread).reduce((sum, n) => sum + (n || 0), 0);
    const prefix = totalUnread > 0 ? `(${totalUnread}) ` : '';
    if (state.selected) {
      document.title = `${prefix}${state.selected} — Agentic Collab`;
    } else {
      document.title = `${prefix}Dashboard — Agentic Collab`;
    }
  }

  function selectAgent(name) {
    state.editingPersona = false;
    // Save draft for previous agent
    const input = document.getElementById('msgInput');
    if (state.selected && input) {
      const text = input.value;
      if (text) state.drafts[state.selected] = text;
      else delete state.drafts[state.selected];
    }
    state.selected = name;
    state.unread[name] = 0;
    updatePageTitle();
    // Auto-select most recent topic for this agent if none saved
    if (!state.topicPerAgent[name]) {
      const thread = state.threads[name] || [];
      for (let i = thread.length - 1; i >= 0; i--) {
        if (thread[i].topic) { state.topicPerAgent[name] = thread[i].topic; break; }
      }
    }
    // Persist read cursor on server so unread counts survive refresh
    fetch('/api/dashboard/read-cursor', {
      method: 'PUT',
      headers: { 'content-type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ agent: name }),
    }).catch(err => console.warn('Read cursor update failed:', err));
    // Mobile: show thread panel BEFORE rendering so scrollHeight is accurate
    document.querySelector('.layout').classList.add('mobile-thread');
    // Preserve current tab (messages/persona/watch) when switching agents
    renderAgents();
    renderThread();
    // Restore draft for new agent (re-query since renderThread rebuilds DOM)
    const freshInput = document.getElementById('msgInput');
    if (freshInput) {
      freshInput.value = state.drafts[name] || '';
    }
    updateSendability();
    freshInput?.focus();
  }

  function mobileBack() {
    document.querySelector('.layout').classList.remove('mobile-thread');
  }

  async function fetchPersona(name) {
    const cached = state.personaCache[name];
    if (cached && Date.now() - cached.fetched < 30000) return cached.data;
    try {
      const token = getToken();
      const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
      const res = await fetch(`/api/personas/${encodeURIComponent(name)}`, { headers });
      if (res.status === 404) {
        state.personaCache[name] = { data: null, fetched: Date.now() };
        return null;
      }
      if (!res.ok) return null;
      const data = await res.json();
      state.personaCache[name] = { data, fetched: Date.now() };
      return data;
    } catch {
      return null;
    }
  }

  const FM_CONFIG_LABELS = {
    engine: 'Engine', model: 'Model', thinking: 'Thinking',
    cwd: 'Working Dir', proxy_host: 'Proxy Host', permissions: 'Permissions',
    group: 'Group',
  };
  const FM_HOOK_FIELDS = ['start', 'resume', 'exit', 'compact', 'interrupt', 'submit'];
  const FM_ALL_KNOWN = new Set([...Object.keys(FM_CONFIG_LABELS), ...FM_HOOK_FIELDS]);

  /** Format a frontmatter value for display. Handles structured hook objects. */
  function fmtFmValue(val) {
    if (val == null) return '';
    if (typeof val === 'string') return val;
    if (typeof val === 'object') {
      if ('preset' in val) {
        let s = 'preset: ' + val.preset;
        if (val.options) s += ' (' + Object.entries(val.options).map(([k,v]) => k + '=' + v).join(', ') + ')';
        return s;
      }
      if ('shell' in val) {
        let s = 'shell: ' + val.shell;
        if (val.env) s += ' [env: ' + Object.entries(val.env).map(([k,v]) => k + '=' + v).join(', ') + ']';
        return s;
      }
      if ('send' in val && Array.isArray(val.send)) {
        return 'send: ' + val.send.map(a => {
          const type = 'keystroke' in a ? 'keystroke' : 'text' in a ? 'text' : 'paste';
          const v = a[type];
          return type + ':' + v + (a.post_wait_ms ? ' (+' + a.post_wait_ms + 'ms)' : '');
        }).join(' → ');
      }
      if ('keystrokes' in val && Array.isArray(val.keystrokes)) {
        return 'keystrokes: ' + val.keystrokes.map(a => {
          const type = 'keystroke' in a ? 'keystroke' : 'text' in a ? 'text' : 'paste';
          return type + ':' + a[type];
        }).join(' → ');
      }
      // Pipeline steps array
      if (Array.isArray(val)) {
        return val.map(s => s.type === 'shell' ? s.command : s.type === 'keystrokes' ? 'keys' : s.type).join(' → ');
      }
      return JSON.stringify(val);
    }
    return String(val);
  }

  /** Render pipeline steps as YAML lines at a given indent. */
  function renderPipelineSteps(lines, steps, indent) {
    const pad = ' '.repeat(indent);
    for (const step of steps) {
      if (step.type === 'shell') {
        lines.push(pad + '- shell: ' + step.command);
      } else if (step.type === 'keystroke') {
        lines.push(pad + '- keystroke: ' + step.key);
      } else if (step.type === 'keystrokes' && Array.isArray(step.actions)) {
        lines.push(pad + '- keystrokes:');
        for (const a of step.actions) {
          const type = 'keystroke' in a ? 'keystroke' : 'text' in a ? 'text' : 'paste';
          lines.push(pad + '  - ' + type + ': ' + a[type] + (a.post_wait_ms ? ' (+' + a.post_wait_ms + 'ms)' : ''));
        }
      } else if (step.type === 'capture') {
        lines.push(pad + '- capture:');
        lines.push(pad + '    lines: ' + step.lines);
        lines.push(pad + '    regex: ' + step.regex);
        lines.push(pad + '    var: ' + step.var);
      } else if (step.type === 'wait') {
        lines.push(pad + '- wait: ' + step.ms);
      }
    }
  }

  /** Render a frontmatter object as YAML text. Handles nested objects and arrays. */
  function fmToYaml(fm) {
    const lines = [];
    for (const [key, val] of Object.entries(fm)) {
      if (val == null || val === '') continue;
      if (typeof val === 'string' || typeof val === 'number' || typeof val === 'boolean') {
        lines.push(key + ': ' + val);
      } else if (Array.isArray(val)) {
        // Top-level array — pipeline steps (e.g. exit:, start: with pipeline format)
        lines.push(key + ':');
        renderPipelineSteps(lines, val, 2);
      } else if (typeof val === 'object') {
        lines.push(key + ':');
        for (const [sk, sv] of Object.entries(val)) {
          if (sv == null) continue;
          if (Array.isArray(sv)) {
            // Array inside object — could be custom_buttons entries or send actions
            lines.push('  ' + sk + ':');
            if (sv.length > 0 && sv[0] && typeof sv[0] === 'object' && 'type' in sv[0]) {
              // Pipeline steps (custom_buttons values)
              renderPipelineSteps(lines, sv, 4);
            } else {
              for (const item of sv) {
                if (typeof item === 'object') {
                  const entries = Object.entries(item);
                  if (entries.length > 0) {
                    lines.push('    - ' + entries[0][0] + ': ' + entries[0][1]);
                    for (let i = 1; i < entries.length; i++) {
                      lines.push('      ' + entries[i][0] + ': ' + entries[i][1]);
                    }
                  }
                } else {
                  lines.push('    - ' + item);
                }
              }
            }
          } else if (typeof sv === 'object' && !Array.isArray(sv)) {
            lines.push('  ' + sk + ':');
            for (const [ssk, ssv] of Object.entries(sv)) {
              lines.push('    ' + ssk + ': ' + ssv);
            }
          } else {
            lines.push('  ' + sk + ': ' + sv);
          }
        }
      }
    }
    return lines.join('\n');
  }

  async function renderPersona() {
    const panel = document.getElementById('personaPanel');
    if (!state.selected) return;
    panel.innerHTML = '<div class="persona-empty">Loading…</div>';
    const data = await fetchPersona(state.selected);
    if (state.threadView !== 'persona' || !state.selected) return;
    if (!data) {
      panel.innerHTML = '<div class="persona-empty">No persona defined for this agent.<br>Create <code>persistent-agents/' + esc(state.selected) + '.md</code> to add one.</div>';
      return;
    }
    let html = '<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="clear-chat-btn" id="editPersonaBtn">Edit</button></div>';
    if (data.hostname || data.filePath) {
      html += '<dl class="persona-meta">';
      if (data.hostname) html += '<dt>Host</dt><dd>' + esc(data.hostname) + '</dd>';
      if (data.filePath) html += '<dt>File</dt><dd>' + esc(data.filePath) + '</dd>';
      html += '</dl>';
    }
    const fm = data.frontmatter;
    if (fm && Object.keys(fm).length > 0) {
      html += '<details class="persona-fm-details"><summary>Frontmatter</summary><pre class="persona-yaml">' + esc(fmToYaml(fm)) + '</pre></details>';
    }
    if (data.body) {
      html += '<div class="persona-body">' + renderMarkdown(esc(data.body)) + '</div>';
    }
    panel.innerHTML = html || '<div class="persona-empty">Persona file is empty.</div>';
    const editBtn = document.getElementById('editPersonaBtn');
    if (editBtn) {
      editBtn.onclick = () => enterPersonaEdit(state.selected, data.content);
    }
  }

  // ── Reminders View ──

  async function renderReminders() {
    const panel = document.getElementById('reminderPanel');
    if (!state.selected) return;
    const agent = state.selected;
    panel.innerHTML = '<div class="reminder-empty">Loading...</div>';
    try {
      const res = await fetch(`/api/reminders?agent=${encodeURIComponent(agent)}`, {
        headers: authHeaders(),
      });
      if (state.selected !== agent || state.threadView !== 'reminders') return;
      if (!res.ok) {
        panel.innerHTML = '<div class="reminder-empty">Failed to load reminders</div>';
        return;
      }
      const reminders = await res.json();
      const pendingReminders = reminders
        .filter(r => r.status === 'pending')
        .sort((a, b) => a.sortOrder - b.sortOrder);
      const completedReminders = reminders
        .filter(r => r.status === 'completed')
        .sort((a, b) => (b.completedAt || '').localeCompare(a.completedAt || ''));

      const renderReminderCard = (r, opts = {}) => {
        const { isActive = false, prevPending = null, nextPending = null } = opts;
        const classes = ['reminder-item'];
        if (isActive) classes.push('active');
        if (r.status === 'completed') classes.push('completed');

        const cadenceLabel = r.cadenceMinutes >= 60
          ? `every ${Math.round(r.cadenceMinutes / 60)}h`
          : `every ${r.cadenceMinutes}m`;
        const createdByHtml = r.createdBy
          ? `<span>by ${esc(r.createdBy)}</span>`
          : '';
        const completedHtml = r.completedAt
          ? `<span>completed ${esc(new Date(r.completedAt).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }))}</span>`
          : '';

        let actionBtns = '';
        if (r.status === 'pending') {
          actionBtns += `<button class="complete" data-action="complete" data-id="${r.id}" title="Complete">\u2713</button>`;
          actionBtns += `<button data-action="edit" data-id="${r.id}" data-prompt="${esc(r.prompt)}" data-cadence="${r.cadenceMinutes}" data-skip-if-active="${r.skipIfActive ? '1' : '0'}" title="Edit">\u270E</button>`;
        }
        if (prevPending && r.status === 'pending') {
          actionBtns += `<button data-action="move-up" data-id="${r.id}" data-swap="${prevPending.id}" title="Move up">\u2191</button>`;
        }
        if (nextPending && r.status === 'pending') {
          actionBtns += `<button data-action="move-down" data-id="${r.id}" data-swap="${nextPending.id}" title="Move down">\u2193</button>`;
        }
        actionBtns += `<button class="danger" data-action="delete" data-id="${r.id}" title="Delete">\u00d7</button>`;

        return `<div class="${classes.join(' ')}">
          <div class="reminder-content">
            <div class="reminder-prompt">${isActive ? '\u25b6 ' : ''}${esc(r.prompt)}</div>
            <div class="reminder-meta">
              <span>${cadenceLabel}</span>
              ${r.skipIfActive ? '<span style="font-size:11px;color:var(--yellow,#d29922);font-weight:600">skip if active</span>' : ''}
              <span class="reminder-badge ${isActive ? 'active' : r.status}">${isActive ? 'active' : r.status === 'pending' ? 'queued' : r.status}</span>
              ${createdByHtml}
              ${completedHtml}
            </div>
          </div>
          <div class="reminder-actions">${actionBtns}</div>
        </div>`;
      };

      // Build the form
      let html = `<div class="reminder-add-form">
        <textarea id="reminderPrompt" placeholder="Reminder prompt..." rows="2"></textarea>
        <div class="reminder-form-row">
          <input type="number" id="reminderCadence" min="5" placeholder="Minutes" value="30" />
          <span style="color:var(--text-dim);font-size:12px">min cadence</span>
          <label style="display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-dim);cursor:pointer;margin-left:4px"><input type="checkbox" id="reminderSkipIfActive" /> Skip if active</label>
          <button id="reminderAddBtn">Add</button>
        </div>
      </div>`;

      if (pendingReminders.length === 0 && completedReminders.length === 0) {
        html += '<div class="reminder-empty">No reminders for this agent</div>';
      } else {
        if (pendingReminders.length > 0) {
          for (let i = 0; i < pendingReminders.length; i++) {
            const r = pendingReminders[i];
            html += renderReminderCard(r, {
              isActive: i === 0,
              prevPending: pendingReminders[i - 1] || null,
              nextPending: pendingReminders[i + 1] || null,
            });
          }
        }

        if (completedReminders.length > 0) {
          html += '<div class="reminder-section-label">Recently completed</div>';
          for (const r of completedReminders) {
            html += renderReminderCard(r);
          }
        }
      }

      panel.innerHTML = html;

      // Add reminder handler
      const addBtn = document.getElementById('reminderAddBtn');
      if (addBtn) {
        addBtn.onclick = async () => {
          const prompt = document.getElementById('reminderPrompt').value.trim();
          const cadence = parseInt(document.getElementById('reminderCadence').value, 10);
          const skipIfActive = document.getElementById('reminderSkipIfActive').checked;
          if (!prompt) return;
          try {
            await fetch('/api/reminders', {
              method: 'POST',
              headers: authHeaders(),
              body: JSON.stringify({
                agentName: state.selected,
                prompt,
                cadenceMinutes: cadence || 30,
                skipIfActive,
              }),
            });
            renderReminders();
          } catch (err) {
            console.error('Add reminder failed:', err);
          }
        };
      }

      // Action button handlers (complete, delete, move)
      panel.querySelectorAll('.reminder-actions button[data-action]').forEach(btn => {
        btn.onclick = async () => {
          const action = btn.dataset.action;
          const id = btn.dataset.id;
          try {
            if (action === 'complete') {
              await fetch(`/api/reminders/${id}/complete`, {
                method: 'POST',
                headers: authHeaders(),
              });
            } else if (action === 'delete') {
              await fetch(`/api/reminders/${id}`, {
                method: 'DELETE',
                headers: authHeaders(),
              });
            } else if (action === 'edit') {
              const oldPrompt = btn.dataset.prompt;
              const oldCadence = parseInt(btn.dataset.cadence, 10);
              const oldSkip = btn.dataset.skipIfActive === '1';

              const overlay = document.createElement('div');
              overlay.className = 'reminder-edit-overlay';
              overlay.innerHTML = `
                <div class="reminder-edit-modal">
                  <textarea id="editReminderPrompt">${esc(oldPrompt)}</textarea>
                  <div class="edit-row">
                    <input type="number" id="editReminderCadence" value="${oldCadence}" min="5" />
                    <span style="font-size:13px;color:var(--text-dim)">min cadence</span>
                  </div>
                  <div class="edit-row">
                    <label><input type="checkbox" id="editSkipIfActive" ${oldSkip ? 'checked' : ''} /> Skip if agent is active</label>
                  </div>
                  <div class="actions">
                    <button class="cancel" id="editReminderCancel">Cancel</button>
                    <button class="save" id="editReminderSave">Save</button>
                  </div>
                </div>
              `;
              document.body.appendChild(overlay);

              overlay.querySelector('#editReminderCancel').onclick = () => overlay.remove();
              overlay.addEventListener('pointerdown', (e) => { if (e.target === overlay) overlay.remove(); });

              overlay.querySelector('#editReminderSave').onclick = async () => {
                const newPrompt = overlay.querySelector('#editReminderPrompt').value.trim();
                const newCadence = parseInt(overlay.querySelector('#editReminderCadence').value, 10);
                const newSkip = overlay.querySelector('#editSkipIfActive').checked;
                if (!newPrompt) return;
                await fetch(`/api/reminders/${id}`, {
                  method: 'PATCH',
                  headers: authHeaders(),
                  body: JSON.stringify({
                    prompt: newPrompt,
                    cadenceMinutes: isNaN(newCadence) ? undefined : newCadence,
                    skipIfActive: newSkip,
                  }),
                });
                overlay.remove();
                renderReminders();
              };

              setTimeout(() => overlay.querySelector('#editReminderPrompt').focus(), 50);
              return;
            } else if (action === 'move-up' || action === 'move-down') {
              const swapId = btn.dataset.swap;
              await fetch('/api/reminders/swap', {
                method: 'POST',
                headers: authHeaders(),
                body: JSON.stringify({ a: parseInt(id, 10), b: parseInt(swapId, 10) }),
              });
            }
            renderReminders();
          } catch (err) {
            console.error('Reminder action failed:', err);
          }
        };
      });
    } catch (err) {
      console.error('Reminder load failed:', err);
      panel.innerHTML = '<div class="reminder-empty">Failed to load reminders</div>';
    }
  }

  // ── Watch View ──

  async function fetchPaneOutput(agentName) {
    try {
      const resp = await fetch(`/api/agents/${encodeURIComponent(agentName)}/peek`, {
        headers: getToken() ? { 'Authorization': `Bearer ${getToken()}` } : {},
      });
      if (!resp.ok) return null;
      const data = await resp.json();
      return data.output ?? null;
    } catch { return null; }
  }

  function startWatchPolling() {
    const panel = document.getElementById('watchPanel');
    if (!state.selected) return;

    const keyButtons = [
      { label: '\u2191', key: 'Up' },
      { label: '\u2193', key: 'Down' },
      { label: '\u2190', key: 'Left' },
      { label: '\u2192', key: 'Right' },
      { label: '\u232b', key: 'BSpace' },
      { label: 'Enter', key: 'Enter' },
      { label: 'Esc', key: 'Escape' },
      { label: 'Tab', key: 'Tab' },
      { label: 'S-Tab', key: 'S-Tab' },
      { label: 'Space', key: 'Space' },
      { label: 'C-c', key: 'C-c' },
      { label: 'C-x', key: 'C-x' },
      { label: 'C-z', key: 'C-z' },
      { label: 'y', key: 'y' },
      { label: 'n', key: 'n' },
      { label: 'q', key: 'q' },
    ];

    const keysHtml = keyButtons.map(b =>
      `<button data-key="${b.key}" title="Send ${b.key}">${b.label}</button>`
    ).join('');

    panel.innerHTML = `
      <div class="watch-output"><div class="watch-status">Connecting...</div></div>
      <div class="watch-keys">${keysHtml}<button class="watch-resize-btn" title="Resize tmux pane to match viewport">\u2922 Resize</button></div>
      <div class="watch-type">
        <input type="text" class="watch-type-input" placeholder="Type literal text..." />
        <button class="watch-type-send" title="Send text (no Enter)">Send</button>
        <button class="watch-type-enter" title="Send text + Enter">Send+\u21b5</button>
      </div>
    `;

    const outputEl = panel.querySelector('.watch-output');

    // Key button handlers
    panel.querySelector('.watch-keys').addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-key]');
      if (!btn || !state.selected) return;
      const key = btn.dataset.key;
      try {
        await fetch(`/api/agents/${encodeURIComponent(state.selected)}/keys`, {
          method: 'POST',
          headers: { 'content-type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ keys: key }),
        });
      } catch (err) {
        console.error('[watch] Key send failed:', err);
      }
    });

    // Resize button handler
    panel.querySelector('.watch-resize-btn').addEventListener('click', async () => {
      if (!state.selected) return;
      // Measure character dimensions inside the output container so the probe
      // inherits the actual font, font-size, and line-height
      const probe = document.createElement('span');
      probe.style.cssText = 'position:absolute;visibility:hidden;white-space:pre';
      probe.textContent = 'M';
      outputEl.appendChild(probe);
      // Use getBoundingClientRect for sub-pixel accuracy — offsetWidth rounds
      // to integer pixels, understating the true character width and inflating
      // the column count (e.g. 7px vs 7.23px → 211 cols vs 204 cols).
      const probeRect = probe.getBoundingClientRect();
      const charW = probeRect.width || 7.2;
      const charH = probeRect.height || 16;
      outputEl.removeChild(probe);
      // Account for line-height and padding
      const style = getComputedStyle(outputEl);
      const lineH = parseFloat(style.lineHeight) || charH;
      const padX = parseFloat(style.paddingLeft) + parseFloat(style.paddingRight);
      const padY = parseFloat(style.paddingTop) + parseFloat(style.paddingBottom);
      const statusEl = outputEl.querySelector('.watch-status');
      const statusH = statusEl ? statusEl.offsetHeight + parseFloat(getComputedStyle(statusEl).marginBottom || '0') : 0;
      const cols = Math.floor((outputEl.clientWidth - padX) / charW);
      const rows = Math.floor((outputEl.clientHeight - padY - statusH) / lineH);
      if (cols < 1 || rows < 1) return;
      try {
        await fetch(`/api/agents/${encodeURIComponent(state.selected)}/resize`, {
          method: 'POST',
          headers: { 'content-type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ width: cols, height: rows }),
        });
      } catch (err) {
        console.error('[watch] Resize failed:', err);
      }
    });

    // Literal text input handlers
    const typeInput = panel.querySelector('.watch-type-input');
    const typeSend = panel.querySelector('.watch-type-send');
    const typeEnter = panel.querySelector('.watch-type-enter');

    async function sendLiteral(pressEnter) {
      const text = typeInput.value;
      if (!text || !state.selected) return;
      try {
        await fetch(`/api/agents/${encodeURIComponent(state.selected)}/type`, {
          method: 'POST',
          headers: { 'content-type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ text, pressEnter }),
        });
        typeInput.value = '';
      } catch (err) {
        console.error('[watch] Type send failed:', err);
      }
    }

    typeSend.addEventListener('click', () => sendLiteral(false));
    typeEnter.addEventListener('click', () => sendLiteral(true));
    typeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendLiteral(e.shiftKey ? false : true);
      }
    });

    async function poll() {
      if (state.threadView !== 'watch' || !state.selected) return;
      const output = await fetchPaneOutput(state.selected);
      if (state.threadView !== 'watch' || !state.selected) return;
      if (output === null) {
        outputEl.innerHTML = '<div class="watch-status">Agent has no active session</div>';
      } else {
        const now = new Date().toLocaleTimeString();
        const wasAtBottom = outputEl.scrollTop + outputEl.clientHeight >= outputEl.scrollHeight - 20;
        outputEl.innerHTML = `<div class="watch-status">Last capture: ${now}</div>${esc(output)}`;
        if (wasAtBottom) outputEl.scrollTop = outputEl.scrollHeight;
      }
    }

    poll().then(() => { outputEl.scrollTop = outputEl.scrollHeight; });
    state.watchTimer = setInterval(poll, 3000);
  }

  // ── Toast ──
  function showToast(message, type = 'error') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = message;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ── Send enable/disable based on agent state ──
  const CANT_RECEIVE = new Set(['void', 'failed', 'spawning']);

  function updateSendability() {
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    const interruptBtn = document.getElementById('interruptBtn');
    if (!state.selected) return;
    const agent = state.agents.find(a => a.name === state.selected);
    const blocked = agent && CANT_RECEIVE.has(agent.state);
    sendBtn.disabled = blocked;
    const fileInput = document.getElementById('fileInput');
    fileInput.disabled = blocked;
    uploadBtn.classList.toggle('disabled', !!blocked);
    msgInput.disabled = blocked;
    msgInput.placeholder = blocked
      ? `Agent is ${agent ? agent.state : 'unavailable'} — cannot receive messages`
      : 'Type a message...';
    // Show interrupt button only for active/idle agents
    const canInterrupt = agent && (agent.state === 'active' || agent.state === 'idle');
    interruptBtn.style.display = canInterrupt ? '' : 'none';
  }

  // ── Queue Updates ──
  function handleQueueUpdate(message) {
    // Update delivery status in thread data
    const thread = state.threads[message.targetAgent];
    if (thread) {
      for (const msg of thread) {
        if (msg.queueId === message.id) {
          msg.deliveryStatus = message.status;
          break;
        }
      }
    }

    // Update inline status badge in DOM
    const badge = document.querySelector(`[data-queue-id="${message.id}"]`);
    if (badge) {
      badge.className = `msg-status ${message.status}`;
      badge.textContent = message.status === 'delivered' ? '\u2713 delivered' :
                          message.status === 'failed' ? '\u2717 failed' :
                          '\u2022\u2022\u2022 sending';
    }
  }

  // ── Prompt Dialog (themed replacement for browser prompt()) ──
  function promptInput(label, defaultValue) {
    return new Promise((resolve) => {
      const overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML = `
        <div class="confirm-box">
          <p>${esc(label)}</p>
          <input type="text" value="${esc(defaultValue || '')}" style="width:100%;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;box-sizing:border-box;margin-bottom:16px" autocomplete="off" />
          <div class="actions">
            <button class="cancel-btn">Cancel</button>
            <button class="danger-btn" style="background:var(--accent);border-color:var(--accent)">OK</button>
          </div>
        </div>
      `;
      const input = overlay.querySelector('input');
      const submit = () => { const v = input.value.trim(); overlay.remove(); resolve(v || null); };
      overlay.querySelector('.cancel-btn').onclick = () => { overlay.remove(); resolve(null); };
      overlay.querySelector('.danger-btn').onclick = submit;
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submit();
        if (e.key === 'Escape') { overlay.remove(); resolve(null); }
      });
      overlay.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { overlay.remove(); resolve(null); }
      });
      document.body.appendChild(overlay);
      input.focus();
      input.select();
    });
  }

  // ── Confirm Dialog ──
  function confirmAction(message) {
    return new Promise((resolve) => {
      const overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML = `
        <div class="confirm-box">
          <p>${esc(message)}</p>
          <div class="actions">
            <button class="cancel-btn">Cancel</button>
            <button class="danger-btn">Confirm</button>
          </div>
        </div>
      `;
      overlay.querySelector('.cancel-btn').onclick = () => { overlay.remove(); resolve(false); };
      overlay.querySelector('.danger-btn').onclick = () => { overlay.remove(); resolve(true); };
      overlay.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { overlay.remove(); resolve(false); }
      });
      document.body.appendChild(overlay);
      overlay.querySelector('.danger-btn').focus();
    });
  }

  const DESTRUCTIVE_ACTIONS = new Set(['kill', 'destroy']);
  const ACTION_LABELS = { kill: 'Kill', destroy: 'Destroy', exit: 'Exit', resume: 'Resume', interrupt: 'Interrupt', compact: 'Compact', spawn: 'Spawn' };

  // ── Actions ──
  async function agentAction(name, act) {
    if (DESTRUCTIVE_ACTIONS.has(act)) {
      const confirmed = await confirmAction(`${ACTION_LABELS[act] || act} agent "${name}"? This cannot be undone.`);
      if (!confirmed) return;
    }

    try {
      const res = await fetch(`/api/agents/${encodeURIComponent(name)}/${act}`, {
        method: 'POST',
        headers: authHeaders(),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (!res.ok) {
        let msg = `Action "${act}" failed (HTTP ${res.status})`;
        try {
          const body = await res.json();
          if (body && body.error) msg = body.error;
        } catch (_) {}
        showToast(msg, 'error');
      } else {
        showToast(`${ACTION_LABELS[act] || act}: ${name}`, 'success');
      }
    } catch (err) {
      console.error(`Action ${act} failed:`, err);
      showToast(`Action "${act}" failed — network error`, 'error');
    }
  }

  // ── Group Management ──
  async function renameGroup(oldName, newName) {
    // Update all agents in this group
    const agents = state.agents.filter(a => (a.agentGroup || 'General') === oldName);
    for (const agent of agents) {
      agent.agentGroup = newName;
      fetch(`/api/agents/${encodeURIComponent(agent.name)}/group`, {
        method: 'PATCH',
        headers: { 'content-type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ group: newName }),
      }).catch(err => console.error('[group] Rename failed for', agent.name, err));
    }
    // Update saved section order
    const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
    const idx = savedOrder.indexOf(oldName);
    if (idx !== -1) savedOrder[idx] = newName;
    localStorage.setItem('sectionOrder', JSON.stringify(savedOrder));
    // Update empty groups
    if (state.emptyGroups) {
      const ei = state.emptyGroups.indexOf(oldName);
      if (ei !== -1) state.emptyGroups[ei] = newName;
    }
    renderAgents();
  }

  async function deleteGroup(groupName) {
    // Move all agents in this group back to General
    const agents = state.agents.filter(a => (a.agentGroup || 'General') === groupName);
    for (const agent of agents) {
      agent.agentGroup = null;
      fetch(`/api/agents/${encodeURIComponent(agent.name)}/group`, {
        method: 'PATCH',
        headers: { 'content-type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ group: '' }),
      }).catch(err => console.error('[group] Delete-move failed for', agent.name, err));
    }
    // Remove from saved section order
    const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
    const idx = savedOrder.indexOf(groupName);
    if (idx !== -1) savedOrder.splice(idx, 1);
    localStorage.setItem('sectionOrder', JSON.stringify(savedOrder));
    // Remove from empty groups
    if (state.emptyGroups) {
      state.emptyGroups = state.emptyGroups.filter(g => g !== groupName);
    }
    renderAgents();
  }

  // Event delegation on agent list — handles both card selection and action buttons.
  function handleAgentListEvent(e) {
    // Ignore taps on drag handle (mobile touch-drag)
    if (e.target.closest('.drag-handle')) return;

    const copyBtn = e.target.closest('button[data-copy-tmux]');
    if (copyBtn) {
      e.stopPropagation();
      const orig = copyBtn.textContent;
      navigator.clipboard.writeText(copyBtn.dataset.copyTmux).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = orig; }, 1500);
      }).catch(() => {
        copyBtn.textContent = 'Failed';
        setTimeout(() => { copyBtn.textContent = orig; }, 1500);
      });
      return;
    }
    const btn = e.target.closest('button[data-action]');
    if (btn) {
      e.stopPropagation();
      if (btn.classList.contains('loading')) return;
      const card = btn.closest('[data-agent]');
      if (card) {
        btn.classList.add('loading');
        agentAction(card.dataset.agent, btn.dataset.action)
          .finally(() => btn.classList.remove('loading'));
      }
      return;
    }
    const card = e.target.closest('[data-agent]');
    if (card) selectAgent(card.dataset.agent);
  }
  document.getElementById('agentList').addEventListener('click', handleAgentListEvent);
  document.getElementById('agentList').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      handleAgentListEvent(e);
    }
  });

  let draggedAgent = null;
  let draggedGroup = null;
  const agentListEl = document.getElementById('agentList');

  function clearDragIndicators() {
    agentListEl.querySelectorAll('.drag-over-above, .drag-over-below, .drag-over').forEach(el => {
      el.classList.remove('drag-over-above', 'drag-over-below', 'drag-over');
    });
  }

  agentListEl.addEventListener('dragstart', (e) => {
    const card = e.target.closest('.agent-card[data-agent]');
    const header = e.target.closest('.agent-group-header[data-group]');
    if (card) {
      draggedAgent = card.dataset.agent;
      draggedGroup = null;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedAgent);
    } else if (header) {
      draggedGroup = header.dataset.group;
      draggedAgent = null;
      header.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedGroup);
    }
  });

  agentListEl.addEventListener('dragend', (e) => {
    const el = e.target.closest('.agent-card, .agent-group-header');
    if (el) el.classList.remove('dragging');
    clearDragIndicators();
    draggedAgent = null;
    draggedGroup = null;
  });

  agentListEl.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    clearDragIndicators();

    const header = e.target.closest('.agent-group-header[data-group]');
    const card = e.target.closest('.agent-card[data-agent]');

    if (draggedAgent && header) {
      // Agent dragged over a section header → highlight for group change
      header.classList.add('drag-over');
    } else if (draggedAgent && card && card.dataset.agent !== draggedAgent) {
      // Agent dragged over another agent → reorder indicator
      const rect = card.getBoundingClientRect();
      card.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
    } else if (draggedGroup && header && header.dataset.group !== draggedGroup) {
      // Section header dragged over another section header → reorder indicator
      const rect = header.getBoundingClientRect();
      header.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
    }
  });

  agentListEl.addEventListener('dragleave', (e) => {
    const el = e.target.closest('.agent-card, .agent-group-header');
    if (el) el.classList.remove('drag-over-above', 'drag-over-below', 'drag-over');
  });

  agentListEl.addEventListener('drop', (e) => {
    e.preventDefault();
    clearDragIndicators();

    const targetHeader = e.target.closest('.agent-group-header[data-group]');
    const targetCard = e.target.closest('.agent-card[data-agent]');

    // Case 1: Agent dropped on a section header → change group
    if (draggedAgent && targetHeader) {
      const newGroup = targetHeader.dataset.group;
      const agent = state.agents.find(a => a.name === draggedAgent);
      if (agent && (agent.agentGroup || 'General') !== newGroup) {
        agent.agentGroup = newGroup === 'General' ? null : newGroup;
        renderAgents();
        fetch(`/api/agents/${encodeURIComponent(draggedAgent)}/group`, {
          method: 'PATCH',
          headers: { 'content-type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ group: newGroup === 'General' ? '' : newGroup }),
        }).catch(err => console.error('[drag] Group change failed:', err));
      }
      return;
    }

    // Case 2: Agent dropped on another agent → reorder within list
    if (draggedAgent && targetCard && targetCard.dataset.agent !== draggedAgent) {
      const rect = targetCard.getBoundingClientRect();
      const insertBefore = e.clientY < rect.top + rect.height / 2;
      const fromIdx = state.agents.findIndex(a => a.name === draggedAgent);
      const targetName = targetCard.dataset.agent;
      if (fromIdx === -1) return;
      const [moved] = state.agents.splice(fromIdx, 1);
      let toIdx = state.agents.findIndex(a => a.name === targetName);
      if (!insertBefore) toIdx++;
      state.agents.splice(toIdx, 0, moved);

      const orders = state.agents.map((a, i) => ({ name: a.name, sortOrder: i }));
      state.agents.forEach((a, i) => { a.sortOrder = i; });
      renderAgents();

      fetch('/api/agents/reorder', {
        method: 'POST',
        headers: { 'content-type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ orders }),
      }).catch(err => console.error('[drag] Reorder save failed:', err));
      return;
    }

    // Case 3: Section header dropped on another section header → reorder sections
    if (draggedGroup && targetHeader && targetHeader.dataset.group !== draggedGroup) {
      const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
      // Build current order from DOM
      const headers = agentListEl.querySelectorAll('.agent-group-header[data-group]');
      const currentOrder = [...headers].map(h => h.dataset.group);
      // Ensure all groups are in the order list
      for (const g of currentOrder) {
        if (!savedOrder.includes(g)) savedOrder.push(g);
      }
      // Move dragged group
      const fromIdx = savedOrder.indexOf(draggedGroup);
      if (fromIdx !== -1) savedOrder.splice(fromIdx, 1);
      const rect = targetHeader.getBoundingClientRect();
      let targetIdx = savedOrder.indexOf(targetHeader.dataset.group);
      if (e.clientY >= rect.top + rect.height / 2) targetIdx++;
      savedOrder.splice(targetIdx, 0, draggedGroup);
      localStorage.setItem('sectionOrder', JSON.stringify(savedOrder));
      renderAgents();
    }
  });

  // ── Touch Drag (mobile) ──
  let touchDragState = null;

  agentListEl.addEventListener('touchstart', (e) => {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    const card = handle.closest('.agent-card[data-agent]');
    if (!card) return;
    e.preventDefault();
    const touch = e.touches[0];
    const rect = card.getBoundingClientRect();
    touchDragState = {
      agentName: card.dataset.agent,
      offsetY: touch.clientY - rect.top,
      clone: null,
      startY: touch.clientY,
    };
    // Create floating clone
    const clone = card.cloneNode(true);
    clone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;z-index:1000;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.5);border-color:var(--accent)`;
    document.body.appendChild(clone);
    touchDragState.clone = clone;
    card.style.opacity = '0.3';
  }, { passive: false });

  agentListEl.addEventListener('touchmove', (e) => {
    if (!touchDragState) return;
    e.preventDefault();
    const touch = e.touches[0];
    if (touchDragState.clone) {
      touchDragState.clone.style.top = (touch.clientY - touchDragState.offsetY) + 'px';
    }
    // Show drop indicators
    clearDragIndicators();
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (!el) return;
    const header = el.closest('.agent-group-header[data-group]');
    const targetCard = el.closest('.agent-card[data-agent]');
    if (header) {
      header.classList.add('drag-over');
    } else if (targetCard && targetCard.dataset.agent !== touchDragState.agentName) {
      const rect = targetCard.getBoundingClientRect();
      targetCard.classList.add(touch.clientY < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
    }
  }, { passive: false });

  function finishTouchDrag(e) {
    if (!touchDragState) return;
    const { agentName, clone } = touchDragState;
    if (clone) clone.remove();
    // Restore original card opacity
    const origCard = agentListEl.querySelector(`[data-agent="${agentName}"]`);
    if (origCard) origCard.style.opacity = '';

    // Find drop target
    const touch = e.changedTouches[0];
    clearDragIndicators();
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el) {
      const header = el.closest('.agent-group-header[data-group]');
      const targetCard = el.closest('.agent-card[data-agent]');

      if (header) {
        // Drop on group header → change group
        const newGroup = header.dataset.group;
        const agent = state.agents.find(a => a.name === agentName);
        if (agent && (agent.agentGroup || 'General') !== newGroup) {
          agent.agentGroup = newGroup === 'General' ? null : newGroup;
          renderAgents();
          fetch(`/api/agents/${encodeURIComponent(agentName)}/group`, {
            method: 'PATCH',
            headers: { 'content-type': 'application/json', ...authHeaders() },
            body: JSON.stringify({ group: newGroup === 'General' ? '' : newGroup }),
          }).catch(err => console.error('[touch-drag] Group change failed:', err));
        }
      } else if (targetCard && targetCard.dataset.agent !== agentName) {
        // Drop on another agent → reorder
        const rect = targetCard.getBoundingClientRect();
        const insertBefore = touch.clientY < rect.top + rect.height / 2;
        const fromIdx = state.agents.findIndex(a => a.name === agentName);
        const targetName = targetCard.dataset.agent;
        if (fromIdx !== -1) {
          const [moved] = state.agents.splice(fromIdx, 1);
          let toIdx = state.agents.findIndex(a => a.name === targetName);
          if (!insertBefore) toIdx++;
          state.agents.splice(toIdx, 0, moved);
          const orders = state.agents.map((a, i) => ({ name: a.name, sortOrder: i }));
          state.agents.forEach((a, i) => { a.sortOrder = i; });
          renderAgents();
          fetch('/api/agents/reorder', {
            method: 'POST',
            headers: { 'content-type': 'application/json', ...authHeaders() },
            body: JSON.stringify({ orders }),
          }).catch(err => console.error('[touch-drag] Reorder save failed:', err));
        }
      }
    }
    touchDragState = null;
  }

  agentListEl.addEventListener('touchend', finishTouchDrag, { passive: false });
  agentListEl.addEventListener('touchcancel', (e) => {
    if (!touchDragState) return;
    if (touchDragState.clone) touchDragState.clone.remove();
    const origCard = agentListEl.querySelector(`[data-agent="${touchDragState.agentName}"]`);
    if (origCard) origCard.style.opacity = '';
    clearDragIndicators();
    touchDragState = null;
  });

  // ── Archive / Restore Chat ──
  async function archiveChat(agentName) {
    if (!agentName) return;
    try {
      const res = await fetch(`/api/dashboard/messages/${encodeURIComponent(agentName)}`, {
        method: 'DELETE',
        headers: authHeaders(),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (res.ok) {
        state.threads[agentName] = [];
        renderThread();
      }
    } catch (err) {
      console.error('Archive chat failed:', err);
    }
  }

  async function unarchiveChat(agentName) {
    if (!agentName) return;
    try {
      const res = await fetch(`/api/dashboard/messages/${encodeURIComponent(agentName)}/unarchive`, {
        method: 'POST',
        headers: authHeaders(),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (res.ok) {
        // Reload threads to get restored messages
        const threadsRes = await fetch(`/api/dashboard/threads?agent=${encodeURIComponent(agentName)}`, {
          headers: authHeaders(),
        });
        if (threadsRes.ok) {
          const threads = await threadsRes.json();
          state.threads[agentName] = threads[agentName] || [];
        }
        state.threadView = 'messages';
        renderThread();
      }
    } catch (err) {
      console.error('Unarchive failed:', err);
    }
  }

  async function renderArchive() {
    const messages = document.getElementById('threadMessages');
    if (!state.selected) return;
    messages.innerHTML = '<div class="thread-empty">Loading archive...</div>';
    try {
      const res = await fetch(`/api/dashboard/threads?agent=${encodeURIComponent(state.selected)}&archived=1`, {
        headers: authHeaders(),
      });
      if (!res.ok) { messages.innerHTML = '<div class="thread-empty">Failed to load archive</div>'; return; }
      const threads = await res.json();
      const thread = threads[state.selected] || [];
      if (thread.length === 0) {
        messages.innerHTML = '<div class="thread-empty">No archived messages</div>';
        return;
      }
      messages.innerHTML = '';
      // Restore button
      const restoreBar = document.createElement('div');
      restoreBar.style.cssText = 'padding:8px 12px;text-align:center';
      restoreBar.innerHTML = `<button onclick="document.dispatchEvent(new CustomEvent('unarchive-chat'))" style="padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer">Restore to Messages</button>`;
      messages.appendChild(restoreBar);
      for (const msg of thread) {
        const div = document.createElement('div');
        const isSystem = msg.message && msg.message.startsWith('[system]');
        const isUpload = msg.topic === 'file-upload' && msg.direction === 'to_agent';
        if (isSystem) {
          div.className = 'msg system-msg';
        } else if (isUpload) {
          div.className = 'msg to-agent file-upload';
        } else {
          div.className = `msg ${msg.direction === 'to_agent' ? 'to-agent' : 'from-agent'}`;
        }
        if (msg.withdrawn) div.classList.add('withdrawn');
        const fromLabel = isSystem ? 'system' : (msg.sourceAgent || (msg.direction === 'to_agent' ? 'dashboard' : state.selected));
        const toLabel = msg.targetAgent || (msg.direction === 'to_agent' ? state.selected : 'dashboard');
        const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        const topicBadge = msg.topic ? `<span class="msg-topic">${esc(msg.topic)}</span>` : '';
        const routeStr = `${esc(fromLabel)} \u2192 ${esc(toLabel)}`;
        const displayMsg = isSystem ? msg.message.replace(/^\[system\]\s*/, '') : msg.message;
        const statusHtml = (msg.direction === 'to_agent' && msg.queueId)
          ? `<span class="msg-status ${msg.deliveryStatus || 'pending'}" data-queue-id="${msg.queueId}">${
              msg.deliveryStatus === 'delivered' ? '\u2713 delivered' :
              msg.deliveryStatus === 'failed' ? '\u2717 failed' :
              '\u2022\u2022\u2022 sending'
            }</span>`
          : '';
        const headerHtml = `<div class="msg-header"><span class="msg-sender">${routeStr}</span>${topicBadge}<span class="msg-meta"><span class="msg-time">${time}</span>${statusHtml}</span></div>`;
        if (isUpload) {
          div.innerHTML = `${headerHtml}<div class="file-info"><span class="file-icon">&#128206;</span> ${esc(displayMsg)}</div>`;
        } else {
          div.innerHTML = `${headerHtml}<div class="msg-body">${renderMarkdown(esc(displayMsg))}</div>`;
        }
        messages.appendChild(div);
      }
      // Scroll to bottom
      messages.scrollTop = messages.scrollHeight;
    } catch (err) {
      console.error('Archive load failed:', err);
      messages.innerHTML = '<div class="thread-empty">Failed to load archive</div>';
    }
  }

  document.addEventListener('unarchive-chat', () => {
    if (state.selected) unarchiveChat(state.selected);
  });

  // ── Send Message ──
  function showSendError(input, sendBtn) {
    input.style.borderColor = 'var(--red)';
    const errEl = document.createElement('span');
    errEl.id = 'sendError';
    errEl.style.cssText = 'color:var(--red);font-size:11px;align-self:center;white-space:nowrap';
    errEl.textContent = 'Send failed';
    input.parentNode.insertBefore(errEl, sendBtn);
    setTimeout(() => { errEl.remove(); input.style.borderColor = ''; }, 3000);
  }

  async function sendMessage() {
    if (!state.selected) return;
    const input = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const text = input.value.trim();
    const topic = getActiveTopic();
    if (!text) return;

    // Clear any previous error state
    input.style.borderColor = '';
    const existingErr = document.getElementById('sendError');
    if (existingErr) existingErr.remove();

    sendBtn.disabled = true;
    const message = voiceState.usedSinceSend ? VOICE_TO_TEXT_PREFIX + text : text;
    voiceState.usedSinceSend = false;
    try {
      const res = await fetch('/api/dashboard/send', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ agent: state.selected, message, topic }),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (!res.ok) {
        let body = null;
        try { body = await res.json(); } catch (_) {}
        if (body && body.msg) {
          input.value = '';
          input.style.height = 'auto';
          delete state.drafts[state.selected];
        } else {
          console.error('Send failed: HTTP', res.status);
          showSendError(input, sendBtn);
        }
      } else {
        input.value = '';
        input.style.height = 'auto';
        delete state.drafts[state.selected];
        // Keep topic — user often sends multiple messages on same topic
      }
    } catch (err) {
      console.error('Send failed:', err);
      showSendError(input, sendBtn);
    } finally {
      updateSendability();
    }
  }

  document.getElementById('sendBtn').onclick = sendMessage;
  document.getElementById('interruptBtn').onclick = () => {
    if (state.selected) agentAction(state.selected, 'interrupt');
  };
  const msgTextarea = document.getElementById('msgInput');
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  msgTextarea.onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !isMobile) {
      e.preventDefault();
      sendMessage();
    }
  };
  // No oninput handler — textarea has fixed height with overflow scroll.
  // Auto-resize via scrollHeight caused 48ms reflow per keystroke.

  // ── File Upload ──

  async function uploadFile(file, message) {
    let url = `/api/dashboard/upload?agent=${encodeURIComponent(state.selected)}&filename=${encodeURIComponent(file.name)}`;
    if (message) url += `&message=${encodeURIComponent(message)}`;
    const headers = { 'content-type': 'application/octet-stream' };
    const t = getToken();
    if (t) headers['authorization'] = `Bearer ${t}`;

    const res = await fetch(url, { method: 'POST', headers, body: file });
    if (res.status === 401) { handleAuthError(); throw new Error('auth'); }
    const body = await res.json();
    return { file: file.name, ok: res.ok, ...body };
  }

  const LARGE_FILE_THRESHOLD = 100 * 1024 * 1024; // 100 MB

  function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
    if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
    return (bytes / (1024 * 1024 * 1024)).toFixed(1) + 'GB';
  }

  document.getElementById('fileInput').onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length || !state.selected) return;

    // Grab any text in the message input to send alongside the file
    const msgInput = document.getElementById('threadInput');
    const attachedMessage = msgInput?.value?.trim() || '';
    if (attachedMessage) { msgInput.value = ''; }

    // Warn about large files
    const largeFiles = files.filter(f => f.size >= LARGE_FILE_THRESHOLD);
    if (largeFiles.length > 0) {
      const totalSize = files.reduce((sum, f) => sum + f.size, 0);
      const confirmed = await confirmAction(
        `${largeFiles.length} file${largeFiles.length > 1 ? 's are' : ' is'} large (total ${formatFileSize(totalSize)}). Upload may take a while. Continue?`
      );
      if (!confirmed) { e.target.value = ''; return; }
    }

    const uploadWrap = document.getElementById('uploadWrap');
    uploadWrap.classList.add('uploading');

    // Show uploading indicator in thread
    const messagesEl = document.getElementById('threadMessages');
    const uploadIndicator = document.createElement('div');
    uploadIndicator.className = 'msg to-agent file-upload';
    const fileNames = files.map(f => `${f.name} (${formatFileSize(f.size)})`).join(', ');
    const indicatorMsg = attachedMessage ? esc(attachedMessage) + '<br>' : '';
    uploadIndicator.innerHTML = `<div class="msg-header"><span class="msg-sender">you</span><span class="msg-meta"><span class="msg-status pending">\u2022\u2022\u2022 uploading</span></span></div>${indicatorMsg}<div class="file-info"><span class="file-icon">&#128206;</span> ${esc(fileNames)}</div>`;
    messagesEl.appendChild(uploadIndicator);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      // Only attach the message to the first file upload to avoid duplicate messages
      const results = await Promise.allSettled(files.map((f, i) => uploadFile(f, i === 0 ? attachedMessage : '')));
      const succeeded = results.filter(r => r.status === 'fulfilled' && r.value.ok).length;
      const failed = results.length - succeeded;

      if (failed === 0) {
        showToast(`Uploaded ${succeeded} file${succeeded > 1 ? 's' : ''}`, 'success');
      } else {
        // Show the first error reason if available
        const firstError = results.find(r => r.status === 'fulfilled' && !r.value.ok)?.value?.error
          || results.find(r => r.status === 'rejected')?.reason?.message
          || 'unknown error';
        showToast(`${failed} upload${failed > 1 ? 's' : ''} failed: ${firstError}`, 'error');
      }
    } catch (err) {
      if (err.message !== 'auth') showToast('Upload failed', 'error');
    } finally {
      uploadWrap.classList.remove('uploading');
      uploadIndicator.remove(); // real message appears via WebSocket
      e.target.value = '';
    }
  };

  // Paste image/file from clipboard
  document.getElementById('msgInput').addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items || !state.selected) return;

    const files = [];
    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      if (item.kind === 'file') {
        const file = item.getAsFile();
        if (file) files.push(file);
      }
    }

    if (files.length === 0) return; // plain text paste, let default handle it
    e.preventDefault();

    const dt = new DataTransfer();
    for (const f of files) dt.items.add(f);
    const fileInput = document.getElementById('fileInput');
    fileInput.files = dt.files;
    fileInput.dispatchEvent(new Event('change'));
  });

  // Drag-and-drop on thread messages
  const threadMsgs = document.getElementById('threadMessages');
  threadMsgs.addEventListener('dragover', (e) => {
    e.preventDefault();
    threadMsgs.classList.add('drag-over');
  });
  threadMsgs.addEventListener('dragleave', () => {
    threadMsgs.classList.remove('drag-over');
  });
  threadMsgs.addEventListener('drop', (e) => {
    e.preventDefault();
    threadMsgs.classList.remove('drag-over');
    const droppedFiles = e.dataTransfer?.files;
    if (droppedFiles && droppedFiles.length > 0 && state.selected) {
      // Use DataTransfer to build a synthetic FileList (Firefox doesn't allow
      // assigning to input.files from a drop event's FileList directly)
      const dt = new DataTransfer();
      for (let i = 0; i < droppedFiles.length; i++) dt.items.add(droppedFiles[i]);
      const fileInput = document.getElementById('fileInput');
      fileInput.files = dt.files;
      fileInput.dispatchEvent(new Event('change'));
    }
  });

  /**
   * Minimal zero-dependency markdown renderer.
   * Input must already be HTML-escaped via esc().
   * Supports: headings, bold, italic, code blocks, inline code, lists, links, tables, paragraphs.
   */
  function renderMarkdown(escaped) {
    if (!escaped) return '';
    // Preserve code blocks first — extract and replace with placeholders
    const codeBlocks = [];
    let text = escaped.replace(/```(?:\w*)\n([\s\S]*?)```/g, (_m, code) => {
      codeBlocks.push(code.replace(/\n$/, ''));
      return '\x00CB' + (codeBlocks.length - 1) + '\x00';
    });
    // Inline code
    text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    // Headings (must be at start of line)
    text = text.replace(/^(#{1,6})\s+(.+)$/gm, (_m, hashes, content) => {
      const level = hashes.length;
      return `<h${level} style="margin:8px 0 4px;font-size:${18 - level * 1.5}px">${content}</h${level}>`;
    });
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic (single asterisk, not inside words)
    text = text.replace(/(?<!\w)\*(.+?)\*(?!\w)/g, '<em>$1</em>');
    // Links
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
    // Lists, tables, and paragraphs: line-based parser for proper nesting
    {
      const lines = text.split('\n');
      const out = [];
      const listStack = []; // stack of { tag: 'ul'|'ol', indent: number }
      let inPara = false;
      let inTable = false;

      function closeListsTo(indent) {
        while (listStack.length > 0 && listStack[listStack.length - 1].indent >= indent) {
          out.push('</' + listStack.pop().tag + '>');
        }
      }
      function closeAllLists() { closeListsTo(-1); }
      function closePara() { if (inPara) { out.push('</p>'); inPara = false; } }
      function closeTable() { if (inTable) { out.push('</tbody></table>'); inTable = false; } }

      function parseTableRow(line) {
        // Split on | and trim — ignore leading/trailing empty cells from outer pipes
        const cells = line.split('|').map(c => c.trim());
        if (cells[0] === '') cells.shift();
        if (cells.length > 0 && cells[cells.length - 1] === '') cells.pop();
        return cells;
      }

      function isSeparatorRow(line) {
        return /^\|?[\s:]*-{2,}[\s:]*(\|[\s:]*-{2,}[\s:]*)*\|?\s*$/.test(line) && line.includes('-');
      }

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const hrMatch = line.match(/^---+$/);
        if (hrMatch) {
          closePara(); closeAllLists();
          out.push('<hr style="border:none;border-top:1px solid var(--border);margin:8px 0">');
          continue;
        }

        // Table detection: header row + separator row starts a table
        if (!inTable && line.includes('|') && i + 1 < lines.length && isSeparatorRow(lines[i + 1])) {
          closePara(); closeAllLists();
          const headers = parseTableRow(line);
          out.push('<table><thead><tr>' + headers.map(h => '<th>' + h + '</th>').join('') + '</tr></thead><tbody>');
          i++; // skip separator row
          inTable = true;
          continue;
        }
        if (inTable) {
          if (line.includes('|')) {
            const cells = parseTableRow(line);
            out.push('<tr>' + cells.map(c => '<td>' + c + '</td>').join('') + '</tr>');
            continue;
          } else {
            closeTable();
            // fall through to process this line normally
          }
        }

        const ulMatch = line.match(/^(\s*)([-*])\s+(.+)$/);
        const olMatch = !ulMatch && line.match(/^(\s*)\d+\.\s+(.+)$/);

        if (ulMatch || olMatch) {
          closePara();
          const indent = (ulMatch || olMatch)[1].length;
          const tag = ulMatch ? 'ul' : 'ol';
          const content = ulMatch ? ulMatch[3] : olMatch[2];

          if (listStack.length === 0 || indent > listStack[listStack.length - 1].indent) {
            out.push('<' + tag + '>');
            listStack.push({ tag, indent });
          } else if (indent < listStack[listStack.length - 1].indent) {
            closeListsTo(indent);
            if (listStack.length === 0 || listStack[listStack.length - 1].indent < indent) {
              out.push('<' + tag + '>');
              listStack.push({ tag, indent });
            }
          }
          out.push('<li>' + content + '</li>');
          continue;
        }

        // Non-list line
        closeAllLists();

        if (line.trim() === '') {
          closePara();
        } else if (line.startsWith('<h') || line.startsWith('<hr')) {
          closePara();
          out.push(line);
        } else {
          if (!inPara) { out.push('<p style="margin:4px 0">'); inPara = true; }
          else { out.push('<br>'); }
          out.push(line);
        }
      }
      closePara();
      closeAllLists();
      closeTable();
      text = out.join('\n');
    }
    // Restore code blocks
    text = text.replace(/\x00CB(\d+)\x00/g, (_m, idx) => {
      return `<pre style="background:var(--bg);padding:8px;border-radius:4px;overflow-x:auto;margin:4px 0;font-size:12px"><code>${codeBlocks[parseInt(idx)]}</code></pre>`;
    });
    return text;
  }

  function timeAgo(isoStr) {
    if (!isoStr) return '';
    const diff = Math.max(0, Date.now() - new Date(isoStr).getTime());
    const secs = Math.floor(diff / 1000);
    if (secs < 60) return `${secs}s ago`;
    const mins = Math.floor(secs / 60);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    return `${days}d ago`;
  }

  function openCreateAgentModal() {
    const overlay = document.createElement('div');
    overlay.className = 'create-modal-overlay';
    const hasProxies = state.proxies && state.proxies.length > 0;
    overlay.innerHTML = `
      <div class="create-modal">
        <div class="create-modal-header">
          <select id="createEngineSelect" style="padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;outline:none">
            <option value="claude" selected>Claude</option>
            <option value="codex">Codex</option>
            <option value="opencode">OpenCode</option>
          </select>
          <input type="text" id="createAgentName" placeholder="agent-name (kebab-case)" autocomplete="off" />
        </div>
        <div class="create-modal-body">
          <textarea id="createAgentContent">${esc(ENGINE_TEMPLATES.claude)}</textarea>
        </div>
        <div class="create-modal-actions">
          <button class="primary" id="createSpawnBtn" ${hasProxies ? '' : 'disabled title="No proxy registered"'}>Create &amp; Spawn</button>
          <button class="secondary" id="createOnlyBtn">Create Only</button>
          <button class="cancel" id="createCancelBtn">Cancel</button>
        </div>
      </div>
    `;
    document.body.appendChild(overlay);

    // Focus name input
    const nameInput = overlay.querySelector('#createAgentName');
    setTimeout(() => nameInput.focus(), 50);

    // Close on overlay background click — stop propagation from modal to prevent
    // accidental dismissal. Uses pointerdown/pointerup for mouse+touch support.
    const modal = overlay.querySelector('.create-modal');
    modal.addEventListener('pointerdown', (e) => e.stopPropagation());
    modal.addEventListener('pointerup', (e) => e.stopPropagation());
    let pointerDownOnOverlay = false;
    overlay.addEventListener('pointerdown', (e) => { pointerDownOnOverlay = e.target === overlay; });
    overlay.addEventListener('pointerup', (e) => {
      if (pointerDownOnOverlay && e.target === overlay) overlay.remove();
      pointerDownOnOverlay = false;
    });

    // Escape key closes modal
    const escHandler = (e) => { if (e.key === 'Escape') { overlay.remove(); document.removeEventListener('keydown', escHandler); } };
    document.addEventListener('keydown', escHandler);

    // Cancel
    overlay.querySelector('#createCancelBtn').onclick = () => { overlay.remove(); document.removeEventListener('keydown', escHandler); };

    // Engine template switcher
    overlay.querySelector('#createEngineSelect').onchange = (e) => {
      const textarea = overlay.querySelector('#createAgentContent');
      const template = ENGINE_TEMPLATES[e.target.value] || ENGINE_TEMPLATES.claude;
      textarea.value = template;
    };

    // Create handler
    async function createAgent(spawn) {
      const name = nameInput.value.trim();
      const content = overlay.querySelector('#createAgentContent').value;
      if (!name) { showToast('Agent name is required', 'error'); return; }
      if (!/^[a-zA-Z0-9][a-zA-Z0-9_-]{0,62}$/.test(name)) {
        showToast('Name: 1-63 chars, start alphanumeric, [a-zA-Z0-9_-]', 'error');
        return;
      }

      try {
        // Create persona file + agent via POST /api/personas
        const createRes = await fetch('/api/personas', {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify({ name, content }),
        });
        if (createRes.status === 401) { handleAuthError(); return; }
        const createBody = await createRes.json();
        if (!createRes.ok) {
          showToast(createBody.error || 'Create failed', 'error');
          return;
        }

        overlay.remove();

        if (spawn) {
          const spawnRes = await fetch(`/api/agents/${encodeURIComponent(name)}/spawn`, {
            method: 'POST',
            headers: authHeaders(),
            body: JSON.stringify({}),
          });
          if (spawnRes.ok) {
            showToast(`Agent "${name}" created and spawning`, 'success');
          } else {
            showToast('Agent created but spawn failed', 'warning');
          }
        } else {
          showToast(`Agent "${name}" created`, 'success');
        }
        selectAgent(name);
      } catch (err) {
        showToast('Create failed — network error', 'error');
      }
    }

    overlay.querySelector('#createSpawnBtn').onclick = () => createAgent(true);
    overlay.querySelector('#createOnlyBtn').onclick = () => createAgent(false);
  }

  // ── Search Filter ──
  // Lightweight filter: toggle visibility on existing DOM cards instead of
  // tearing down and rebuilding the entire agent list on every keystroke.
  function applySearchFilter() {
    const filter = state.searchFilter.toLowerCase();
    const list = document.getElementById('agentList');
    const cards = list.querySelectorAll('.agent-card[data-agent]');
    const groupCounts = new Map(); // groupHeader element → visible count
    // First pass: show/hide cards
    for (const card of cards) {
      const name = card.dataset.agent;
      const agent = state.agents.find(a => a.name === name);
      let visible = true;
      if (filter && agent) {
        visible = agent.name.toLowerCase().includes(filter)
          || agent.engine.toLowerCase().includes(filter)
          || agent.state.toLowerCase().includes(filter)
          || (agent.agentGroup || '').toLowerCase().includes(filter);
      }
      if (visible && state.quickFilter) {
        if (state.quickFilter === 'active') visible = agent && agent.state === 'active';
        else if (state.quickFilter === 'idle') visible = agent && agent.state === 'idle';
        else if (state.quickFilter === 'unread') visible = agent && (state.unread[agent.name] || 0) > 0;
        else if (state.quickFilter === 'recent') visible = agent && !!agent.lastActivity;
      }
      card.style.display = visible ? '' : 'none';
      // Track per-group visibility
      let prev = card.previousElementSibling;
      while (prev && !prev.classList.contains('agent-group-header')) prev = prev.previousElementSibling;
      if (prev) {
        groupCounts.set(prev, (groupCounts.get(prev) || 0) + (visible ? 1 : 0));
      }
    }
    // Second pass: hide group headers with zero visible cards
    for (const [header, count] of groupCounts) {
      header.style.display = count > 0 ? '' : 'none';
    }
  }

  const searchInput = document.getElementById('agentSearch');
  const searchClear = document.getElementById('agentSearchClear');
  searchInput.addEventListener('input', (e) => {
    state.searchFilter = e.target.value;
    searchClear.style.display = e.target.value ? 'block' : 'none';
    applySearchFilter();
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    state.searchFilter = '';
    state.quickFilter = null;
    searchClear.style.display = 'none';
    applySearchFilter();
    searchInput.focus();
  });

  // Filter chips — toggle on click, clear on re-click
  document.getElementById('filterChips').addEventListener('click', (e) => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;
    const f = chip.dataset.filter;
    state.quickFilter = state.quickFilter === f ? null : f;
    document.querySelectorAll('.filter-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.filter === state.quickFilter);
    });
    applySearchFilter();
  });

  // ── Engine Usage Fetch ──

      });
      if (!resp.ok) return;

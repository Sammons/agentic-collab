<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Agentic Collab</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #d18616;
    --purple: #bc8cff;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 16px; font-weight: 600; }
  .hotkey-hints {
    display: flex;
    gap: 12px;
    font-size: 11px;
    color: var(--text-dim);
    opacity: 0.6;
  }
  .hotkey-hints kbd {
    background: var(--bg);
    padding: 1px 5px;
    border-radius: 3px;
    border: 1px solid var(--border);
    font-size: 10px;
    font-family: inherit;
    margin-right: 2px;
  }
  .conn-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
  }
  .conn-dot.connected { background: var(--green); }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 49px);
    height: calc(100dvh - 49px);
  }

  /* ── Agent Grid ── */
  .agent-sidebar {
    display: flex;
    flex-direction: column;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }
  .agent-list {
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card.selected { border-color: var(--accent); background: #1c2333; }
  .agent-card.flash { animation: flash-card 0.6s ease; }
  .agent-group-header {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    padding: 8px 4px 2px;
    margin-top: 4px;
    cursor: grab;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .agent-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .group-chevron {
    font-size: 10px;
    margin-right: 4px;
    transition: transform 0.15s;
    display: inline-block;
  }
  .agent-group-header.collapsed .group-chevron { transform: rotate(-90deg); }
  .group-actions {
    display: flex;
    gap: 2px;
  }
  .group-actions button {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    padding: 1px 4px;
    border-radius: 3px;
  }
  .group-actions button:hover { color: var(--accent); background: rgba(88,166,255,0.1); }
  .group-actions .group-delete:hover { color: var(--red); background: rgba(248,81,73,0.1); }
  .agent-group-header.dragging { opacity: 0.4; }
  .agent-group-header.drag-over {
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .agent-group-header.drag-over-above { box-shadow: 0 -2px 0 var(--accent); }
  .agent-group-header.drag-over-below { box-shadow: 0 2px 0 var(--accent); }
  .agent-card[draggable="true"] { cursor: grab; }
  .agent-card.dragging { opacity: 0.4; }
  .agent-card.drag-over-above { box-shadow: 0 -2px 0 var(--accent); }
  .agent-card.drag-over-below { box-shadow: 0 2px 0 var(--accent); }
  .drag-handle { display: none; }

  @keyframes flash-card {
    0%,100% { background: var(--surface); }
    50% { background: #1a2a1a; }
  }

  .agent-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .agent-name { font-weight: 600; font-size: 14px; }
  .state-badge {
    margin-left: auto;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .state-active   { background: rgba(63,185,80,0.15); color: var(--green); }
  .state-idle     { background: rgba(139,148,158,0.15); color: var(--text-dim); }
  .state-spawning { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-suspended { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .state-failed   { background: rgba(248,81,73,0.15); color: var(--red); }
  .state-suspending { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-resuming  { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-void     { background: rgba(139,148,158,0.1); color: var(--text-dim); }

  .agent-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .agent-meta span { display: flex; align-items: center; gap: 4px; }

  .agent-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .agent-actions button {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .agent-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .agent-actions button.danger:hover { border-color: var(--red); color: var(--red); }

  /* ── Thread Panel ── */
  .thread-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    overflow: hidden;
  }
  .thread-messages {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    overflow-anchor: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .thread-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
  }

  .msg {
    max-width: 70%;
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg-body { white-space: normal; }
  .msg-body p { margin: 4px 0; }
  .msg-body code { background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .msg-body pre { white-space: pre-wrap; }
  .msg-body ul, .msg-body ol { margin: 4px 0; padding-left: 20px; }
  .msg-body h1, .msg-body h2, .msg-body h3, .msg-body h4, .msg-body h5, .msg-body h6 { margin: 8px 0 4px; }
  .msg-body table { border-collapse: collapse; margin: 4px 0; font-size: 12px; }
  .msg-body th, .msg-body td { border: 1px solid var(--border); padding: 4px 8px; text-align: left; }
  .msg-body th { background: rgba(255,255,255,0.05); font-weight: 600; }
  .msg.to-agent {
    align-self: flex-end;
    background: #1a3a5c;
    border: 1px solid rgba(88,166,255,0.3);
  }
  .msg.from-agent {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .msg-header {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    margin-bottom: 4px;
    font-size: 11px;
    color: var(--text-dim);
    min-width: 0;
    word-break: normal;
    overflow-wrap: normal;
  }
  .msg-sender {
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    font-weight: 600;
  }
  .msg-copy {
    font-size: 10px;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.15s;
    color: var(--text-dim);
    background: none;
    border: none;
    padding: 0 2px;
  }
  .msg-copy:hover { opacity: 1; color: var(--accent); }
  .msg-time {
    font-size: 10px;
    white-space: nowrap;
  }
  .msg-meta {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
    flex: 0 0 auto;
    min-width: 0;
  }
  .msg-status {
    font-size: 10px;
    white-space: nowrap;
  }
  .msg-status.pending { color: var(--text-dim); }
  .msg-status.delivered { color: var(--green); }
  .msg-status.failed { color: var(--red); }
  .msg.withdrawn { opacity: 0.5; }
  .msg.withdrawn .msg-body { text-decoration: line-through; }
  .msg-withdraw {
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
    white-space: nowrap;
  }
  .msg:hover .msg-withdraw { opacity: 1; }
  .msg-withdraw:hover { color: var(--red); }
  .msg-topic {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: rgba(88,166,255,0.15);
    color: var(--accent);
    white-space: nowrap;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .topic-breadcrumbs {
    display: flex;
    gap: 6px;
    padding: 4px 12px;
    overflow-x: hidden;
    flex-wrap: nowrap;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .topic-breadcrumbs:empty { display: none; }
  .topic-chip {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 10px;
    background: rgba(88,166,255,0.1);
    color: var(--text-dim);
    cursor: pointer;
    white-space: nowrap;
    border: 1px solid transparent;
    transition: all 0.15s;
  }
  .topic-chip:hover { background: rgba(88,166,255,0.25); color: var(--accent); }
  .topic-chip.active { background: rgba(88,166,255,0.2); color: var(--accent); border-color: var(--accent); }

  /* ── Input ── */
  .thread-input {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    background: var(--surface);
  }
  .thread-input textarea {
    flex: 0 0 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    resize: none;
    overflow-y: auto;
    height: 36px;
    max-height: 36px;
    line-height: 1.4;
  }
  .thread-input textarea:focus { border-color: var(--accent); }
  .thread-input .upload-wrap { order: 1; }
  .thread-input #sendBtn {
    order: 3;
    margin-left: auto;
  }
  .thread-input #interruptBtn {
    order: 4;
    background: var(--red, #e53935);
    display: none;
  }
  .thread-input button {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  .thread-input button:hover { opacity: 0.9; }
  .thread-input button:disabled { opacity: 0.5; cursor: not-allowed; }
  .thread-input textarea:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Upload Button ── */
  .upload-wrap {
    position: relative;
    display: inline-flex;
  }
  .upload-wrap input[type="file"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    z-index: 1;
  }
  .upload-wrap input[type="file"]:disabled { cursor: not-allowed; }
  .upload-btn {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .upload-btn:hover { border-color: var(--accent); color: var(--accent); }
  .upload-btn.disabled { opacity: 0.5; cursor: not-allowed; }
  .upload-wrap.uploading { pointer-events: none; }
  .upload-wrap.uploading .upload-btn {
    color: transparent;
  }
  .upload-wrap.uploading .upload-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    margin: auto;
    width: 14px; height: 14px;
    border: 2px solid var(--text-dim);
    border-top-color: transparent;
    border-radius: 50%;
    animation: btn-spin 0.6s linear infinite;
  }

  .msg.file-upload .file-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .msg.file-upload .file-icon { font-size: 16px; }

  /* ── Voice Dictation ── */
  .voice-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    order: 2;
  }
  .voice-toggle {
    display: flex;
    align-items: center;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    overflow: hidden;
  }
  .voice-toggle button {
    padding: 8px 10px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .voice-toggle button.active {
    background: var(--green);
    color: #fff;
  }
  .voice-toggle button:not(.active):hover {
    background: rgba(88,166,255,0.1);
  }
  .voice-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    padding: 0;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  .voice-btn:hover { border-color: var(--accent); color: var(--accent); }
  .voice-btn.recording {
    border-color: #e74c3c;
    background: #e74c3c;
    color: #fff;
    animation: voice-pulse 1.5s ease-in-out infinite;
  }
  .voice-btn.disabled { opacity: 0.4; cursor: not-allowed; }
  .voice-btn.inactive { opacity: 0.3; cursor: default; }
  @keyframes voice-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
    50% { box-shadow: 0 0 0 6px rgba(231, 76, 60, 0); }
  }
  .voice-partial {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .thread-messages.drag-over {
    outline: 2px dashed var(--accent);
    outline-offset: -4px;
    background: rgba(88,166,255,0.05);
  }

  /* ── Confirm Dialog ── */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  }
  .confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    max-width: 360px;
    box-shadow: var(--shadow);
  }
  .confirm-box p { margin-bottom: 16px; font-size: 14px; line-height: 1.5; }
  .confirm-box .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .confirm-box button {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .confirm-box button.danger-btn {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .confirm-box button:hover { opacity: 0.9; }

  /* ── Unread Badge ── */
  .unread-badge {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
    margin-left: 6px;
  }

  .version-mismatch {
    color: #e8a735;
    font-size: 10px;
    font-weight: 600;
  }

  /* ── Create Agent Button ── */
  .create-agent-btn {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    text-align: left;
    margin: 8px 12px;
    box-sizing: border-box;
    width: calc(100% - 24px);
  }
  .create-agent-btn:hover { color: var(--accent); border-color: var(--accent); }

  /* ── Create Agent Modal ── */
  .create-modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .create-modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 100%;
    max-width: 640px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .create-modal-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
  }
  .create-modal-header input {
    flex: 1;
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 16px;
    outline: none;
    box-sizing: border-box;
  }
  .create-modal-header input:focus { border-color: var(--accent); }
  .create-modal-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    padding: 0 16px 16px;
  }
  .create-modal-body textarea {
    flex: 1;
    width: 100%;
    min-height: 300px;
    background: var(--bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 12px;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 12px;
    resize: none;
    outline: none;
    box-sizing: border-box;
    margin-top: 12px;
  }
  .create-modal-body textarea:focus { border-color: var(--accent); }
  .create-modal-actions {
    display: flex;
    gap: 8px;
    padding: 12px 16px;
    border-top: 1px solid var(--border);
  }
  .create-modal-actions button {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  .create-modal-actions .primary { background: var(--accent); color: #fff; }
  .create-modal-actions .primary:hover { opacity: 0.9; }
  .create-modal-actions .primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .create-modal-actions .secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .create-modal-actions .secondary:hover { border-color: var(--accent); color: var(--accent); }
  .create-modal-actions .cancel { background: transparent; border: none; color: var(--text-dim); margin-left: auto; }
  .create-modal-actions .cancel:hover { color: var(--text); }
  .create-form-actions button.secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── System message ── */
  .msg.system-msg {
    align-self: center;
    max-width: 90%;
    background: rgba(139,148,158,0.08);
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-size: 12px;
    font-style: italic;
  }

  /* ── Button loading state ── */
  .agent-actions button.loading {
    opacity: 0.5;
    pointer-events: none;
    position: relative;
  }
  .agent-actions button.loading::after {
    content: '';
    width: 10px; height: 10px;
    border: 2px solid var(--text-dim);
    border-top-color: transparent;
    border-radius: 50%;
    animation: btn-spin 0.6s linear infinite;
    display: inline-block;
    margin-left: 4px;
    vertical-align: middle;
  }
  @keyframes btn-spin {
    to { transform: rotate(360deg); }
  }


  /* ── Agent failure reason ── */
  .agent-failure {
    font-size: 11px;
    color: var(--red);
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Thread header enriched ── */
  .thread-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    position: relative;
    font-size: 14px;
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Thread tabs ── */
  .thread-tabs {
    display: flex;
    gap: 2px;
    margin-left: auto;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 2px;
  }
  .thread-tabs button {
    padding: 4px 12px;
    border: none;
    border-radius: calc(var(--radius) - 2px);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .thread-tabs button:hover { color: var(--fg); }
  .thread-tabs button.active {
    background: var(--surface);
    color: var(--fg);
  }
  .clear-chat-btn {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: 4px;
  }
  .clear-chat-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── Persona panel ── */
  .persona-panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--fg);
  }
  .persona-panel .persona-empty {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    padding: 40px 20px;
  }
  .persona-panel pre {
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: inherit;
    margin: 0;
  }

  .watch-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: #0d1117;
  }
  .watch-output {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.4;
    color: #c9d1d9;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .watch-output .watch-status {
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 11px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .watch-keys {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    justify-content: center;
    align-items: center;
  }
  .watch-keys button {
    min-width: 36px;
    height: 32px;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.1s;
    font-family: inherit;
  }
  .watch-keys button:hover { border-color: var(--accent); color: var(--accent); }
  .watch-keys button:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .watch-resize-btn { margin-left: auto; font-size: 12px !important; }
  .watch-type {
    display: flex;
    gap: 6px;
    padding: 6px 12px 8px;
    border-top: 1px solid var(--border);
    align-items: center;
  }
  .watch-type-input {
    flex: 1;
    height: 32px;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
    outline: none;
    box-sizing: border-box;
  }
  .watch-type-input:focus { border-color: var(--accent); }
  .watch-type button {
    height: 32px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .watch-type button:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Reminder panel ── */
  .reminder-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    padding: 20px;
    font-size: 13px;
    line-height: 1.5;
    gap: 10px;
  }
  .reminder-empty {
    color: var(--text-dim);
    font-style: italic;
    text-align: center;
    padding: 40px 20px;
  }
  .reminder-add-form {
    display: flex;
    flex-direction: column;
    gap: 8px;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 4px;
  }
  .reminder-add-form textarea {
    width: 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    resize: vertical;
    min-height: 60px;
    line-height: 1.4;
  }
  .reminder-add-form textarea:focus { border-color: var(--accent); }
  .reminder-add-form .reminder-form-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .reminder-add-form input[type="number"] {
    width: 100px;
    padding: 6px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
  }
  .reminder-add-form input[type="number"]:focus { border-color: var(--accent); }
  .reminder-add-form button {
    padding: 6px 14px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
  }
  .reminder-add-form button:hover { border-color: var(--accent); color: var(--accent); }
  .reminder-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 10px 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    transition: border-color 0.15s;
  }
  .reminder-item.active {
    border-color: var(--accent);
    background: #1c2333;
  }
  .reminder-item.completed {
    opacity: 0.5;
  }
  .reminder-item.completed .reminder-prompt {
    text-decoration: line-through;
  }
  .reminder-item .reminder-content {
    flex: 1;
    min-width: 0;
  }
  .reminder-item .reminder-prompt {
    font-size: 13px;
    color: var(--text);
    word-break: break-word;
    margin-bottom: 4px;
  }
  .reminder-item .reminder-meta {
    display: flex;
    gap: 10px;
    font-size: 11px;
    color: var(--text-dim);
    align-items: center;
  }
  .reminder-item .reminder-badge {
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .reminder-badge.active { background: rgba(88,166,255,0.15); color: var(--accent); }
  .reminder-badge.pending { background: rgba(139,148,158,0.15); color: var(--text-dim); }
  .reminder-badge.completed { background: rgba(63,185,80,0.15); color: var(--green); }
  .reminder-section-label {
    margin-top: 6px;
    padding: 0 2px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--text-dim);
  }
  .reminder-actions {
    display: flex;
    gap: 4px;
    flex-shrink: 0;
  }
  .reminder-actions button {
    width: 28px;
    height: 28px;
    padding: 0;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .reminder-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .reminder-actions button.danger:hover { border-color: var(--red); color: var(--red); }
  .reminder-actions button.complete:hover { border-color: var(--green); color: var(--green); }

  .reminder-edit-overlay {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  .reminder-edit-modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    width: 100%; max-width: 480px; padding: 16px; display: flex; flex-direction: column; gap: 12px;
  }
  .reminder-edit-modal textarea {
    width: 100%; min-height: 80px; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 4px; padding: 10px;
    font-size: 16px; font-family: inherit; resize: vertical; outline: none; box-sizing: border-box;
  }
  .reminder-edit-modal textarea:focus { border-color: var(--accent); }
  .reminder-edit-modal .edit-row {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .reminder-edit-modal label {
    display: flex; align-items: center; gap: 6px; font-size: 13px; color: var(--text-dim); cursor: pointer;
  }
  .reminder-edit-modal input[type="number"] {
    width: 70px; padding: 8px; border: 1px solid var(--border); border-radius: 4px;
    background: var(--bg); color: var(--text); font-size: 16px; outline: none;
  }
  .reminder-edit-modal .actions {
    display: flex; gap: 8px; justify-content: flex-end;
  }
  .reminder-edit-modal .actions button {
    padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer;
  }
  .reminder-edit-modal .actions .save { background: var(--green); color: #fff; border: none; }
  .reminder-edit-modal .actions .cancel { background: transparent; color: var(--text-dim); border: 1px solid var(--border); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    box-shadow: var(--shadow);
    pointer-events: none;
    animation: toast-in 0.2s ease;
  }
  .toast.error   { background: var(--red); }
  .toast.warning { background: var(--orange); }
  .toast.success { background: var(--green); }

  @keyframes toast-in {
    from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── Auth Modal ── */
  .auth-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10001;
  }
  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    max-width: 380px;
    width: 90%;
    box-shadow: var(--shadow);
  }
  .auth-box h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .auth-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.5; }
  .auth-box input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
  }
  .auth-box input:focus { border-color: var(--accent); }
  .auth-box .auth-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .auth-box button {
    padding: 8px 20px;
    border-radius: 6px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .auth-box button.primary { background: var(--accent); color: #fff; }
  .auth-box button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .auth-box button:hover { opacity: 0.9; }

  /* ── Command Palette (cmd+k) ── */
  .cmd-palette-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    justify-content: center;
    padding-top: 20vh;
    z-index: 10000;
  }
  .cmd-palette {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    width: 90%;
    max-width: 480px;
    max-height: 400px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    align-self: flex-start;
  }
  .cmd-palette input {
    width: 100%;
    padding: 12px 16px;
    border: none;
    border-bottom: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    font-size: 15px;
    outline: none;
    border-radius: var(--radius) var(--radius) 0 0;
  }
  .cmd-palette-results {
    overflow-y: auto;
    flex: 1;
    padding: 4px 0;
  }
  .cmd-palette-item {
    padding: 8px 16px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .cmd-palette-item:hover, .cmd-palette-item.selected {
    background: rgba(88,166,255,0.1);
  }
  .cmd-palette-item .cp-name { flex: 1; color: var(--text); }
  .cmd-palette-item .cp-name mark { background: transparent; color: var(--accent); font-weight: 600; }
  .cmd-palette-item .cp-state { font-size: 11px; padding: 2px 6px; border-radius: 4px; }
  .cmd-palette-item .cp-engine { font-size: 11px; color: var(--text-dim); }
  .cmd-palette-item .cp-unread { background: var(--accent); color: #fff; font-size: 10px; padding: 1px 5px; border-radius: 8px; font-weight: 600; }
  .cmd-palette-empty { padding: 16px; text-align: center; color: var(--text-dim); font-size: 13px; }
  .cmd-palette-hint { padding: 6px 16px; border-top: 1px solid var(--border); font-size: 11px; color: var(--text-dim); display: flex; gap: 12px; }
  .cmd-palette-hint kbd { background: var(--bg); padding: 1px 5px; border-radius: 3px; border: 1px solid var(--border); font-size: 10px; }

  /* ── Search Input ── */
  .agent-search {
    position: relative;
    padding: 8px 12px;
  }
  .agent-search input {
    width: 100%;
    padding: 8px 30px 8px 32px;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 16px;
    outline: none;
    box-sizing: border-box;
  }
  .agent-search input:focus { border-color: var(--accent); }
  .agent-search .search-icon {
    position: absolute;
    left: 22px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--text-dim);
    pointer-events: none;
  }
  .agent-search .search-clear {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
    color: var(--text-dim);
    cursor: pointer;
    display: none;
    background: none;
    border: none;
    padding: 2px 4px;
    line-height: 1;
  }
  .agent-search .search-clear:hover { color: var(--text); }
  .filter-chips {
    display: flex;
    gap: 6px;
    padding: 0 12px 8px;
    flex-wrap: wrap;
  }
  .filter-chip {
    padding: 3px 10px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    font-size: 11px;
    cursor: pointer;
    white-space: nowrap;
  }
  .filter-chip:hover { border-color: var(--accent); color: var(--accent); }
  .filter-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  /* ── Indicators ── */
  .indicator-badges { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 4px; }
  .indicator-badge {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
  }
  .indicator-badge.warning { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .indicator-badge.danger { background: rgba(248,81,73,0.15); color: var(--red); }
  .indicator-badge.info { background: rgba(88,166,255,0.15); color: var(--accent); }
  .indicator-action {
    font-size: 10px; padding: 2px 8px; border-radius: 10px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); cursor: pointer; text-transform: capitalize;
  }
  .indicator-action:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Persona frontmatter table ── */
  .persona-meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 12px;
    font-size: 12px;
    margin-bottom: 16px;
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .persona-meta dt {
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    font-size: 11px;
    padding: 2px 0;
  }
  .persona-meta dd {
    color: var(--text);
    padding: 2px 0;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 12px;
  }
  .persona-fm-details summary {
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: var(--text-secondary);
    margin-bottom: 8px;
    user-select: none;
  }
  .persona-fm-details summary:hover { color: var(--text); }
  .persona-yaml {
    font-size: 12px;
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
    line-height: 1.5;
    margin-top: 0;
  }
  .persona-body {
    white-space: normal;
    word-wrap: break-word;
    font-family: inherit;
    margin: 0;
    line-height: 1.7;
  }
  .persona-body ul, .persona-body ol { margin: 4px 0; padding-left: 20px; }
  .persona-body li { margin: 2px 0; }
  .persona-cheatsheet {
    margin-top: 8px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 11px;
  }
  .persona-cheatsheet summary {
    padding: 6px 10px;
    cursor: pointer;
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    user-select: none;
  }
  .persona-cheatsheet summary:hover { color: var(--accent); }
  .persona-cheatsheet-body { padding: 0 10px 10px; }
  .persona-cheatsheet-section { margin-bottom: 8px; }
  .persona-cheatsheet-section strong { font-size: 11px; }
  .persona-cheatsheet-section dl {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 2px 10px;
    margin: 4px 0 0;
  }
  .persona-cheatsheet-section dt {
    font-family: 'SFMono-Regular', Consolas, monospace;
    color: var(--accent);
    padding: 1px 0;
  }
  .persona-cheatsheet-section dd {
    color: var(--text-dim);
    padding: 1px 0;
  }
  .persona-cheatsheet-section em { font-style: normal; color: var(--yellow); }

  /* ── Mobile back button ── */
  .mobile-back {
    display: none;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    margin-right: 4px;
  }
  .mobile-back:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    html, body { overflow-x: hidden; }
    .layout { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .agent-list {
      border-right: none;
      height: calc(100vh - 49px);
      height: calc(100dvh - 49px);
      max-height: none;
    }
    .thread-panel { height: calc(100vh - 49px); height: calc(100dvh - 49px); }
    .layout.mobile-thread .agent-sidebar { display: none; }
    .layout.mobile-thread .thread-panel { display: flex; }
    .layout:not(.mobile-thread) .thread-panel { display: none; }
    .layout:not(.mobile-thread) .agent-sidebar { display: flex; }
    .mobile-back { display: block; }
    .msg { max-width: 85%; }
    .thread-input {
      padding: 8px 10px;
      gap: 6px;
    }
    .thread-input textarea {
      font-size: 16px; /* prevent iOS zoom */
    }
    .voice-toggle button {
      font-size: 16px; /* prevent iOS zoom */
    }
    .voice-controls {
      order: 3;
      flex: 0 0 auto;
    }
    .voice-partial { display: none; }
    header h1 { font-size: 14px; }
    header { padding: 10px 12px; }
    .hotkey-hints { display: none; }
    .agent-card { padding: 10px; }
    .agent-card[draggable] { cursor: pointer; }
    .drag-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
      color: var(--text-dim);
      cursor: grab;
      padding: 8px 4px;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .drag-handle:active { color: var(--accent); }
    .agent-card { position: relative; padding-right: 40px; }
    .agent-header { flex-wrap: wrap; gap: 4px; }
    .agent-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: calc(100vw - 140px);
    }
    .agent-meta {
      flex-wrap: wrap;
      gap: 6px 10px;
    }
    .agent-meta span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: calc(100vw - 60px);
    }
    .agent-actions { gap: 4px; }
    .agent-actions button { padding: 4px 8px; font-size: 11px; }
    .agent-search { padding: 8px; }
    .filter-chips { padding: 0 8px 6px; }
    .agent-search .search-icon { left: 18px; }
    .agent-search .search-clear { right: 14px; }
    .agent-list { padding: 8px; overflow-x: hidden; }
    .create-form-body input,
    .create-form-body select,
    .create-form-body textarea { font-size: 16px; } /* prevent iOS zoom */
    .thread-header {
      flex-wrap: wrap;
      padding: 10px 12px;
      gap: 6px;
    }
    .thread-header > span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 50vw;
    }
    .thread-tabs {
      order: 10;
      width: 100%;
      margin-left: 0;
      justify-content: stretch;
    }
    .thread-tabs button {
      flex: 1;
      text-align: center;
    }
    .clear-chat-btn { margin-left: auto; }
    .thread-messages { padding: 12px 10px; }
    .msg-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      column-gap: 8px;
      row-gap: 4px;
    }
    .msg-sender {
      grid-column: 1;
    }
    .msg-topic {
      grid-column: 2;
      max-width: 40vw;
    }
    .msg-meta {
      grid-column: 1 / -1;
      width: 100%;
      margin-left: 0;
      justify-content: flex-end;
    }
    .persona-panel { padding: 14px 10px; }
    .reminder-panel { padding: 14px 10px; }
    .watch-panel { padding: 10px 8px; font-size: 11px; }
  }
</style>
</head>
<body>
<header>
  <h1>Agentic Collab</h1>
  <div class="hotkey-hints">
    <kbd>&#8984;K</kbd> search
    <kbd>Enter</kbd> send
    <kbd>Space</kbd> PTT
    <kbd>Esc</kbd> close
  </div>
  <div class="conn-status">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">Disconnected</span>
  </div>
</header>
<div class="layout">
  <div class="agent-sidebar">
    <div id="createFormContainer"></div>
    <div class="agent-search">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="agentSearch" placeholder="Filter agents..." autocomplete="off" />
      <button class="search-clear" id="agentSearchClear" type="button">&times;</button>
    </div>
    <div class="filter-chips" id="filterChips">
      <button class="filter-chip" data-filter="active">Active</button>
      <button class="filter-chip" data-filter="idle">Idle</button>
      <button class="filter-chip" data-filter="unread">Unread</button>
      <button class="filter-chip" data-filter="recent">Recent</button>
    </div>
    <div class="agent-list" id="agentList">
    </div>
  </div>
  <div class="thread-panel" id="threadPanel">
    <div class="thread-header" id="threadHeader">Select an agent</div>
    <div class="thread-messages" id="threadMessages">
      <div class="thread-empty">Select an agent to view messages</div>
    </div>
    <div class="persona-panel" id="personaPanel" style="display:none"></div>
    <div class="reminder-panel" id="reminderPanel" style="display:none"></div>
    <div class="watch-panel" id="watchPanel" style="display:none"></div>
    <div class="topic-breadcrumbs" id="topicBreadcrumbs" style="display:none"></div>
    <div class="thread-input" id="threadInput" style="display:none">
      <textarea id="msgInput" placeholder="Type a message..." rows="1" autocomplete="off" autocorrect="on" autocapitalize="sentences" spellcheck="false" name="msg-no-autofill"></textarea>
      <div class="upload-wrap" id="uploadWrap">
        <input type="file" id="fileInput" multiple disabled />
        <span class="upload-btn" id="uploadBtn">+</span>
      </div>
      <div class="voice-controls" id="voiceControls" style="display:none">
        <div class="voice-toggle" id="voiceToggle">
          <button data-mode="off" class="active">Off</button>
          <button data-mode="ptt">PTT</button>
        </div>
        <button class="voice-btn inactive" id="voiceBtn" title="Hold to talk (or hold Spacebar)">&#127908;</button>
        <span class="voice-partial" id="voicePartial"></span>
      </div>
      <button id="sendBtn" disabled>Send</button>
      <button id="interruptBtn" style="display:none">Interrupt</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ── Auth ──
  // Token persisted in localStorage across sessions
  function getToken() {
    return localStorage.getItem('orchestrator_token') || '';
  }

  function setToken(token) {
    if (token) localStorage.setItem('orchestrator_token', token);
    else localStorage.removeItem('orchestrator_token');
  }

  function authHeaders() {
    const token = getToken();
    const headers = { 'content-type': 'application/json' };
    if (token) headers['authorization'] = `Bearer ${token}`;
    return headers;
  }

  function handleAuthError() {
    setToken('');
    promptForToken('Authentication failed. Please re-enter your token.');
  }

  function promptForToken(message) {
    // Remove existing overlay if present
    const existing = document.querySelector('.auth-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'auth-overlay';
    overlay.innerHTML = `
      <div class="auth-box">
        <h2>Agentic Collab</h2>
        <p>${esc(message || 'Enter your orchestrator token to connect, or skip for dev mode (no auth).')}</p>
        <input type="password" id="authTokenInput" placeholder="Orchestrator token" autocomplete="off" />
        <div class="auth-actions">
          <button class="secondary" id="authSkipBtn">Dev Mode</button>
          <button class="primary" id="authConnectBtn">Connect</button>
        </div>
      </div>
    `;

    function submit(token) {
      setToken(token);
      overlay.remove();
      // Reconnect with new token
      if (ws) { ws.onclose = null; ws.close(); }
      connect();
    }

    overlay.querySelector('#authConnectBtn').onclick = () => {
      const val = document.getElementById('authTokenInput').value.trim();
      if (!val) { document.getElementById('authTokenInput').style.borderColor = 'var(--red)'; return; }
      submit(val);
    };
    overlay.querySelector('#authSkipBtn').onclick = () => submit('');
    overlay.querySelector('#authTokenInput').onkeydown = (e) => {
      if (e.key === 'Enter') overlay.querySelector('#authConnectBtn').click();
    };

    document.body.appendChild(overlay);
    setTimeout(() => document.getElementById('authTokenInput')?.focus(), 50);
  }

  // ── State ──
  const state = {
    agents: [],
    threads: {},
    selected: null,
    connected: false,
    unread: {},  // { agentName: count }
    threadView: 'messages',  // 'messages' | 'persona' | 'watch'
    watchTimer: null,
    personaCache: {},  // { agentName: { content, fetched } }
    searchFilter: '',
    quickFilter: null,  // null | 'active' | 'idle' | 'unread' | 'recent'
    engineUsage: {},  // { engine: EngineUsage }
    proxies: [],      // registered proxy list from init
    emptyGroups: [],  // groups created via + New Group (no agents yet)
    drafts: {},       // { agentName: draftText }
    topicPerAgent: {},  // { agentName: selectedTopic } — persists across agent switches
    editingPersona: false,
    indicators: {},   // { agentName: ActiveIndicator[] }
  };

  // Expose state for test probe when running in test mode
  if (new URLSearchParams(location.search).has('test')) {
    window.__dashboardState = state;
  }

  const VOICE_TO_TEXT_PREFIX = 'sent via voice-to-text: ';

  let ws = null;
  let reconnectTimer = null;
  let reconnectDelay = 1000;
  let hasEverConnected = false;

  // ── WebSocket ──
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const token = getToken();
    const tokenParam = token ? `?token=${encodeURIComponent(token)}` : '';
    let opened = false;
    ws = new WebSocket(`${proto}://${location.host}/ws${tokenParam}`);

    ws.onopen = () => {
      opened = true;
      hasEverConnected = true;
      state.connected = true;
      reconnectDelay = 1000;
      updateConnStatus();
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    };

    ws.onclose = () => {
      state.connected = false;
      updateConnStatus();
      if (!opened) {
        if (!hasEverConnected) {
          // First connect attempt failed — likely auth failure (401 on upgrade)
          setToken('');
          promptForToken('Connection rejected — enter your orchestrator token.');
          return;
        }
        // Previously connected but reconnect failed — network issue, keep retrying
      }
      const jitter = Math.random() * 1000;
      reconnectTimer = setTimeout(connect, reconnectDelay + jitter);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (evt) => {
      let data;
      try {
        data = JSON.parse(evt.data);
      } catch (err) {
        console.warn('Malformed WebSocket frame:', err);
        return;
      }
      switch (data.type) {
        case 'init':
          state.agents = data.agents;
          state.threads = data.threads;
          state.proxies = data.proxies || [];
          state.indicators = data.indicators || {};
          // Restore unread counts from server, preserving any live increments
          if (data.unreadCounts) {
            for (const [agent, count] of Object.entries(data.unreadCounts)) {
              // Only set if not already tracked (preserves counts from messages received this session)
              if (state.unread[agent] === undefined) {
                state.unread[agent] = count;
              }
            }
          }
          renderAgents();
          renderThread();
          updatePageTitle();
          break;
        case 'agent_update':
          updateAgent(data.agent);
          break;
        case 'message':
          addMessage(data.msg);
          break;
        case 'queue_update':
          handleQueueUpdate(data.message);
          break;
        case 'message_withdrawn':
          handleMessageWithdrawn(data.msg);
          break;
        case 'proxy_update':
          if (data.proxies) {
            state.proxies = data.proxies;
            // Patch only agents that have a proxyId — no full rebuild
            for (const agent of state.agents) {
              if (!agent.proxyId) continue;
              const card = document.querySelector(`[data-agent="${agent.name}"]`);
              if (card) patchAgentCard(card, agent);
            }
          }
          break;
        case 'agent_destroyed':
          state.agents = state.agents.filter(a => a.name !== data.name);
          delete state.threads[data.name];
          delete state.unread[data.name];
          if (state.selected === data.name) {
            state.selected = null;
            renderThread();
          }
          renderAgents();
          break;
        case 'indicator_update':
          state.indicators[data.agentName] = data.indicators;
          { const card = document.querySelector(`[data-agent="${data.agentName}"]`);
            const agent = state.agents.find(a => a.name === data.agentName);
            if (card && agent) patchAgentCard(card, agent);
            else renderAgents(); }
          break;
        case 'reminder_update':
          if (state.threadView === 'reminders') renderReminders();
          break;
      }
    };
  }

  function updateConnStatus() {
    const dot = document.getElementById('connDot');
    const label = document.getElementById('connLabel');
    dot.classList.toggle('connected', state.connected);
    label.textContent = state.connected ? 'Connected' : 'Disconnected';
  }

  // ── State Updates ──

  // Patch an existing agent card in-place — no DOM teardown/rebuild.
  // Only touches the sub-elements that actually change between updates.
  function patchAgentCard(card, agent) {
    // State badge
    const badge = card.querySelector('.state-badge');
    if (badge) {
      badge.className = `state-badge state-${agent.state}`;
      badge.textContent = agent.state;
    }
    // Agent name + unread badge
    const nameEl = card.querySelector('.agent-name');
    if (nameEl) {
      const unreadCount = state.unread[agent.name] || 0;
      const unreadBadge = unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : '';
      nameEl.innerHTML = `${esc(agent.name)}${unreadBadge}`;
    }
    // Meta line (engine/model, context %)
    const meta = card.querySelector('.agent-meta');
    if (meta) {
      const modelStr = [agent.engine, agent.model, agent.thinking].filter(Boolean).join(' ');
      const ctxStr = agent.lastContextPct != null ? `${agent.lastContextPct}%` : '--';
      meta.innerHTML = `<span>${esc(modelStr)}</span><span>ctx: ${ctxStr}</span>${agent.proxyId ? `<span title="proxy: ${esc(agent.proxyId)}">${esc(agent.proxyId)}${proxyVersionWarning(agent.proxyId)}</span>` : ''}`;
    }
    // Failure info
    let failEl = card.querySelector('.agent-failure');
    if (agent.state === 'failed' && agent.failureReason) {
      if (!failEl) {
        failEl = document.createElement('div');
        failEl.className = 'agent-failure';
        const meta = card.querySelector('.agent-meta');
        if (meta) meta.after(failEl);
      }
      failEl.title = agent.failureReason;
      failEl.textContent = agent.failureReason;
    } else if (failEl) {
      failEl.remove();
    }
    // Indicators
    let indEl = card.querySelector('.indicator-badges');
    const inds = state.indicators[agent.name] || [];
    if (inds.length) {
      const indHtml = inds.map(ind => {
        let html = '<span class="indicator-badge ' + esc(ind.style) + '">' + esc(ind.badge) + '</span>';
        if (ind.actions) {
          html += Object.keys(ind.actions).map(a =>
            '<button class="indicator-action" data-action="indicator/' + esc(ind.id) + '/' + esc(a) + '">' + esc(a) + '</button>'
          ).join('');
        }
        return html;
      }).join('');
      if (!indEl) {
        indEl = document.createElement('div');
        indEl.className = 'indicator-badges';
        const handle = card.querySelector('.drag-handle');
        if (handle) handle.before(indEl);
      }
      indEl.innerHTML = indHtml;
    } else if (indEl) {
      indEl.remove();
    }
    // Actions — only rebuild if state category changed
    const actions = card.querySelector('.agent-actions');
    if (actions) {
      const activeIdle = agent.state === 'active' || agent.state === 'idle';
      const suspendedFailed = agent.state === 'suspended' || agent.state === 'failed';
      const transitioning = agent.state === 'spawning' || agent.state === 'suspending' || agent.state === 'resuming';
      const isVoid = agent.state === 'void';
      let actionsHtml = '';
      if (activeIdle) {
        actionsHtml = `${agent.engine !== 'codex' ? '<button data-action="compact">Compact</button>' : ''}<button data-action="exit">Exit</button><button class="danger" data-action="kill">Kill</button>${agent.tmuxSession ? `<button class="secondary" data-copy-tmux="tmux attach -t ${esc(agent.tmuxSession)}">Copy tmux</button>` : ''}`;
      } else if (suspendedFailed) {
        actionsHtml = '<button data-action="resume">Resume</button><button class="danger" data-action="destroy">Destroy</button>';
      } else if (transitioning) {
        actionsHtml = '<button class="danger" data-action="kill">Kill</button>';
      } else if (isVoid) {
        actionsHtml = '<button data-action="spawn">Spawn</button><button class="danger" data-action="destroy">Destroy</button>';
      }
      if (activeIdle && agent.customButtons) {
        try {
          const btns = JSON.parse(agent.customButtons);
          actionsHtml += Object.keys(btns).map(b =>
            `<button class="secondary" data-action="custom/${esc(b)}">${esc(b)}</button>`
          ).join('');
        } catch {}
      }
      actions.innerHTML = actionsHtml;
    }
    // Selected state
    card.classList.toggle('selected', state.selected === agent.name);
  }

  function updateAgent(agent) {
    const idx = state.agents.findIndex(a => a.name === agent.name);
    const isNew = idx < 0;
    if (idx >= 0) state.agents[idx] = agent;
    else state.agents.push(agent);
    if (isNew) {
      // Structural change — need full rebuild
      renderAgents();
    } else {
      // Patch existing card in-place — no DOM teardown
      const card = document.querySelector(`[data-agent="${agent.name}"]`);
      if (card) patchAgentCard(card, agent);
      else renderAgents(); // card not found (collapsed group?), fallback
    }
    if (agent.name === state.selected) {
      updateSendability();
      // Update state badge in thread header too
      const header = document.getElementById('threadHeader');
      const hBadge = header.querySelector('.state-badge');
      if (hBadge) {
        hBadge.className = `state-badge state-${agent.state}`;
        hBadge.textContent = agent.state;
      }
    }
  }

  function addMessage(msg) {
    if (!state.threads[msg.agent]) state.threads[msg.agent] = [];
    state.threads[msg.agent].push(msg);
    if (state.selected === msg.agent && state.threadView === 'messages') {
      // Append single message — no full re-render
      const messages = document.getElementById('threadMessages');
      const emptyMsg = messages.querySelector('.thread-empty');
      if (emptyMsg) emptyMsg.remove();
      const el = buildMessageEl(msg, msg.agent);
      messages.appendChild(el);
      messages.scrollTop = messages.scrollHeight;
    } else if (state.selected !== msg.agent) {
      // Track unread for non-selected agents
      state.unread[msg.agent] = (state.unread[msg.agent] || 0) + 1;
    }

    // Flash the agent card + patch unread badge in-place
    const card = document.querySelector(`[data-agent="${msg.agent}"]`);
    if (card) {
      const agent = state.agents.find(a => a.name === msg.agent);
      if (agent) patchAgentCard(card, agent);
      if (state.selected !== msg.agent) {
        card.classList.add('flash');
        setTimeout(() => card.classList.remove('flash'), 600);
      }
    }
    updatePageTitle();
  }

  function handleMessageWithdrawn(msg) {
    const thread = state.threads[msg.agent];
    if (!thread) return;
    const idx = thread.findIndex(m => m.id === msg.id);
    if (idx >= 0) {
      thread[idx] = msg;
      if (state.selected === msg.agent) renderThread();
    }
  }

  // ── Render ──

  // Full DOM rebuild — only called for structural changes (add/remove agent,
  // group changes, init). Routine updates use patchAgentCard() in-place.
  function renderAgents() {
    const list = document.getElementById('agentList');

    // Preserve create form input values and focus before clearing
    // Clear agent list (search and create form are outside the scroll container)
    list.innerHTML = '';

    const filter = state.searchFilter.toLowerCase();
    let filtered = filter
      ? state.agents.filter(a => a.name.toLowerCase().includes(filter) || a.engine.toLowerCase().includes(filter) || a.state.toLowerCase().includes(filter) || (a.agentGroup || '').toLowerCase().includes(filter))
      : state.agents;

    // Apply quick filter chip
    if (state.quickFilter === 'active') {
      filtered = filtered.filter(a => a.state === 'active');
    } else if (state.quickFilter === 'idle') {
      filtered = filtered.filter(a => a.state === 'idle');
    } else if (state.quickFilter === 'unread') {
      filtered = filtered.filter(a => (state.unread[a.name] || 0) > 0);
    } else if (state.quickFilter === 'recent') {
      filtered = filtered.filter(a => a.lastActivity).sort((a, b) =>
        new Date(b.lastActivity).getTime() - new Date(a.lastActivity).getTime()
      ).slice(0, 10);
    }

    // Update chip active states
    document.querySelectorAll('.filter-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.filter === state.quickFilter);
    });

    // Group agents
    const groups = new Map();
    for (const agent of filtered) {
      const g = agent.agentGroup || 'General';
      if (!groups.has(g)) groups.set(g, []);
      groups.get(g).push(agent);
    }
    // Include empty groups created via "+ New Group"
    if (state.emptyGroups) {
      for (const g of state.emptyGroups) {
        if (!groups.has(g)) groups.set(g, []);
      }
    }
    // Sort: use saved order from localStorage, then General first, then alphabetical
    const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
    const sortedGroups = [...groups.keys()].sort((a, b) => {
      const ai = savedOrder.indexOf(a);
      const bi = savedOrder.indexOf(b);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      if (a === 'General') return -1;
      if (b === 'General') return 1;
      return a.localeCompare(b);
    });

    // New Agent button — opens creation modal
    const formContainer = document.getElementById('createFormContainer');
    if (formContainer && !formContainer.hasChildNodes()) {
      const btn = document.createElement('button');
      btn.className = 'create-agent-btn';
      btn.textContent = '+ New Agent';
      btn.onclick = () => openCreateAgentModal();
      formContainer.appendChild(btn);
    }

    const collapsedGroups = JSON.parse(localStorage.getItem('collapsedGroups') || '[]');
    for (const groupName of sortedGroups) {
      const isCollapsed = collapsedGroups.includes(groupName);
      const showHeader = sortedGroups.length > 1 || groupName !== 'General';
      if (showHeader) {
        const groupHeader = document.createElement('div');
        groupHeader.className = `agent-group-header${isCollapsed ? ' collapsed' : ''}`;
        groupHeader.setAttribute('draggable', 'true');
        groupHeader.dataset.group = groupName;
        const label = document.createElement('span');
        label.innerHTML = `<span class="group-chevron">\u25BC</span>${esc(groupName)}`;
        label.style.cursor = 'pointer';
        label.onclick = (e) => {
          e.stopPropagation();
          const saved = JSON.parse(localStorage.getItem('collapsedGroups') || '[]');
          const idx = saved.indexOf(groupName);
          if (idx !== -1) saved.splice(idx, 1); else saved.push(groupName);
          localStorage.setItem('collapsedGroups', JSON.stringify(saved));
          renderAgents();
        };
        groupHeader.appendChild(label);
        if (groupName !== 'General') {
          const actions = document.createElement('span');
          actions.className = 'group-actions';
          actions.innerHTML = '<button class="group-rename" title="Rename group">&#9998;</button><button class="group-delete" title="Delete group">&#10005;</button>';
          actions.querySelector('.group-rename').onclick = async (e) => {
            e.stopPropagation();
            const newName = await promptInput('Rename group:', groupName);
            if (!newName || newName === groupName) return;
            renameGroup(groupName, newName);
          };
          actions.querySelector('.group-delete').onclick = (e) => {
            e.stopPropagation();
            deleteGroup(groupName);
          };
          groupHeader.appendChild(actions);
        }
        list.appendChild(groupHeader);
      }

    if (showHeader && isCollapsed) continue;
    for (const agent of groups.get(groupName)) {
      const card = document.createElement('div');
      card.className = `agent-card${state.selected === agent.name ? ' selected' : ''}`;
      card.dataset.agent = agent.name;

      const stateClass = `state-${agent.state}`;
      const modelStr = [agent.engine, agent.model, agent.thinking].filter(Boolean).join(' ');
      const ctxStr = agent.lastContextPct != null ? `${agent.lastContextPct}%` : '--';
      const unreadCount = state.unread[agent.name] || 0;
      const unreadBadge = unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : '';

      const activeIdle = agent.state === 'active' || agent.state === 'idle';
      const suspendedFailed = agent.state === 'suspended' || agent.state === 'failed';
      const transitioning = agent.state === 'spawning' || agent.state === 'suspending' || agent.state === 'resuming';
      const isVoid = agent.state === 'void';
      const failureInfo = agent.state === 'failed' && agent.failureReason
        ? `<div class="agent-failure" title="${esc(agent.failureReason)}">${esc(agent.failureReason)}</div>` : '';
      card.setAttribute('tabindex', '0');
      card.setAttribute('draggable', 'true');
      card.innerHTML = `
        <div class="agent-header">
          <span class="agent-name">${esc(agent.name)}${unreadBadge}</span>
          <span class="state-badge ${stateClass}">${agent.state}</span>
        </div>
        <div class="agent-meta">
          <span>${esc(modelStr)}</span>
          <span>ctx: ${ctxStr}</span>
          ${agent.proxyId ? `<span title="proxy: ${esc(agent.proxyId)}">${esc(agent.proxyId)}${proxyVersionWarning(agent.proxyId)}</span>` : ''}
        </div>
        ${failureInfo}
        ${(() => {
          const inds = state.indicators[agent.name] || [];
          if (!inds.length) return '';
          const indHtml = inds.map(ind => {
            let html = '<span class="indicator-badge ' + esc(ind.style) + '">' + esc(ind.badge) + '</span>';
            if (ind.actions) {
              html += Object.keys(ind.actions).map(a =>
                '<button class="indicator-action" data-action="indicator/' + esc(ind.id) + '/' + esc(a) + '">' + esc(a) + '</button>'
              ).join('');
            }
            return html;
          }).join('');
          return '<div class="indicator-badges">' + indHtml + '</div>';
        })()}
        <div class="drag-handle" title="Drag to reorder or move to group">\u2261</div>
        <div class="agent-actions">
          ${activeIdle ? `
            ${agent.engine !== 'codex' ? '<button data-action="compact">Compact</button>' : ''}
            <button data-action="exit">Exit</button>
            <button class="danger" data-action="kill">Kill</button>
            ${agent.tmuxSession ? `<button class="secondary" data-copy-tmux="tmux attach -t ${esc(agent.tmuxSession)}">Copy tmux</button>` : ''}
          ` : ''}
          ${suspendedFailed ? `
            <button data-action="resume">Resume</button>
            <button class="danger" data-action="destroy">Destroy</button>
          ` : ''}
          ${transitioning ? `
            <button class="danger" data-action="kill">Kill</button>
          ` : ''}
          ${isVoid ? `
            <button data-action="spawn">Spawn</button>
            <button class="danger" data-action="destroy">Destroy</button>
          ` : ''}
          ${activeIdle && agent.customButtons ? (() => {
            try {
              const btns = JSON.parse(agent.customButtons);
              return Object.keys(btns).map(b =>
                `<button class="secondary" data-action="custom/${esc(b)}">${esc(b)}</button>`
              ).join('');
            } catch { return ''; }
          })() : ''}
        </div>
      `;
      list.appendChild(card);
    }
    } // end group loop

    // New Group button
    const newGroupBtn = document.createElement('button');
    newGroupBtn.className = 'secondary';
    newGroupBtn.style.cssText = 'margin-top:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:11px;cursor:pointer;width:100%;text-align:left';
    newGroupBtn.textContent = '+ New Group';
    newGroupBtn.onmouseenter = () => { newGroupBtn.style.borderColor = 'var(--accent)'; newGroupBtn.style.color = 'var(--accent)'; };
    newGroupBtn.onmouseleave = () => { newGroupBtn.style.borderColor = 'var(--border)'; newGroupBtn.style.color = 'var(--text-dim)'; };
    newGroupBtn.onclick = async () => {
      const groupName = await promptInput('Group name:');
      if (!groupName) return;
      // Add to saved section order so it persists
      const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
      if (!savedOrder.includes(groupName)) {
        savedOrder.push(groupName);
        localStorage.setItem('sectionOrder', JSON.stringify(savedOrder));
      }
      // Create a placeholder so the group header renders
      // The group will appear empty until agents are moved into it
      if (!state.emptyGroups) state.emptyGroups = [];
      if (!state.emptyGroups.includes(groupName)) state.emptyGroups.push(groupName);
      renderAgents();
    };
    list.appendChild(newGroupBtn);

    // Engine status summary
    const engineSummary = document.createElement('div');
    engineSummary.style.cssText = 'margin-top:12px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:12px';
    const engineCounts = {};
    for (const a of state.agents) {
      if (!engineCounts[a.engine]) engineCounts[a.engine] = { total: 0, active: 0, idle: 0, failed: 0 };
      engineCounts[a.engine].total++;
      if (a.state === 'active') engineCounts[a.engine].active++;
      else if (a.state === 'idle') engineCounts[a.engine].idle++;
      else if (a.state === 'failed') engineCounts[a.engine].failed++;
    }
    let engineHtml = '<div style="font-weight:600;margin-bottom:6px;color:var(--text)">Engines</div>';
    for (const engine of ['claude', 'codex', 'opencode']) {
      const c = engineCounts[engine];
      if (!c) {
        engineHtml += `<div style="color:var(--text-dim);margin:2px 0">${engine}: <span style="color:var(--text-dim)">not configured</span></div>`;
      } else {
        const parts = [];
        if (c.active) parts.push(`<span style="color:var(--green)">${c.active} active</span>`);
        if (c.idle) parts.push(`<span style="color:var(--yellow)">${c.idle} idle</span>`);
        if (c.failed) parts.push(`<span style="color:var(--red)">${c.failed} failed</span>`);
        const rest = c.total - c.active - c.idle - c.failed;
        if (rest > 0) parts.push(`${rest} other`);
        engineHtml += `<div style="margin:2px 0">${engine}: ${parts.join(', ')}</div>`;

        // Usage buckets
        const usage = state.engineUsage[engine];
        if (usage && usage.buckets && usage.buckets.length > 0) {
          for (const b of usage.buckets) {
            const barPct = Math.min(100, Math.max(0, b.pctUsed));
            const color = barPct >= 80 ? 'var(--red)' : barPct >= 50 ? 'var(--yellow)' : 'var(--green)';
            engineHtml += `<div style="margin:2px 0 2px 12px;font-size:11px;color:var(--text-dim)">`;
            engineHtml += `${b.label}: `;
            engineHtml += `<span style="display:inline-block;width:60px;height:8px;background:var(--border);border-radius:4px;vertical-align:middle;overflow:hidden">`;
            engineHtml += `<span style="display:block;width:${barPct}%;height:100%;background:${color};border-radius:4px"></span></span>`;
            engineHtml += ` <span style="color:${color}">${b.pctUsed}%</span>`;
            if (b.resetsAt) engineHtml += ` <span style="font-size:10px">(resets ${b.resetsAt})</span>`;
            engineHtml += `</div>`;
          }
          const ago = timeAgo(usage.queriedAt);
          engineHtml += `<div style="margin:1px 0 4px 12px;font-size:10px;color:var(--text-dim)">queried ${ago}</div>`;
        }
      }
    }
    engineSummary.innerHTML = engineHtml;
    list.appendChild(engineSummary);

    // Re-apply search/quick filter after full rebuild
    if (state.searchFilter || state.quickFilter) applySearchFilter();
  }

  function renderThread() {
    // Don't re-render if user is editing a persona — would destroy their work
    if (state.editingPersona && state.threadView === 'persona') return;

    const header = document.getElementById('threadHeader');
    const messages = document.getElementById('threadMessages');
    const personaPanel = document.getElementById('personaPanel');
    const reminderPanel = document.getElementById('reminderPanel');
    const watchPanel = document.getElementById('watchPanel');
    const input = document.getElementById('threadInput');

    // Stop watch polling when leaving the tab
    if (state.watchTimer) {
      clearInterval(state.watchTimer);
      state.watchTimer = null;
    }

    if (!state.selected) {
      header.textContent = 'Select an agent';
      messages.innerHTML = '<div class="thread-empty">Select an agent to view messages</div>';
      personaPanel.style.display = 'none';
      reminderPanel.style.display = 'none';
      watchPanel.style.display = 'none';
      input.style.display = 'none';
      document.getElementById('topicBreadcrumbs').style.display = 'none';
      return;
    }

    const selectedAgent = state.agents.find(a => a.name === state.selected);
    const headerBadge = selectedAgent ? `<span class="state-badge state-${selectedAgent.state}">${selectedAgent.state}</span>` : '';
    const tabs = `<div class="thread-tabs">
      <button class="${state.threadView === 'messages' ? 'active' : ''}" data-tab="messages">Messages</button>
      <button class="${state.threadView === 'persona' ? 'active' : ''}" data-tab="persona">Persona</button>
      <button class="${state.threadView === 'reminders' ? 'active' : ''}" data-tab="reminders">Reminders</button>
      <button class="${state.threadView === 'watch' ? 'active' : ''}" data-tab="watch">Watch</button>
      <button class="${state.threadView === 'archive' ? 'active' : ''}" data-tab="archive">Archive</button>
    </div>`;
    const clearBtn = `<button class="clear-chat-btn" id="clearChatBtn" title="Archive chat">\u2715</button>`;
    header.innerHTML = `<button class="mobile-back" id="mobileBackBtn">\u2190</button><span>${esc(state.selected)}</span>${headerBadge}${tabs}${clearBtn}`;
    document.getElementById('mobileBackBtn').onclick = mobileBack;
    document.getElementById('clearChatBtn').onclick = () => archiveChat(state.selected);
    header.querySelectorAll('.thread-tabs button').forEach(btn => {
      btn.onclick = () => { state.editingPersona = false; state.threadView = btn.dataset.tab; renderThread(); };
    });

    const view = state.threadView;
    messages.style.display = (view === 'messages' || view === 'archive') ? 'flex' : 'none';
    personaPanel.style.display = view === 'persona' ? 'block' : 'none';
    reminderPanel.style.display = view === 'reminders' ? 'flex' : 'none';
    watchPanel.style.display = view === 'watch' ? 'flex' : 'none';
    input.style.display = view === 'messages' ? 'flex' : 'none';
    const breadcrumbs = document.getElementById('topicBreadcrumbs');
    breadcrumbs.style.display = view === 'messages' ? 'flex' : 'none';
    renderTopicBreadcrumbs();

    if (view === 'persona') {
      renderPersona();
      return;
    }

    if (view === 'reminders') {
      renderReminders();
      return;
    }

    if (view === 'watch') {
      startWatchPolling();
      return;
    }

    if (view === 'archive') {
      renderArchive();
      return;
    }

    const thread = state.threads[state.selected] || [];
    if (thread.length === 0) {
      messages.innerHTML = '<div class="thread-empty">No messages yet</div>';
      return;
    }

    // Render only the last PAGE_SIZE messages. Older messages load on scroll-up.
    const PAGE_SIZE = 30;
    messages.innerHTML = '';
    const agent = state.selected;
    const startIdx = Math.max(0, thread.length - PAGE_SIZE);
    state._threadRenderedFrom = startIdx; // track how far back we've rendered

    const frag = document.createDocumentFragment();
    for (let i = startIdx; i < thread.length; i++) {
      frag.appendChild(buildMessageEl(thread[i], agent));
    }
    messages.appendChild(frag);
    messages.scrollTop = messages.scrollHeight;

    // Progressive loading: prepend older messages when user scrolls near top
    messages.onscroll = () => {
      if (state.selected !== agent) return;
      if (messages.scrollTop > 80 || state._threadRenderedFrom <= 0) return;
      const from = state._threadRenderedFrom;
      const loadFrom = Math.max(0, from - PAGE_SIZE);
      const olderFrag = document.createDocumentFragment();
      for (let i = loadFrom; i < from; i++) {
        olderFrag.appendChild(buildMessageEl(thread[i], agent));
      }
      const prevHeight = messages.scrollHeight;
      messages.prepend(olderFrag);
      messages.scrollTop += messages.scrollHeight - prevHeight;
      state._threadRenderedFrom = loadFrom;
    };
  }

  // Build a single message DOM element — used by both renderThread and addMessage
  function buildMessageEl(msg, agentName) {
    const div = document.createElement('div');
    const isSystem = msg.message && msg.message.startsWith('[system]');
    const isUpload = msg.topic === 'file-upload' && msg.direction === 'to_agent';
    if (isSystem) {
      div.className = 'msg system-msg';
    } else if (isUpload) {
      div.className = 'msg to-agent file-upload';
    } else {
      div.className = `msg ${msg.direction === 'to_agent' ? 'to-agent' : 'from-agent'}`;
    }
    if (msg.withdrawn) div.classList.add('withdrawn');
    const fromLabel = isSystem ? 'system' : (msg.sourceAgent || (msg.direction === 'to_agent' ? 'dashboard' : agentName));
    const toLabel = msg.targetAgent || (msg.direction === 'to_agent' ? agentName : 'dashboard');
    const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    const topicBadge = msg.topic ? `<span class="msg-topic">${esc(msg.topic)}</span>` : '';
    const routeStr = `${esc(fromLabel)} \u2192 ${esc(toLabel)}`;
    const displayMsg = isSystem ? msg.message.replace(/^\[system\]\s*/, '') : msg.message;
    const statusHtml = (msg.direction === 'to_agent' && msg.queueId)
      ? `<span class="msg-status ${msg.deliveryStatus || 'pending'}" data-queue-id="${msg.queueId}">${
          msg.deliveryStatus === 'delivered' ? '\u2713 delivered' :
          msg.deliveryStatus === 'failed' ? '\u2717 failed' :
          '\u2022\u2022\u2022 sending'
        }</span>`
      : '';
    const canWithdraw = msg.direction === 'to_agent' && !isSystem && !msg.withdrawn && (!msg.sourceAgent || msg.sourceAgent === 'dashboard');
    const withdrawHtml = canWithdraw ? `<span class="msg-withdraw" data-msg-id="${msg.id}" title="Withdraw message">unsend</span>` : '';
    const copyBtn = `<button class="msg-copy" title="Copy message">&#128203;</button>`;
    const headerHtml = `<div class="msg-header"><span class="msg-sender">${routeStr}</span>${topicBadge}<span class="msg-meta">${copyBtn}${withdrawHtml}<span class="msg-time">${time}</span>${statusHtml}</span></div>`;
    if (isUpload) {
      div.innerHTML = `${headerHtml}<div class="file-info"><span class="file-icon">&#128206;</span> ${esc(displayMsg)}</div>`;
    } else {
      div.innerHTML = `${headerHtml}<div class="msg-body">${renderMarkdown(esc(displayMsg))}</div>`;
    }
    div.querySelector('.msg-copy')?.addEventListener('click', (e) => {

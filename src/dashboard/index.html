<body>

  <!-- Mobile hamburger — hidden on desktop, fixed top-left on mobile. -->
  <button class="mobile-menu" id="mobileMenuBtn" aria-label="Open sidebar" type="button">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>

  <aside class="sidebar" id="sidebar"></aside>

  <!-- Scrim — tap to close drawer on mobile. -->
  <div class="sidebar-scrim" id="sidebarScrim" aria-hidden="true"></div>

  <main class="main" id="route-root">

      <div class="eyebrow">Loading</div>
      <h1 class="title">agentic-collab</h1>
      <p class="lede">Connecting to orchestrator&hellip;</p>

    <a class="tab" href="#/" data-tab="dashboard">

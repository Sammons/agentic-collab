<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Agentic Collab</title>
<link rel="stylesheet" href="/dashboard/assets/dashboard.css">
</head>
<body>
<header>
  <h1>Agentic Collab</h1>
  <div class="hotkey-hints">
    <kbd>&#8984;K</kbd> search
    <kbd>Enter</kbd> send
    <kbd>Space</kbd> PTT
    <kbd>Esc</kbd> close
  </div>
  <div class="conn-status">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">Disconnected</span>
  </div>
</header>
<div class="layout">
  <div class="agent-sidebar">
    <div id="createFormContainer"></div>
    <div class="agent-search">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="agentSearch" placeholder="Filter agents..." autocomplete="off" />
      <button class="search-clear" id="agentSearchClear" type="button">&times;</button>
    </div>
    <div class="filter-chips" id="filterChips">
      <button class="filter-chip" data-filter="active">Active</button>
      <button class="filter-chip" data-filter="idle">Idle</button>
      <button class="filter-chip" data-filter="unread">Unread</button>
      <button class="filter-chip" data-filter="recent">Recent</button>
    </div>
    <div class="agent-list" id="agentList">
    </div>
  </div>
  <div class="thread-panel" id="threadPanel">
    <div class="thread-header" id="threadHeader">Select an agent</div>
    <message-list class="thread-messages" id="threadMessages">
      <div class="thread-empty">Select an agent to view messages</div>
    </message-list>
    <div class="persona-panel" id="personaPanel" style="display:none"></div>
    <reminder-panel class="reminder-panel" id="reminderPanel" style="display:none"></reminder-panel>
    <watch-panel class="watch-panel" id="watchPanel" style="display:none"></watch-panel>
    <div class="topic-breadcrumbs" id="topicBreadcrumbs" style="display:none"></div>
    <message-input class="thread-input" id="threadInput" style="display:none">
    </message-input>
    <div class="voice-controls" id="voiceControls" style="display:none">
      <div class="voice-toggle" id="voiceToggle">
        <button data-mode="off" class="active">Off</button>
        <button data-mode="ptt">PTT</button>
      </div>
      <button class="voice-btn inactive" id="voiceBtn" title="Hold to talk (or hold Spacebar)">&#127908;</button>
      <span class="voice-partial" id="voicePartial"></span>
    </div>
  </div>
</div>

<script type="module">
import { state, on, emit, getToken, setToken, authHeaders } from '/dashboard/assets/state.js';
import { esc, renderMarkdown, timeAgo, formatFileSize, showToast, promptInput, confirmAction } from '/dashboard/assets/utils.js';
import '/dashboard/assets/agent-card.js';
import '/dashboard/assets/message-list.js';
import '/dashboard/assets/message-input.js';
import '/dashboard/assets/watch-panel.js';
import '/dashboard/assets/reminder-panel.js';
import '/dashboard/assets/archive-panel.js';
import { agentAction, openCreateAgentModal, setup as setupLifecycle } from '/dashboard/assets/agent-lifecycle.js';
import { sendMessage, uploadFile, handleFileUpload, updateSendability, handleQueueUpdate, archiveChat, unarchiveChat, renderArchive, setup as setupMessageIO } from '/dashboard/assets/message-io.js';
import { voiceState, initVoice, initCommandPalette, setup as setupVoicePalette } from '/dashboard/assets/voice-palette.js';
import { handleAuthError, connect, fetchEngineUsage, setup as setupConnection } from '/dashboard/assets/connection.js';
{

  // handleAuthError, promptForToken — imported from connection.js

  // ── State ──
  // State imported from /dashboard/assets/state.js

  // Expose state for test probe when running in test mode
  if (new URLSearchParams(location.search).has('test')) {
    window.__dashboardState = state;
  }

  // VOICE_TO_TEXT_PREFIX — moved to message-io.js
  // ws, connect, updateConnStatus, promptForToken — moved to connection.js

  // ── State Updates ──

  // Patch an existing agent card in-place via component's update() method.
  function patchAgentCard(card, agent) {
    if (card.update) {
      card.update(agent, {
        unread: state.unread[agent.name] || 0,
        indicators: state.indicators[agent.name] || [],
        selected: state.selected === agent.name,
        proxies: state.proxies,
      });
    }
  }

  function updateAgent(agent) {
    const idx = state.agents.findIndex(a => a.name === agent.name);
    const isNew = idx < 0;
    if (idx >= 0) state.agents[idx] = agent;
    else state.agents.push(agent);
    if (isNew) {
      // Structural change — need full rebuild
      renderAgents();
    } else {
      // Patch existing card in-place — no DOM teardown
      const card = document.querySelector(`[data-agent="${agent.name}"]`);
      if (card) patchAgentCard(card, agent);
      else renderAgents(); // card not found (collapsed group?), fallback
    }
    if (agent.name === state.selected) {
      updateSendability();
      // Update state badge in thread header too
      const header = document.getElementById('threadHeader');
      const hBadge = header.querySelector('.state-badge');
      if (hBadge) {
        hBadge.className = `state-badge state-${agent.state}`;
        hBadge.textContent = agent.state;
      }
    }
  }

  function addMessage(msg) {
    if (!state.threads[msg.agent]) state.threads[msg.agent] = [];
    state.threads[msg.agent].push(msg);
    if (state.selected === msg.agent && state.threadView === 'messages') {
      // Append single message via component — no full re-render
      const messages = document.getElementById('threadMessages');
      messages.appendMessage(msg, msg.agent);
    } else if (state.selected !== msg.agent) {
      // Track unread for non-selected agents
      state.unread[msg.agent] = (state.unread[msg.agent] || 0) + 1;
    }

    // Flash the agent card + patch unread badge in-place
    const card = document.querySelector(`[data-agent="${msg.agent}"]`);
    if (card) {
      const agent = state.agents.find(a => a.name === msg.agent);
      if (agent) patchAgentCard(card, agent);
      if (state.selected !== msg.agent) {
        card.classList.add('flash');
        setTimeout(() => card.classList.remove('flash'), 600);
      }
    }
    updatePageTitle();
  }

  function handleMessageWithdrawn(msg) {
    const thread = state.threads[msg.agent];
    if (!thread) return;
    const idx = thread.findIndex(m => m.id === msg.id);
    if (idx >= 0) {
      thread[idx] = msg;
      if (state.selected === msg.agent) renderThread();
    }
  }

  // ── Render ──

  // Full DOM rebuild — only called for structural changes (add/remove agent,
  // group changes, init). Routine updates use patchAgentCard() in-place.
  function renderAgents() {
    const list = document.getElementById('agentList');

    // Preserve create form input values and focus before clearing
    // Clear agent list (search and create form are outside the scroll container)
    list.innerHTML = '';

    const filter = state.searchFilter.toLowerCase();
    let filtered = filter
      ? state.agents.filter(a => a.name.toLowerCase().includes(filter) || a.engine.toLowerCase().includes(filter) || a.state.toLowerCase().includes(filter) || (a.agentGroup || '').toLowerCase().includes(filter))
      : state.agents;

    // Apply quick filter chip
    if (state.quickFilter === 'active') {
      filtered = filtered.filter(a => a.state === 'active');
    } else if (state.quickFilter === 'idle') {
      filtered = filtered.filter(a => a.state === 'idle');
    } else if (state.quickFilter === 'unread') {
      filtered = filtered.filter(a => (state.unread[a.name] || 0) > 0);
    } else if (state.quickFilter === 'recent') {
      filtered = filtered.filter(a => a.lastActivity).sort((a, b) =>
        new Date(b.lastActivity).getTime() - new Date(a.lastActivity).getTime()
      ).slice(0, 10);
    }

    // Update chip active states
    document.querySelectorAll('.filter-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.filter === state.quickFilter);
    });

    // Group agents
    const groups = new Map();
    for (const agent of filtered) {
      const g = agent.agentGroup || 'General';
      if (!groups.has(g)) groups.set(g, []);
      groups.get(g).push(agent);
    }
    // Include empty groups created via "+ New Group"
    if (state.emptyGroups) {
      for (const g of state.emptyGroups) {
        if (!groups.has(g)) groups.set(g, []);
      }
    }
    // Sort: use saved order from localStorage, then General first, then alphabetical
    const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
    const sortedGroups = [...groups.keys()].sort((a, b) => {
      const ai = savedOrder.indexOf(a);
      const bi = savedOrder.indexOf(b);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      if (a === 'General') return -1;
      if (b === 'General') return 1;
      return a.localeCompare(b);
    });

    // New Agent button — opens creation modal
    const formContainer = document.getElementById('createFormContainer');
    if (formContainer && !formContainer.hasChildNodes()) {
      const btn = document.createElement('button');
      btn.className = 'create-agent-btn';
      btn.textContent = '+ New Agent';
      btn.onclick = () => openCreateAgentModal();
      formContainer.appendChild(btn);
    }

    const collapsedGroups = JSON.parse(localStorage.getItem('collapsedGroups') || '[]');
    for (const groupName of sortedGroups) {
      const isCollapsed = collapsedGroups.includes(groupName);
      const showHeader = sortedGroups.length > 1 || groupName !== 'General';
      if (showHeader) {
        const groupHeader = document.createElement('div');
        groupHeader.className = `agent-group-header${isCollapsed ? ' collapsed' : ''}`;
        groupHeader.setAttribute('draggable', 'true');
        groupHeader.dataset.group = groupName;
        const label = document.createElement('span');
        label.innerHTML = `<span class="group-chevron">\u25BC</span>${esc(groupName)}`;
        label.style.cursor = 'pointer';
        label.onclick = (e) => {
          e.stopPropagation();
          const saved = JSON.parse(localStorage.getItem('collapsedGroups') || '[]');
          const idx = saved.indexOf(groupName);
          if (idx !== -1) saved.splice(idx, 1); else saved.push(groupName);
          localStorage.setItem('collapsedGroups', JSON.stringify(saved));
          renderAgents();
        };
        groupHeader.appendChild(label);
        if (groupName !== 'General') {
          const actions = document.createElement('span');
          actions.className = 'group-actions';
          actions.innerHTML = '<button class="group-rename" title="Rename group">&#9998;</button><button class="group-delete" title="Delete group">&#10005;</button>';
          actions.querySelector('.group-rename').onclick = async (e) => {
            e.stopPropagation();
            const newName = await promptInput('Rename group:', groupName);
            if (!newName || newName === groupName) return;
            renameGroup(groupName, newName);
          };
          actions.querySelector('.group-delete').onclick = (e) => {
            e.stopPropagation();
            deleteGroup(groupName);
          };
          groupHeader.appendChild(actions);
        }
        list.appendChild(groupHeader);
      }

    if (showHeader && isCollapsed) continue;
    for (const agent of groups.get(groupName)) {
      const card = document.createElement('agent-card');
      card.render(agent, {
        unread: state.unread[agent.name] || 0,
        indicators: state.indicators[agent.name] || [],
        selected: state.selected === agent.name,
        proxies: state.proxies,
      });
      list.appendChild(card);
    }
    } // end group loop

    // New Group button
    const newGroupBtn = document.createElement('button');
    newGroupBtn.className = 'secondary';
    newGroupBtn.style.cssText = 'margin-top:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:11px;cursor:pointer;width:100%;text-align:left';
    newGroupBtn.textContent = '+ New Group';
    newGroupBtn.onmouseenter = () => { newGroupBtn.style.borderColor = 'var(--accent)'; newGroupBtn.style.color = 'var(--accent)'; };
    newGroupBtn.onmouseleave = () => { newGroupBtn.style.borderColor = 'var(--border)'; newGroupBtn.style.color = 'var(--text-dim)'; };
    newGroupBtn.onclick = async () => {
      const groupName = await promptInput('Group name:');
      if (!groupName) return;
      // Add to saved section order so it persists
      const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
      if (!savedOrder.includes(groupName)) {
        savedOrder.push(groupName);
        localStorage.setItem('sectionOrder', JSON.stringify(savedOrder));
      }
      // Create a placeholder so the group header renders
      // The group will appear empty until agents are moved into it
      if (!state.emptyGroups) state.emptyGroups = [];
      if (!state.emptyGroups.includes(groupName)) state.emptyGroups.push(groupName);
      renderAgents();
    };
    list.appendChild(newGroupBtn);

    // Engine status summary
    const engineSummary = document.createElement('div');
    engineSummary.style.cssText = 'margin-top:12px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:12px';
    const engineCounts = {};
    for (const a of state.agents) {
      if (!engineCounts[a.engine]) engineCounts[a.engine] = { total: 0, active: 0, idle: 0, failed: 0 };
      engineCounts[a.engine].total++;
      if (a.state === 'active') engineCounts[a.engine].active++;
      else if (a.state === 'idle') engineCounts[a.engine].idle++;
      else if (a.state === 'failed') engineCounts[a.engine].failed++;
    }
    let engineHtml = '<div style="font-weight:600;margin-bottom:6px;color:var(--text)">Engines</div>';
    for (const engine of ['claude', 'codex', 'opencode']) {
      const c = engineCounts[engine];
      if (!c) {
        engineHtml += `<div style="color:var(--text-dim);margin:2px 0">${engine}: <span style="color:var(--text-dim)">not configured</span></div>`;
      } else {
        const parts = [];
        if (c.active) parts.push(`<span style="color:var(--green)">${c.active} active</span>`);
        if (c.idle) parts.push(`<span style="color:var(--yellow)">${c.idle} idle</span>`);
        if (c.failed) parts.push(`<span style="color:var(--red)">${c.failed} failed</span>`);
        const rest = c.total - c.active - c.idle - c.failed;
        if (rest > 0) parts.push(`${rest} other`);
        engineHtml += `<div style="margin:2px 0">${engine}: ${parts.join(', ')}</div>`;

        // Usage buckets
        const usage = state.engineUsage[engine];
        if (usage && usage.buckets && usage.buckets.length > 0) {
          for (const b of usage.buckets) {
            const barPct = Math.min(100, Math.max(0, b.pctUsed));
            const color = barPct >= 80 ? 'var(--red)' : barPct >= 50 ? 'var(--yellow)' : 'var(--green)';
            engineHtml += `<div style="margin:2px 0 2px 12px;font-size:11px;color:var(--text-dim)">`;
            engineHtml += `${b.label}: `;
            engineHtml += `<span style="display:inline-block;width:60px;height:8px;background:var(--border);border-radius:4px;vertical-align:middle;overflow:hidden">`;
            engineHtml += `<span style="display:block;width:${barPct}%;height:100%;background:${color};border-radius:4px"></span></span>`;
            engineHtml += ` <span style="color:${color}">${b.pctUsed}%</span>`;
            if (b.resetsAt) engineHtml += ` <span style="font-size:10px">(resets ${b.resetsAt})</span>`;
            engineHtml += `</div>`;
          }
          const ago = timeAgo(usage.queriedAt);
          engineHtml += `<div style="margin:1px 0 4px 12px;font-size:10px;color:var(--text-dim)">queried ${ago}</div>`;
        }
      }
    }
    engineSummary.innerHTML = engineHtml;
    list.appendChild(engineSummary);

    // Re-apply search/quick filter after full rebuild
    if (state.searchFilter || state.quickFilter) applySearchFilter();
  }

  function renderThread() {
    // Don't re-render if user is editing a persona — would destroy their work
    if (state.editingPersona && state.threadView === 'persona') return;

    const header = document.getElementById('threadHeader');
    const messages = document.getElementById('threadMessages');
    const personaPanel = document.getElementById('personaPanel');
    const reminderPanel = document.getElementById('reminderPanel');
    const watchPanel = document.getElementById('watchPanel');
    const input = document.getElementById('threadInput');

    // Stop watch polling when leaving the tab
    const watchEl = document.getElementById('watchPanel');
    watchEl.stop();

    if (!state.selected) {
      header.textContent = 'Select an agent';
      messages.innerHTML = '<div class="thread-empty">Select an agent to view messages</div>';
      personaPanel.style.display = 'none';
      reminderPanel.style.display = 'none';
      watchPanel.style.display = 'none';
      input.style.display = 'none';
      document.getElementById('topicBreadcrumbs').style.display = 'none';
      return;
    }

    const selectedAgent = state.agents.find(a => a.name === state.selected);
    const headerBadge = selectedAgent ? `<span class="state-badge state-${selectedAgent.state}">${selectedAgent.state}</span>` : '';
    const tabs = `<div class="thread-tabs">
      <button class="${state.threadView === 'messages' ? 'active' : ''}" data-tab="messages">Messages</button>
      <button class="${state.threadView === 'persona' ? 'active' : ''}" data-tab="persona">Persona</button>
      <button class="${state.threadView === 'reminders' ? 'active' : ''}" data-tab="reminders">Reminders</button>
      <button class="${state.threadView === 'watch' ? 'active' : ''}" data-tab="watch">Watch</button>
      <button class="${state.threadView === 'archive' ? 'active' : ''}" data-tab="archive">Archive</button>
    </div>`;
    const clearBtn = `<button class="clear-chat-btn" id="clearChatBtn" title="Archive chat">\u2715</button>`;
    header.innerHTML = `<button class="mobile-back" id="mobileBackBtn">\u2190</button><span>${esc(state.selected)}</span>${headerBadge}${tabs}${clearBtn}`;
    document.getElementById('mobileBackBtn').onclick = mobileBack;
    document.getElementById('clearChatBtn').onclick = () => archiveChat(state.selected);
    header.querySelectorAll('.thread-tabs button').forEach(btn => {
      btn.onclick = () => { state.editingPersona = false; state.threadView = btn.dataset.tab; renderThread(); };
    });

    const view = state.threadView;
    messages.style.display = (view === 'messages' || view === 'archive') ? 'flex' : 'none';
    personaPanel.style.display = view === 'persona' ? 'block' : 'none';
    reminderPanel.style.display = view === 'reminders' ? 'flex' : 'none';
    watchPanel.style.display = view === 'watch' ? 'flex' : 'none';
    input.style.display = view === 'messages' ? 'flex' : 'none';
    const breadcrumbs = document.getElementById('topicBreadcrumbs');
    breadcrumbs.style.display = view === 'messages' ? 'flex' : 'none';
    renderTopicBreadcrumbs();

    if (view === 'persona') {
      renderPersona();
      return;
    }

    if (view === 'reminders') {
      document.getElementById('reminderPanel').load(state.selected);
      return;
    }

    if (view === 'watch') {
      document.getElementById('watchPanel').start(state.selected);
      return;
    }

    if (view === 'archive') {
      renderArchive();
      return;
    }

    const thread = state.threads[state.selected] || [];
    messages.setMarkdownRenderer(renderMarkdown);
    messages.loadThread(thread, state.selected);
  }

  // buildMessageEl moved to message-list.js component

  function getActiveTopic() {
    if (!state.selected) return 'general';
    return state.topicPerAgent[state.selected] || 'general';
  }

  function setActiveTopic(topic) {
    if (state.selected) state.topicPerAgent[state.selected] = topic;
  }

  function renderTopicBreadcrumbs() {
    const container = document.getElementById('topicBreadcrumbs');
    if (!state.selected) { container.innerHTML = ''; return; }
    const thread = state.threads[state.selected] || [];
    // Always start with "general", then unique topics from thread (most recent first), capped at 15
    const seen = new Set(['general']);
    const topics = ['general'];
    for (let i = thread.length - 1; i >= 0 && topics.length < 15; i--) {
      const t = thread[i].topic;
      if (t && !seen.has(t)) { seen.add(t); topics.push(t); }
    }
    const current = getActiveTopic();
    container.innerHTML = topics.map(t =>
      `<span class="topic-chip${t === current ? ' active' : ''}" data-topic="${esc(t)}">${esc(t)}</span>`
    ).join('');
  }

  // Prevent mousedown on chips from stealing focus/closing mobile keyboard
  document.getElementById('topicBreadcrumbs').addEventListener('mousedown', (e) => {
    e.preventDefault();
  });
  document.getElementById('topicBreadcrumbs').addEventListener('click', (e) => {
    const chip = e.target.closest('.topic-chip');
    if (!chip) return;
    setActiveTopic(chip.dataset.topic);
    renderTopicBreadcrumbs();
    document.getElementById('threadInput')?.focus();
  });

  function updatePageTitle() {
    const totalUnread = Object.values(state.unread).reduce((sum, n) => sum + (n || 0), 0);
    const prefix = totalUnread > 0 ? `(${totalUnread}) ` : '';
    if (state.selected) {
      document.title = `${prefix}${state.selected} — Agentic Collab`;
    } else {
      document.title = `${prefix}Dashboard — Agentic Collab`;
    }
  }

  function selectAgent(name) {
    state.editingPersona = false;
    // Save draft for previous agent via component
    const prevInput = document.getElementById('threadInput');
    if (state.selected && prevInput && prevInput.getDraft) {
      const text = prevInput.getDraft();
      if (text) state.drafts[state.selected] = text;
      else delete state.drafts[state.selected];
    }
    state.selected = name;
    state.unread[name] = 0;
    updatePageTitle();
    // Auto-select most recent topic for this agent if none saved
    if (!state.topicPerAgent[name]) {
      const thread = state.threads[name] || [];
      for (let i = thread.length - 1; i >= 0; i--) {
        if (thread[i].topic) { state.topicPerAgent[name] = thread[i].topic; break; }
      }
    }
    // Persist read cursor on server so unread counts survive refresh
    fetch('/api/dashboard/read-cursor', {
      method: 'PUT',
      headers: { 'content-type': 'application/json', ...authHeaders() },
      body: JSON.stringify({ agent: name }),
    }).catch(err => console.warn('Read cursor update failed:', err));
    // Mobile: show thread panel BEFORE rendering so scrollHeight is accurate
    document.querySelector('.layout').classList.add('mobile-thread');
    // Preserve current tab (messages/persona/watch) when switching agents
    renderAgents();
    renderThread();
    // Restore draft and focus via component
    const freshInput = document.getElementById('threadInput');
    if (freshInput && freshInput.setDraft) {
      freshInput.setDraft(state.drafts[name] || '');
    }
    updateSendability();
    if (freshInput && freshInput.focus) freshInput.focus();
  }

  function mobileBack() {
    document.querySelector('.layout').classList.remove('mobile-thread');
  }

  // Wire connection module dependencies (must precede lifecycle + message-io which depend on handleAuthError)
  setupConnection({ renderAgents, renderThread, updatePageTitle, updateAgent, addMessage, handleMessageWithdrawn, handleQueueUpdate, patchAgentCard });

  // Wire agent-lifecycle module dependencies
  setupLifecycle({ handleAuthError, selectAgent });

  async function fetchPersona(name) {
    const cached = state.personaCache[name];
    if (cached && Date.now() - cached.fetched < 30000) return cached.data;
    try {
      const token = getToken();
      const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
      const res = await fetch(`/api/personas/${encodeURIComponent(name)}`, { headers });
      if (res.status === 404) {
        state.personaCache[name] = { data: null, fetched: Date.now() };
        return null;
      }
      if (!res.ok) return null;
      const data = await res.json();
      state.personaCache[name] = { data, fetched: Date.now() };
      return data;
    } catch {
      return null;
    }
  }

  const FM_CONFIG_LABELS = {
    engine: 'Engine', model: 'Model', thinking: 'Thinking',
    cwd: 'Working Dir', proxy_host: 'Proxy Host', permissions: 'Permissions',
    group: 'Group',
  };
  const FM_HOOK_FIELDS = ['start', 'resume', 'exit', 'compact', 'interrupt', 'submit'];
  const FM_ALL_KNOWN = new Set([...Object.keys(FM_CONFIG_LABELS), ...FM_HOOK_FIELDS]);

  /** Format a frontmatter value for display. Handles structured hook objects. */
  function fmtFmValue(val) {
    if (val == null) return '';
    if (typeof val === 'string') return val;
    if (typeof val === 'object') {
      if ('preset' in val) {
        let s = 'preset: ' + val.preset;
        if (val.options) s += ' (' + Object.entries(val.options).map(([k,v]) => k + '=' + v).join(', ') + ')';
        return s;
      }
      if ('shell' in val) {
        let s = 'shell: ' + val.shell;
        if (val.env) s += ' [env: ' + Object.entries(val.env).map(([k,v]) => k + '=' + v).join(', ') + ']';
        return s;
      }
      if ('send' in val && Array.isArray(val.send)) {
        return 'send: ' + val.send.map(a => {
          const type = 'keystroke' in a ? 'keystroke' : 'text' in a ? 'text' : 'paste';
          const v = a[type];
          return type + ':' + v + (a.post_wait_ms ? ' (+' + a.post_wait_ms + 'ms)' : '');
        }).join(' → ');
      }
      if ('keystrokes' in val && Array.isArray(val.keystrokes)) {
        return 'keystrokes: ' + val.keystrokes.map(a => {
          const type = 'keystroke' in a ? 'keystroke' : 'text' in a ? 'text' : 'paste';
          return type + ':' + a[type];
        }).join(' → ');
      }
      // Pipeline steps array
      if (Array.isArray(val)) {
        return val.map(s => s.type === 'shell' ? s.command : s.type === 'keystrokes' ? 'keys' : s.type).join(' → ');
      }
      return JSON.stringify(val);
    }
    return String(val);
  }

  /** Render pipeline steps as YAML lines at a given indent. */
  function renderPipelineSteps(lines, steps, indent) {
    const pad = ' '.repeat(indent);
    for (const step of steps) {
      if (step.type === 'shell') {
        lines.push(pad + '- shell: ' + step.command);
      } else if (step.type === 'keystroke') {
        lines.push(pad + '- keystroke: ' + step.key);
      } else if (step.type === 'keystrokes' && Array.isArray(step.actions)) {
        lines.push(pad + '- keystrokes:');
        for (const a of step.actions) {
          const type = 'keystroke' in a ? 'keystroke' : 'text' in a ? 'text' : 'paste';
          lines.push(pad + '  - ' + type + ': ' + a[type] + (a.post_wait_ms ? ' (+' + a.post_wait_ms + 'ms)' : ''));
        }
      } else if (step.type === 'capture') {
        lines.push(pad + '- capture:');
        lines.push(pad + '    lines: ' + step.lines);
        lines.push(pad + '    regex: ' + step.regex);
        lines.push(pad + '    var: ' + step.var);
      } else if (step.type === 'wait') {
        lines.push(pad + '- wait: ' + step.ms);
      }
    }
  }

  /** Render a frontmatter object as YAML text. Handles nested objects and arrays. */
  function fmToYaml(fm) {
    const lines = [];
    for (const [key, val] of Object.entries(fm)) {
      if (val == null || val === '') continue;
      if (typeof val === 'string' || typeof val === 'number' || typeof val === 'boolean') {
        lines.push(key + ': ' + val);
      } else if (Array.isArray(val)) {
        // Top-level array — pipeline steps (e.g. exit:, start: with pipeline format)
        lines.push(key + ':');
        renderPipelineSteps(lines, val, 2);
      } else if (typeof val === 'object') {
        lines.push(key + ':');
        for (const [sk, sv] of Object.entries(val)) {
          if (sv == null) continue;
          if (Array.isArray(sv)) {
            // Array inside object — could be custom_buttons entries or send actions
            lines.push('  ' + sk + ':');
            if (sv.length > 0 && sv[0] && typeof sv[0] === 'object' && 'type' in sv[0]) {
              // Pipeline steps (custom_buttons values)
              renderPipelineSteps(lines, sv, 4);
            } else {
              for (const item of sv) {
                if (typeof item === 'object') {
                  const entries = Object.entries(item);
                  if (entries.length > 0) {
                    lines.push('    - ' + entries[0][0] + ': ' + entries[0][1]);
                    for (let i = 1; i < entries.length; i++) {
                      lines.push('      ' + entries[i][0] + ': ' + entries[i][1]);
                    }
                  }
                } else {
                  lines.push('    - ' + item);
                }
              }
            }
          } else if (typeof sv === 'object' && !Array.isArray(sv)) {
            lines.push('  ' + sk + ':');
            for (const [ssk, ssv] of Object.entries(sv)) {
              lines.push('    ' + ssk + ': ' + ssv);
            }
          } else {
            lines.push('  ' + sk + ': ' + sv);
          }
        }
      }
    }
    return lines.join('\n');
  }

  async function renderPersona() {
    const panel = document.getElementById('personaPanel');
    if (!state.selected) return;
    panel.innerHTML = '<div class="persona-empty">Loading…</div>';
    const data = await fetchPersona(state.selected);
    if (state.threadView !== 'persona' || !state.selected) return;
    if (!data) {
      panel.innerHTML = '<div class="persona-empty">No persona defined for this agent.<br>Create <code>persistent-agents/' + esc(state.selected) + '.md</code> to add one.</div>';
      return;
    }
    let html = '<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="clear-chat-btn" id="editPersonaBtn">Edit</button></div>';
    if (data.hostname || data.filePath) {
      html += '<dl class="persona-meta">';
      if (data.hostname) html += '<dt>Host</dt><dd>' + esc(data.hostname) + '</dd>';
      if (data.filePath) html += '<dt>File</dt><dd>' + esc(data.filePath) + '</dd>';
      html += '</dl>';
    }
    const fm = data.frontmatter;
    if (fm && Object.keys(fm).length > 0) {
      html += '<details class="persona-fm-details"><summary>Frontmatter</summary><pre class="persona-yaml">' + esc(fmToYaml(fm)) + '</pre></details>';
    }
    if (data.body) {
      html += '<div class="persona-body">' + renderMarkdown(esc(data.body)) + '</div>';
    }
    panel.innerHTML = html || '<div class="persona-empty">Persona file is empty.</div>';
    const editBtn = document.getElementById('editPersonaBtn');
    if (editBtn) {
      editBtn.onclick = () => enterPersonaEdit(state.selected, data.content);
    }
  }

  // ── Group Management ──
  async function renameGroup(oldName, newName) {
    // Update all agents in this group
    const agents = state.agents.filter(a => (a.agentGroup || 'General') === oldName);
    for (const agent of agents) {
      agent.agentGroup = newName;
      fetch(`/api/agents/${encodeURIComponent(agent.name)}/group`, {
        method: 'PATCH',
        headers: { 'content-type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ group: newName }),
      }).catch(err => console.error('[group] Rename failed for', agent.name, err));
    }
    // Update saved section order
    const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
    const idx = savedOrder.indexOf(oldName);
    if (idx !== -1) savedOrder[idx] = newName;
    localStorage.setItem('sectionOrder', JSON.stringify(savedOrder));
    // Update empty groups
    if (state.emptyGroups) {
      const ei = state.emptyGroups.indexOf(oldName);
      if (ei !== -1) state.emptyGroups[ei] = newName;
    }
    renderAgents();
  }

  async function deleteGroup(groupName) {
    // Move all agents in this group back to General
    const agents = state.agents.filter(a => (a.agentGroup || 'General') === groupName);
    for (const agent of agents) {
      agent.agentGroup = null;
      fetch(`/api/agents/${encodeURIComponent(agent.name)}/group`, {
        method: 'PATCH',
        headers: { 'content-type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ group: '' }),
      }).catch(err => console.error('[group] Delete-move failed for', agent.name, err));
    }
    // Remove from saved section order
    const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
    const idx = savedOrder.indexOf(groupName);
    if (idx !== -1) savedOrder.splice(idx, 1);
    localStorage.setItem('sectionOrder', JSON.stringify(savedOrder));
    // Remove from empty groups
    if (state.emptyGroups) {
      state.emptyGroups = state.emptyGroups.filter(g => g !== groupName);
    }
    renderAgents();
  }

  // Event delegation on agent list — handles both card selection and action buttons.
  function handleAgentListEvent(e) {
    // Ignore taps on drag handle (mobile touch-drag)
    if (e.target.closest('.drag-handle')) return;

    const copyBtn = e.target.closest('button[data-copy-tmux]');
    if (copyBtn) {
      e.stopPropagation();
      const orig = copyBtn.textContent;
      navigator.clipboard.writeText(copyBtn.dataset.copyTmux).then(() => {
        copyBtn.textContent = 'Copied!';
        setTimeout(() => { copyBtn.textContent = orig; }, 1500);
      }).catch(() => {
        copyBtn.textContent = 'Failed';
        setTimeout(() => { copyBtn.textContent = orig; }, 1500);
      });
      return;
    }
    const btn = e.target.closest('button[data-action]');
    if (btn) {
      e.stopPropagation();
      if (btn.classList.contains('loading')) return;
      const card = btn.closest('[data-agent]');
      if (card) {
        btn.classList.add('loading');
        agentAction(card.dataset.agent, btn.dataset.action)
          .finally(() => btn.classList.remove('loading'));
      }
      return;
    }
    const card = e.target.closest('[data-agent]');
    if (card) selectAgent(card.dataset.agent);
  }
  document.getElementById('agentList').addEventListener('click', handleAgentListEvent);
  document.getElementById('agentList').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      handleAgentListEvent(e);
    }
  });

  let draggedAgent = null;
  let draggedGroup = null;
  const agentListEl = document.getElementById('agentList');

  function clearDragIndicators() {
    agentListEl.querySelectorAll('.drag-over-above, .drag-over-below, .drag-over').forEach(el => {
      el.classList.remove('drag-over-above', 'drag-over-below', 'drag-over');
    });
  }

  agentListEl.addEventListener('dragstart', (e) => {
    const card = e.target.closest('.agent-card[data-agent]');
    const header = e.target.closest('.agent-group-header[data-group]');
    if (card) {
      draggedAgent = card.dataset.agent;
      draggedGroup = null;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedAgent);
    } else if (header) {
      draggedGroup = header.dataset.group;
      draggedAgent = null;
      header.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedGroup);
    }
  });

  agentListEl.addEventListener('dragend', (e) => {
    const el = e.target.closest('.agent-card, .agent-group-header');
    if (el) el.classList.remove('dragging');
    clearDragIndicators();
    draggedAgent = null;
    draggedGroup = null;
  });

  agentListEl.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    clearDragIndicators();

    const header = e.target.closest('.agent-group-header[data-group]');
    const card = e.target.closest('.agent-card[data-agent]');

    if (draggedAgent && header) {
      // Agent dragged over a section header → highlight for group change
      header.classList.add('drag-over');
    } else if (draggedAgent && card && card.dataset.agent !== draggedAgent) {
      // Agent dragged over another agent → reorder indicator
      const rect = card.getBoundingClientRect();
      card.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
    } else if (draggedGroup && header && header.dataset.group !== draggedGroup) {
      // Section header dragged over another section header → reorder indicator
      const rect = header.getBoundingClientRect();
      header.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
    }
  });

  agentListEl.addEventListener('dragleave', (e) => {
    const el = e.target.closest('.agent-card, .agent-group-header');
    if (el) el.classList.remove('drag-over-above', 'drag-over-below', 'drag-over');
  });

  agentListEl.addEventListener('drop', (e) => {
    e.preventDefault();
    clearDragIndicators();

    const targetHeader = e.target.closest('.agent-group-header[data-group]');
    const targetCard = e.target.closest('.agent-card[data-agent]');

    // Case 1: Agent dropped on a section header → change group
    if (draggedAgent && targetHeader) {
      const newGroup = targetHeader.dataset.group;
      const agent = state.agents.find(a => a.name === draggedAgent);
      if (agent && (agent.agentGroup || 'General') !== newGroup) {
        agent.agentGroup = newGroup === 'General' ? null : newGroup;
        renderAgents();
        fetch(`/api/agents/${encodeURIComponent(draggedAgent)}/group`, {
          method: 'PATCH',
          headers: { 'content-type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ group: newGroup === 'General' ? '' : newGroup }),
        }).catch(err => console.error('[drag] Group change failed:', err));
      }
      return;
    }

    // Case 2: Agent dropped on another agent → reorder within list
    if (draggedAgent && targetCard && targetCard.dataset.agent !== draggedAgent) {
      const rect = targetCard.getBoundingClientRect();
      const insertBefore = e.clientY < rect.top + rect.height / 2;
      const fromIdx = state.agents.findIndex(a => a.name === draggedAgent);
      const targetName = targetCard.dataset.agent;
      if (fromIdx === -1) return;
      const [moved] = state.agents.splice(fromIdx, 1);
      let toIdx = state.agents.findIndex(a => a.name === targetName);
      if (!insertBefore) toIdx++;
      state.agents.splice(toIdx, 0, moved);

      const orders = state.agents.map((a, i) => ({ name: a.name, sortOrder: i }));
      state.agents.forEach((a, i) => { a.sortOrder = i; });
      renderAgents();

      fetch('/api/agents/reorder', {
        method: 'POST',
        headers: { 'content-type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ orders }),
      }).catch(err => console.error('[drag] Reorder save failed:', err));
      return;
    }

    // Case 3: Section header dropped on another section header → reorder sections
    if (draggedGroup && targetHeader && targetHeader.dataset.group !== draggedGroup) {
      const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
      // Build current order from DOM
      const headers = agentListEl.querySelectorAll('.agent-group-header[data-group]');
      const currentOrder = [...headers].map(h => h.dataset.group);
      // Ensure all groups are in the order list
      for (const g of currentOrder) {
        if (!savedOrder.includes(g)) savedOrder.push(g);
      }
      // Move dragged group
      const fromIdx = savedOrder.indexOf(draggedGroup);
      if (fromIdx !== -1) savedOrder.splice(fromIdx, 1);
      const rect = targetHeader.getBoundingClientRect();
      let targetIdx = savedOrder.indexOf(targetHeader.dataset.group);
      if (e.clientY >= rect.top + rect.height / 2) targetIdx++;
      savedOrder.splice(targetIdx, 0, draggedGroup);
      localStorage.setItem('sectionOrder', JSON.stringify(savedOrder));
      renderAgents();
    }
  });

  // ── Touch Drag (mobile) ──
  let touchDragState = null;

  agentListEl.addEventListener('touchstart', (e) => {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    const card = handle.closest('.agent-card[data-agent]');
    if (!card) return;
    e.preventDefault();
    const touch = e.touches[0];
    const rect = card.getBoundingClientRect();
    touchDragState = {
      agentName: card.dataset.agent,
      offsetY: touch.clientY - rect.top,
      clone: null,
      startY: touch.clientY,
    };
    // Create floating clone
    const clone = card.cloneNode(true);
    clone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;z-index:1000;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.5);border-color:var(--accent)`;
    document.body.appendChild(clone);
    touchDragState.clone = clone;
    card.style.opacity = '0.3';
  }, { passive: false });

  agentListEl.addEventListener('touchmove', (e) => {
    if (!touchDragState) return;
    e.preventDefault();
    const touch = e.touches[0];
    if (touchDragState.clone) {
      touchDragState.clone.style.top = (touch.clientY - touchDragState.offsetY) + 'px';
    }
    // Show drop indicators
    clearDragIndicators();
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (!el) return;
    const header = el.closest('.agent-group-header[data-group]');
    const targetCard = el.closest('.agent-card[data-agent]');
    if (header) {
      header.classList.add('drag-over');
    } else if (targetCard && targetCard.dataset.agent !== touchDragState.agentName) {
      const rect = targetCard.getBoundingClientRect();
      targetCard.classList.add(touch.clientY < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
    }
  }, { passive: false });

  function finishTouchDrag(e) {
    if (!touchDragState) return;
    const { agentName, clone } = touchDragState;
    if (clone) clone.remove();
    // Restore original card opacity
    const origCard = agentListEl.querySelector(`[data-agent="${agentName}"]`);
    if (origCard) origCard.style.opacity = '';

    // Find drop target
    const touch = e.changedTouches[0];
    clearDragIndicators();
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el) {
      const header = el.closest('.agent-group-header[data-group]');
      const targetCard = el.closest('.agent-card[data-agent]');

      if (header) {
        // Drop on group header → change group
        const newGroup = header.dataset.group;
        const agent = state.agents.find(a => a.name === agentName);
        if (agent && (agent.agentGroup || 'General') !== newGroup) {
          agent.agentGroup = newGroup === 'General' ? null : newGroup;
          renderAgents();
          fetch(`/api/agents/${encodeURIComponent(agentName)}/group`, {
            method: 'PATCH',
            headers: { 'content-type': 'application/json', ...authHeaders() },
            body: JSON.stringify({ group: newGroup === 'General' ? '' : newGroup }),
          }).catch(err => console.error('[touch-drag] Group change failed:', err));
        }
      } else if (targetCard && targetCard.dataset.agent !== agentName) {
        // Drop on another agent → reorder
        const rect = targetCard.getBoundingClientRect();
        const insertBefore = touch.clientY < rect.top + rect.height / 2;
        const fromIdx = state.agents.findIndex(a => a.name === agentName);
        const targetName = targetCard.dataset.agent;
        if (fromIdx !== -1) {
          const [moved] = state.agents.splice(fromIdx, 1);
          let toIdx = state.agents.findIndex(a => a.name === targetName);
          if (!insertBefore) toIdx++;
          state.agents.splice(toIdx, 0, moved);
          const orders = state.agents.map((a, i) => ({ name: a.name, sortOrder: i }));
          state.agents.forEach((a, i) => { a.sortOrder = i; });
          renderAgents();
          fetch('/api/agents/reorder', {
            method: 'POST',
            headers: { 'content-type': 'application/json', ...authHeaders() },
            body: JSON.stringify({ orders }),
          }).catch(err => console.error('[touch-drag] Reorder save failed:', err));
        }
      }
    }
    touchDragState = null;
  }

  agentListEl.addEventListener('touchend', finishTouchDrag, { passive: false });
  agentListEl.addEventListener('touchcancel', (e) => {
    if (!touchDragState) return;
    if (touchDragState.clone) touchDragState.clone.remove();
    const origCard = agentListEl.querySelector(`[data-agent="${touchDragState.agentName}"]`);
    if (origCard) origCard.style.opacity = '';
    clearDragIndicators();
    touchDragState = null;
  });

  // archiveChat, unarchiveChat, renderArchive — imported from message-io.js
  document.addEventListener('unarchive-chat', () => {
    if (state.selected) unarchiveChat(state.selected);
  });

  // sendMessage, uploadFile, handleFileUpload, showSendError — imported from message-io.js

  // Wire message-input component events
  const msgInputEl = document.getElementById('threadInput');
  msgInputEl.addEventListener('msg-send', (e) => sendMessage());
  msgInputEl.addEventListener('msg-interrupt', (e) => agentAction(e.detail.agent, 'interrupt'));
  msgInputEl.addEventListener('msg-upload', (e) => handleFileUpload(e.detail.files, e.detail.message));

  // Paste image/file from clipboard — delegate to component via event
  document.getElementById('threadInput').addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items || !state.selected) return;

    const files = [];
    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      if (item.kind === 'file') {
        const file = item.getAsFile();
        if (file) files.push(file);
      }
    }

    if (files.length === 0) return;
    e.preventDefault();
    const inputEl = document.getElementById('threadInput');
    const message = inputEl.getDraft ? inputEl.getDraft().trim() : '';
    handleFileUpload(files, message);
  });

  // Drag-and-drop on thread messages
  const threadMsgs = document.getElementById('threadMessages');
  threadMsgs.addEventListener('dragover', (e) => {
    e.preventDefault();
    threadMsgs.classList.add('drag-over');
  });
  threadMsgs.addEventListener('dragleave', () => {
    threadMsgs.classList.remove('drag-over');
  });
  threadMsgs.addEventListener('drop', (e) => {
    e.preventDefault();
    threadMsgs.classList.remove('drag-over');
    const droppedFiles = e.dataTransfer?.files;
    if (droppedFiles && droppedFiles.length > 0 && state.selected) {
      const inputEl = document.getElementById('threadInput');
      const message = inputEl?.getDraft ? inputEl.getDraft().trim() : '';
      handleFileUpload(Array.from(droppedFiles), message);
    }
  });

  // Withdraw/unsend message handler
  threadMsgs.addEventListener('click', async (e) => {
    const btn = e.target.closest('.msg-withdraw');
    if (!btn) return;
    const msgId = btn.dataset.msgId;
    if (!msgId) return;
    const confirmed = await confirmAction('Withdraw this message? The agent will be notified.');
    if (!confirmed) return;
    btn.textContent = '...';
    btn.style.pointerEvents = 'none';
    try {
      const res = await fetch(`/api/dashboard/messages/${msgId}/withdraw`, {
        method: 'POST',
        headers: authHeaders(),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (!res.ok) {
        const body = await res.json().catch(() => null);
        console.error('Withdraw failed:', body?.error || res.status);
      }
    } catch (err) {
      console.error('Withdraw failed:', err);
    }
  });

  // esc, renderMarkdown, timeAgo — imported from utils.js

  function proxyVersionWarning(proxyId) {
    const proxy = (state.proxies || []).find(p => p.proxyId === proxyId);
    if (!proxy || proxy.versionMatch !== false) return '';
    const ver = proxy.version ? ` (${esc(proxy.version)})` : '';
    return ` <span class="version-mismatch" title="Proxy version${ver} does not match orchestrator. Restart the proxy.">\u26a0 stale proxy</span>`;
  }

  // ── Create Agent Modal ──
  // ENGINE_TEMPLATES, openCreateAgentModal — moved to agent-lifecycle.js

  // ── Search Filter ──
  // Lightweight filter: toggle visibility on existing DOM cards instead of
  // tearing down and rebuilding the entire agent list on every keystroke.
  function applySearchFilter() {
    const filter = state.searchFilter.toLowerCase();
    const list = document.getElementById('agentList');
    const cards = list.querySelectorAll('.agent-card[data-agent]');
    const groupCounts = new Map(); // groupHeader element → visible count
    // First pass: show/hide cards
    for (const card of cards) {
      const name = card.dataset.agent;
      const agent = state.agents.find(a => a.name === name);
      let visible = true;
      if (filter && agent) {
        visible = agent.name.toLowerCase().includes(filter)
          || agent.engine.toLowerCase().includes(filter)
          || agent.state.toLowerCase().includes(filter)
          || (agent.agentGroup || '').toLowerCase().includes(filter);
      }
      if (visible && state.quickFilter) {
        if (state.quickFilter === 'active') visible = agent && agent.state === 'active';
        else if (state.quickFilter === 'idle') visible = agent && agent.state === 'idle';
        else if (state.quickFilter === 'unread') visible = agent && (state.unread[agent.name] || 0) > 0;
        else if (state.quickFilter === 'recent') visible = agent && !!agent.lastActivity;
      }
      card.style.display = visible ? '' : 'none';
      // Track per-group visibility
      let prev = card.previousElementSibling;
      while (prev && !prev.classList.contains('agent-group-header')) prev = prev.previousElementSibling;
      if (prev) {
        groupCounts.set(prev, (groupCounts.get(prev) || 0) + (visible ? 1 : 0));
      }
    }
    // Second pass: hide group headers with zero visible cards
    for (const [header, count] of groupCounts) {
      header.style.display = count > 0 ? '' : 'none';
    }
  }

  const searchInput = document.getElementById('agentSearch');
  const searchClear = document.getElementById('agentSearchClear');
  searchInput.addEventListener('input', (e) => {
    state.searchFilter = e.target.value;
    searchClear.style.display = e.target.value ? 'block' : 'none';
    applySearchFilter();
  });
  searchClear.addEventListener('click', () => {
    searchInput.value = '';
    state.searchFilter = '';
    state.quickFilter = null;
    searchClear.style.display = 'none';
    applySearchFilter();
    searchInput.focus();
  });

  // Filter chips — toggle on click, clear on re-click
  document.getElementById('filterChips').addEventListener('click', (e) => {
    const chip = e.target.closest('.filter-chip');
    if (!chip) return;
    const f = chip.dataset.filter;
    state.quickFilter = state.quickFilter === f ? null : f;
    document.querySelectorAll('.filter-chip').forEach(c => {
      c.classList.toggle('active', c.dataset.filter === state.quickFilter);
    });
    applySearchFilter();
  });

  // fetchEngineUsage — imported from connection.js

  // voiceState, initVoice, initCommandPalette — imported from voice-palette.js

  // Wire module dependencies
  setupVoicePalette({ selectAgent });
  setupMessageIO({ handleAuthError, getActiveTopic, renderThread, voiceState });


  // initVoice, voice pipeline, command palette — moved to voice-palette.js


  // ── Init ──
  // Always try connecting first. If the server requires auth and we don't have
  // a token, the WebSocket will close with 401 and we'll show the auth modal.
  connect();
  initVoice();
  initCommandPalette();
  // Refresh relative timestamps in engine summary every 30s
  setInterval(() => { if (state.agents.length > 0) renderAgents(); }, 30000);
  // Fetch engine usage every 2 minutes (poller runs server-side every 10min)
  fetchEngineUsage();
  setInterval(fetchEngineUsage, 120_000);
}
</script>
</body>
</html>

      targetCard.classList.add(touch.clientY < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
    }
  }, { passive: false });

  function finishTouchDrag(e) {
    if (!touchDragState) return;
    const { agentName, clone } = touchDragState;
    if (clone) clone.remove();
    // Restore original card opacity
    const origCard = agentListEl.querySelector(`[data-agent="${agentName}"]`);
    if (origCard) origCard.style.opacity = '';

    // Find drop target
    const touch = e.changedTouches[0];
    clearDragIndicators();
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (el) {
      const header = el.closest('.agent-group-header[data-group]');
      const targetCard = el.closest('.agent-card[data-agent]');

      if (header) {
        // Drop on group header → change group
        const newGroup = header.dataset.group;
        const agent = state.agents.find(a => a.name === agentName);
        if (agent && (agent.agentGroup || 'General') !== newGroup) {
          agent.agentGroup = newGroup === 'General' ? null : newGroup;
          renderAgents();
          fetch(`/api/agents/${encodeURIComponent(agentName)}/group`, {
            method: 'PATCH',
            headers: { 'content-type': 'application/json', ...authHeaders() },
            body: JSON.stringify({ group: newGroup === 'General' ? '' : newGroup }),
          }).catch(err => console.error('[touch-drag] Group change failed:', err));
        }
      } else if (targetCard && targetCard.dataset.agent !== agentName) {
        // Drop on another agent → reorder
        const rect = targetCard.getBoundingClientRect();
        const insertBefore = touch.clientY < rect.top + rect.height / 2;
        const fromIdx = state.agents.findIndex(a => a.name === agentName);
        const targetName = targetCard.dataset.agent;
        if (fromIdx !== -1) {
          const [moved] = state.agents.splice(fromIdx, 1);
          let toIdx = state.agents.findIndex(a => a.name === targetName);
          if (!insertBefore) toIdx++;
          state.agents.splice(toIdx, 0, moved);
          const orders = state.agents.map((a, i) => ({ name: a.name, sortOrder: i }));
          state.agents.forEach((a, i) => { a.sortOrder = i; });
          renderAgents();
          fetch('/api/agents/reorder', {
            method: 'POST',
            headers: { 'content-type': 'application/json', ...authHeaders() },
            body: JSON.stringify({ orders }),
          }).catch(err => console.error('[touch-drag] Reorder save failed:', err));
        }
      }
    }
    touchDragState = null;
  }

  agentListEl.addEventListener('touchend', finishTouchDrag, { passive: false });
  agentListEl.addEventListener('touchcancel', (e) => {
    if (!touchDragState) return;
    if (touchDragState.clone) touchDragState.clone.remove();
    const origCard = agentListEl.querySelector(`[data-agent="${touchDragState.agentName}"]`);
    if (origCard) origCard.style.opacity = '';
    clearDragIndicators();
    touchDragState = null;
  });

  // ── Archive / Restore Chat ──
  async function archiveChat(agentName) {
    if (!agentName) return;
    try {
      const res = await fetch(`/api/dashboard/messages/${encodeURIComponent(agentName)}`, {
        method: 'DELETE',
        headers: authHeaders(),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (res.ok) {
        state.threads[agentName] = [];
        renderThread();
      }
    } catch (err) {
      console.error('Archive chat failed:', err);
    }
  }

  async function unarchiveChat(agentName) {
    if (!agentName) return;
    try {
      const res = await fetch(`/api/dashboard/messages/${encodeURIComponent(agentName)}/unarchive`, {
        method: 'POST',
        headers: authHeaders(),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (res.ok) {
        // Reload threads to get restored messages
        const threadsRes = await fetch(`/api/dashboard/threads?agent=${encodeURIComponent(agentName)}`, {
          headers: authHeaders(),
        });
        if (threadsRes.ok) {
          const threads = await threadsRes.json();
          state.threads[agentName] = threads[agentName] || [];
        }
        state.threadView = 'messages';
        renderThread();
      }
    } catch (err) {
      console.error('Unarchive failed:', err);
    }
  }

  async function renderArchive() {
    const messages = document.getElementById('threadMessages');
    if (!state.selected) return;
    messages.innerHTML = '<div class="thread-empty">Loading archive...</div>';
    try {
      const res = await fetch(`/api/dashboard/threads?agent=${encodeURIComponent(state.selected)}&archived=1`, {
        headers: authHeaders(),
      });
      if (!res.ok) { messages.innerHTML = '<div class="thread-empty">Failed to load archive</div>'; return; }
      const threads = await res.json();
      const thread = threads[state.selected] || [];
      if (thread.length === 0) {
        messages.innerHTML = '<div class="thread-empty">No archived messages</div>';
        return;
      }
      messages.innerHTML = '';
      // Restore button
      const restoreBar = document.createElement('div');
      restoreBar.style.cssText = 'padding:8px 12px;text-align:center';
      restoreBar.innerHTML = `<button onclick="document.dispatchEvent(new CustomEvent('unarchive-chat'))" style="padding:6px 16px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:13px;cursor:pointer">Restore to Messages</button>`;
      messages.appendChild(restoreBar);
      for (const msg of thread) {
        const div = document.createElement('div');
        const isSystem = msg.direction === 'from_agent' && msg.message.startsWith('[system]');
        const sender = isSystem ? 'system' : (msg.direction === 'to_agent' ? 'you' : state.selected);
        div.className = `msg msg-${sender === 'you' ? 'out' : 'in'}${isSystem ? ' msg-system' : ''}${msg.withdrawn ? ' msg-withdrawn' : ''}`;
        const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        let text = esc(msg.message);
        text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
        div.innerHTML = `<span class="msg-sender">${esc(sender)}</span><span class="msg-text">${text}</span><span class="msg-time">${time}</span>`;
        messages.appendChild(div);
      }
      // Scroll to bottom
      messages.scrollTop = messages.scrollHeight;
    } catch (err) {
      console.error('Archive load failed:', err);
      messages.innerHTML = '<div class="thread-empty">Failed to load archive</div>';
    }
  }

  document.addEventListener('unarchive-chat', () => {
    if (state.selected) unarchiveChat(state.selected);
  });

  // ── Send Message ──
  function showSendError(input, sendBtn) {
    input.style.borderColor = 'var(--red)';
    const errEl = document.createElement('span');
    errEl.id = 'sendError';
    errEl.style.cssText = 'color:var(--red);font-size:11px;align-self:center;white-space:nowrap';
    errEl.textContent = 'Send failed';
    input.parentNode.insertBefore(errEl, sendBtn);
    setTimeout(() => { errEl.remove(); input.style.borderColor = ''; }, 3000);
  }

  async function sendMessage() {
    if (!state.selected) return;
    const input = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const text = input.value.trim();
    if (!text) return;

    // Clear any previous error state
    input.style.borderColor = '';
    const existingErr = document.getElementById('sendError');
    if (existingErr) existingErr.remove();

    sendBtn.disabled = true;
    try {
      const res = await fetch('/api/dashboard/send', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ agent: state.selected, message: text }),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (!res.ok) {
        let body = null;
        try { body = await res.json(); } catch (_) {}
        if (body && body.msg) {
          input.value = '';
          input.style.height = 'auto';
          delete state.drafts[state.selected];
          // Delivery status shown inline on the message bubble via queue_update
        } else {
          console.error('Send failed: HTTP', res.status);
          showSendError(input, sendBtn);
        }
      } else {
        input.value = '';
        input.style.height = 'auto';
        delete state.drafts[state.selected];
      }
    } catch (err) {
      console.error('Send failed:', err);
      showSendError(input, sendBtn);
    } finally {
      updateSendability();
    }
  }

  document.getElementById('sendBtn').onclick = sendMessage;
  const msgTextarea = document.getElementById('msgInput');
  const isMobile = window.matchMedia('(max-width: 768px)').matches;
  msgTextarea.onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey && !isMobile) {
      e.preventDefault();
      sendMessage();
    }
  };
  msgTextarea.oninput = () => {
    msgTextarea.style.height = 'auto';
    msgTextarea.style.height = Math.min(msgTextarea.scrollHeight, 120) + 'px';
    msgTextarea.style.overflowY = msgTextarea.scrollHeight > 120 ? 'auto' : 'hidden';
  };

  // ── File Upload ──

  async function uploadFile(file) {
    const url = `/api/dashboard/upload?agent=${encodeURIComponent(state.selected)}&filename=${encodeURIComponent(file.name)}`;
    const headers = { 'content-type': 'application/octet-stream' };
    const t = getToken();
    if (t) headers['authorization'] = `Bearer ${t}`;

    const res = await fetch(url, { method: 'POST', headers, body: file });
    if (res.status === 401) { handleAuthError(); throw new Error('auth'); }
    const body = await res.json();
    return { file: file.name, ok: res.ok, ...body };
  }

  const LARGE_FILE_THRESHOLD = 100 * 1024 * 1024; // 100 MB

  function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
    if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
    return (bytes / (1024 * 1024 * 1024)).toFixed(1) + 'GB';
  }

  document.getElementById('fileInput').onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length || !state.selected) return;

    // Warn about large files
    const largeFiles = files.filter(f => f.size >= LARGE_FILE_THRESHOLD);
    if (largeFiles.length > 0) {
      const totalSize = files.reduce((sum, f) => sum + f.size, 0);
      const confirmed = await confirmAction(
        `${largeFiles.length} file${largeFiles.length > 1 ? 's are' : ' is'} large (total ${formatFileSize(totalSize)}). Upload may take a while. Continue?`
      );
      if (!confirmed) { e.target.value = ''; return; }
    }

    const uploadWrap = document.getElementById('uploadWrap');
    uploadWrap.classList.add('uploading');

    // Show uploading indicator in thread
    const messagesEl = document.getElementById('threadMessages');
    const uploadIndicator = document.createElement('div');
    uploadIndicator.className = 'msg to-agent file-upload';
    const fileNames = files.map(f => `${f.name} (${formatFileSize(f.size)})`).join(', ');
    uploadIndicator.innerHTML = `<div class="msg-header"><span class="msg-sender">you</span><span class="msg-meta"><span class="msg-status pending">\u2022\u2022\u2022 uploading</span></span></div><div class="file-info"><span class="file-icon">&#128206;</span> ${esc(fileNames)}</div>`;
    messagesEl.appendChild(uploadIndicator);
    messagesEl.scrollTop = messagesEl.scrollHeight;

    try {
      const results = await Promise.allSettled(files.map(uploadFile));
      const succeeded = results.filter(r => r.status === 'fulfilled' && r.value.ok).length;
      const failed = results.length - succeeded;

      if (failed === 0) {
        showToast(`Uploaded ${succeeded} file${succeeded > 1 ? 's' : ''}`, 'success');
      } else {
        showToast(`${succeeded} uploaded, ${failed} failed`, failed === results.length ? 'error' : 'warning');
      }
    } catch (err) {
      if (err.message !== 'auth') showToast('Upload failed', 'error');
    } finally {
      uploadWrap.classList.remove('uploading');
      uploadIndicator.remove(); // real message appears via WebSocket
      e.target.value = '';
    }
  };

  // Paste image/file from clipboard
  document.getElementById('msgInput').addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items || !state.selected) return;

    const files = [];
    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      if (item.kind === 'file') {
        const file = item.getAsFile();
        if (file) files.push(file);
      }
    }

    if (files.length === 0) return; // plain text paste, let default handle it
    e.preventDefault();

    const dt = new DataTransfer();
    for (const f of files) dt.items.add(f);
    const fileInput = document.getElementById('fileInput');
    fileInput.files = dt.files;
    fileInput.dispatchEvent(new Event('change'));
  });

  // Drag-and-drop on thread messages
  const threadMsgs = document.getElementById('threadMessages');
  threadMsgs.addEventListener('dragover', (e) => {
    e.preventDefault();
    threadMsgs.classList.add('drag-over');
  });
  threadMsgs.addEventListener('dragleave', () => {
    threadMsgs.classList.remove('drag-over');
  });
  threadMsgs.addEventListener('drop', (e) => {
    e.preventDefault();
    threadMsgs.classList.remove('drag-over');
    const droppedFiles = e.dataTransfer?.files;
    if (droppedFiles && droppedFiles.length > 0 && state.selected) {
      // Use DataTransfer to build a synthetic FileList (Firefox doesn't allow
      // assigning to input.files from a drop event's FileList directly)
      const dt = new DataTransfer();
      for (let i = 0; i < droppedFiles.length; i++) dt.items.add(droppedFiles[i]);
      const fileInput = document.getElementById('fileInput');
      fileInput.files = dt.files;
      fileInput.dispatchEvent(new Event('change'));
    }
  });

  // Withdraw/unsend message handler
  threadMsgs.addEventListener('click', async (e) => {
    const btn = e.target.closest('.msg-withdraw');
    if (!btn) return;
    const msgId = btn.dataset.msgId;
    if (!msgId) return;
    const confirmed = await confirmAction('Withdraw this message? The agent will be notified.');
    if (!confirmed) return;
    btn.textContent = '...';
    btn.style.pointerEvents = 'none';
    try {
      const res = await fetch(`/api/dashboard/messages/${msgId}/withdraw`, {
        method: 'POST',
        headers: authHeaders(),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (!res.ok) {
        const body = await res.json().catch(() => null);
        console.error('Withdraw failed:', body?.error || res.status);
      }
    } catch (err) {
      console.error('Withdraw failed:', err);
    }
  });

  // ── Helpers ──
  function esc(s) {
    if (!s) return '';
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  /**
   * Minimal zero-dependency markdown renderer.
   * Input must already be HTML-escaped via esc().
   * Supports: headings, bold, italic, code blocks, inline code, lists, links, paragraphs.
   */
  function renderMarkdown(escaped) {
    if (!escaped) return '';
    // Preserve code blocks first — extract and replace with placeholders
    const codeBlocks = [];
    let text = escaped.replace(/```(?:\w*)\n([\s\S]*?)```/g, (_m, code) => {
      codeBlocks.push(code.replace(/\n$/, ''));
      return '\x00CB' + (codeBlocks.length - 1) + '\x00';
    });
    // Inline code
    text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    // Headings (must be at start of line)
    text = text.replace(/^(#{1,6})\s+(.+)$/gm, (_m, hashes, content) => {
      const level = hashes.length;
      return `<h${level} style="margin:8px 0 4px;font-size:${18 - level * 1.5}px">${content}</h${level}>`;
    });
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic (single asterisk, not inside words)
    text = text.replace(/(?<!\w)\*(.+?)\*(?!\w)/g, '<em>$1</em>');
    // Links
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
    // Lists and paragraphs: line-based parser for proper nesting
    {
      const lines = text.split('\n');
      const out = [];
      const listStack = []; // stack of { tag: 'ul'|'ol', indent: number }
      let inPara = false;

      function closeListsTo(indent) {
        while (listStack.length > 0 && listStack[listStack.length - 1].indent >= indent) {
          out.push('</' + listStack.pop().tag + '>');
        }
      }
      function closeAllLists() { closeListsTo(-1); }
      function closePara() { if (inPara) { out.push('</p>'); inPara = false; } }

      for (const line of lines) {
        const hrMatch = line.match(/^---+$/);
        if (hrMatch) {
          closePara(); closeAllLists();
          out.push('<hr style="border:none;border-top:1px solid var(--border);margin:8px 0">');
          continue;
        }

        const ulMatch = line.match(/^(\s*)([-*])\s+(.+)$/);
        const olMatch = !ulMatch && line.match(/^(\s*)\d+\.\s+(.+)$/);

        if (ulMatch || olMatch) {
          closePara();
          const indent = (ulMatch || olMatch)[1].length;
          const tag = ulMatch ? 'ul' : 'ol';
          const content = ulMatch ? ulMatch[3] : olMatch[2];

          if (listStack.length === 0 || indent > listStack[listStack.length - 1].indent) {
            out.push('<' + tag + '>');
            listStack.push({ tag, indent });
          } else if (indent < listStack[listStack.length - 1].indent) {
            closeListsTo(indent);
            if (listStack.length === 0 || listStack[listStack.length - 1].indent < indent) {
              out.push('<' + tag + '>');
              listStack.push({ tag, indent });
            }
          }
          out.push('<li>' + content + '</li>');
          continue;
        }

        // Non-list line
        closeAllLists();

        if (line.trim() === '') {
          closePara();
        } else if (line.startsWith('<h') || line.startsWith('<hr')) {
          closePara();
          out.push(line);
        } else {
          if (!inPara) { out.push('<p style="margin:4px 0">'); inPara = true; }
          else { out.push('<br>'); }
          out.push(line);
        }
      }
      closePara();
      closeAllLists();
      text = out.join('\n');
    }
    // Restore code blocks
    text = text.replace(/\x00CB(\d+)\x00/g, (_m, idx) => {
      return `<pre style="background:var(--bg);padding:8px;border-radius:4px;overflow-x:auto;margin:4px 0;font-size:12px"><code>${codeBlocks[parseInt(idx)]}</code></pre>`;
    });
    return text;
  }

  function timeAgo(isoStr) {
    if (!isoStr) return '';
    const diff = Math.max(0, Date.now() - new Date(isoStr).getTime());
    const secs = Math.floor(diff / 1000);
    if (secs < 60) return `${secs}s ago`;
    const mins = Math.floor(secs / 60);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    return `${days}d ago`;
  }

  // ── Create Agent ──
  document.addEventListener('create-agent', async (e) => {
    const shouldSpawn = e.detail?.spawn ?? false;
    const name = document.getElementById('createName')?.value.trim();
    const engine = document.getElementById('createEngine')?.value;
    const proxyHost = document.getElementById('createProxy')?.value;
    const cwd = document.getElementById('createCwd')?.value.trim();
    const task = document.getElementById('createTask')?.value.trim();
    if (!name) { showToast('Agent name is required', 'error'); return; }
    if (!cwd) { showToast('Working directory is required', 'error'); return; }

    try {
      // Step 1: Create the agent
      const createRes = await fetch('/api/agents', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ name, engine, cwd, proxyHost: proxyHost || undefined }),
      });
      if (createRes.status === 401) { handleAuthError(); return; }
      const createBody = await createRes.json();
      if (!createRes.ok) {
        showToast(createBody.error || 'Create failed', 'error');
        return;
      }

      document.getElementById('createName').value = '';
      document.getElementById('createTask').value = '';
      createFormOpen = false;

      if (shouldSpawn) {
        // Step 2: Spawn with optional task
        const spawnBody = {};
        if (task) spawnBody.task = task;
        const spawnRes = await fetch(`/api/agents/${encodeURIComponent(name)}/spawn`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(spawnBody),
        });
        if (spawnRes.ok) {
          showToast(`Agent "${name}" created and spawning`, 'success');
        } else {
          showToast(`Agent created but spawn failed`, 'warning');
        }
      } else {
        showToast(`Agent "${name}" created`, 'success');
      }
      selectAgent(name);
    } catch (err) {
      showToast('Create failed — network error', 'error');
    }
  });

  // ── Search Filter ──
  document.getElementById('agentSearch').addEventListener('input', (e) => {
    state.searchFilter = e.target.value;
    renderAgents();
  });

  // ── Engine Usage Fetch ──
  async function fetchEngineUsage() {
    try {
      const resp = await fetch('/api/engines/status', {
        headers: getToken() ? { 'Authorization': `Bearer ${getToken()}` } : {},
      });
      if (!resp.ok) return;
      const data = await resp.json();
      if (data.usage) {
        state.engineUsage = data.usage;
        renderAgents();
      }
    } catch { /* ignore */ }
  }

  // ── Voice Dictation ──

  const voiceState = {
    ws: null,        // WebSocket to orchestrator /ws/voice
    mode: 'off',     // off | vad | ptt
    recording: false,
    stream: null,    // MediaStream (active recording)
    pttStream: null, // MediaStream (pre-acquired for instant PTT)
    audioCtx: null,  // AudioContext
    processor: null,  // ScriptProcessorNode
    sid: null,       // session ID
  };

  async function initVoice() {
    const controls = document.getElementById('voiceControls');
    const toggle = document.getElementById('voiceToggle');
    const btn = document.getElementById('voiceBtn');

    // Check if voice is enabled on the server
    try {
      const resp = await fetch('/api/voice/status', {
        headers: { 'Authorization': 'Bearer ' + getToken() },
      });
      const data = await resp.json();
      if (!data.enabled) {
        controls.style.display = 'flex';
        toggle.querySelectorAll('button').forEach(b => { b.disabled = true; b.style.opacity = '0.4'; });
        toggle.title = 'Voice unavailable — ELEVENLABS_API_KEY not configured on server';
        return;
      }
    } catch {
      return; // Server unreachable, hide controls entirely
    }

    controls.style.display = 'flex';

    async function setVoiceMode(mode) {
      voiceState.mode = mode;
      toggle.querySelectorAll('button').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
      if (mode === 'off') {
        stopVoice();
        if (voiceState.pttStream) {
          voiceState.pttStream.getTracks().forEach(t => t.stop());
          voiceState.pttStream = null;
        }
        btn.classList.add('inactive');
      } else if (mode === 'ptt') {
        stopVoice();
        btn.classList.remove('inactive');
        // Pre-acquire mic for instant PTT response
        try {
          voiceState.pttStream = await navigator.mediaDevices.getUserMedia({
            audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true },
          });
        } catch (err) {
          console.error('[voice] Mic access denied:', err);
          document.getElementById('voicePartial').textContent = 'Mic denied';
          setTimeout(() => { document.getElementById('voicePartial').textContent = ''; }, 3000);
          setVoiceMode('off');
        }
      }
    }

    toggle.addEventListener('click', (e) => {
      const b = e.target.closest('button[data-mode]');
      if (!b || b.classList.contains('active')) return;
      setVoiceMode(b.dataset.mode);
    });

    // Push-to-talk: hold button (pointer + touch events for mobile compatibility)
    function pttDown(e) {
      e.preventDefault();
      if (voiceState.mode !== 'ptt') return;
      startVoice();
    }
    function pttUp() {
      if (voiceState.mode !== 'ptt' || !voiceState.recording) return;
      commitAndStopPtt();
    }
    btn.addEventListener('pointerdown', pttDown);
    btn.addEventListener('pointerup', pttUp);
    btn.addEventListener('pointerleave', pttUp);
    btn.addEventListener('touchstart', pttDown, { passive: false });
    btn.addEventListener('touchend', pttUp);
    btn.addEventListener('touchcancel', pttUp);
    // Prevent context menu on long press
    btn.addEventListener('contextmenu', (e) => e.preventDefault());

    // Spacebar PTT when text input is not focused
    document.addEventListener('keydown', (e) => {
      if (e.code !== 'Space' || e.repeat || voiceState.mode !== 'ptt') return;
      const tag = document.activeElement?.tagName;
      if (tag === 'TEXTAREA' || tag === 'INPUT' || tag === 'SELECT') return;
      if (voiceState.recording) return; // already recording
      e.preventDefault();
      startVoice();
    });
    document.addEventListener('keyup', (e) => {
      if (e.code !== 'Space' || voiceState.mode !== 'ptt') return;
      const tag = document.activeElement?.tagName;
      if (tag === 'TEXTAREA' || tag === 'INPUT' || tag === 'SELECT') return;
      if (!voiceState.recording) return;
      e.preventDefault();
      commitAndStopPtt();
    });
  }

  function commitAndStopPtt() {
    if (voiceState.ws && voiceState.ws.readyState === WebSocket.OPEN) {
      voiceState.ws.send(JSON.stringify({ type: 'commit' }));
    }
    // Wait briefly for committed transcript then stop
    setTimeout(() => stopVoice(), 1500);
  }

  async function startVoice() {
    if (voiceState.recording) return;

    // Use pre-acquired PTT stream if available, otherwise request mic
    if (voiceState.pttStream) {
      voiceState.stream = voiceState.pttStream;
    } else {
      try {
        voiceState.stream = await navigator.mediaDevices.getUserMedia({
          audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true, autoGainControl: true },
        });
      } catch (err) {
        console.error('[voice] Mic access denied:', err);
        document.getElementById('voicePartial').textContent = 'Mic denied';
        setTimeout(() => { document.getElementById('voicePartial').textContent = ''; }, 3000);
        return;
      }
    }

    voiceState.sid = crypto.randomUUID();
    voiceState.recording = true;

    const btn = document.getElementById('voiceBtn');
    btn.classList.add('recording');

    // Determine sample rate — use 16kHz if possible, else native
    voiceState.audioCtx = new AudioContext({ sampleRate: 16000 });
    // Ensure AudioContext is running (browsers may suspend it without user gesture)
    if (voiceState.audioCtx.state === 'suspended') {
      await voiceState.audioCtx.resume();
    }
    const actualRate = voiceState.audioCtx.sampleRate;
    console.log('[voice] AudioContext state:', voiceState.audioCtx.state, 'rate:', actualRate);

    // Connect WebSocket to orchestrator voice proxy
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const params = new URLSearchParams({
      sid: voiceState.sid,
      mode: voiceState.mode === 'ptt' ? 'manual' : 'vad',
      silence: '1.5',
      sample_rate: String(actualRate),
      token: getToken(),
    });
    const wsUrl = `${proto}://${location.host}/ws/voice?${params}`;
    const ws = new WebSocket(wsUrl);
    voiceState.ws = ws;

    ws.onopen = () => {
      console.log('[voice] Connected, sid=' + voiceState.sid);
    };

    ws.onmessage = (e) => {
      try {
        const msg = JSON.parse(e.data);
        const partial = document.getElementById('voicePartial');
        const input = document.getElementById('msgInput');

        if (msg.type === 'partial') {
          partial.textContent = msg.text || '';
        } else if (msg.type === 'committed') {
          partial.textContent = '';
          if (msg.text && msg.text.trim()) {
            // Append to textarea
            const sep = input.value && !input.value.endsWith('\n') && !input.value.endsWith(' ') ? ' ' : '';
            input.value += sep + msg.text.trim();
            input.dispatchEvent(new Event('input'));
            // Enable send button
            document.getElementById('sendBtn').disabled = !input.value.trim() || !state.selected;
          }
        } else if (msg.type === 'error') {
          console.error('[voice] Error:', msg.error);
          partial.textContent = msg.error;
          setTimeout(() => { partial.textContent = ''; }, 5000);
          stopVoice();
        } else if (msg.type === 'ready') {
          document.getElementById('voicePartial').textContent = 'Listening...';
          setTimeout(() => {
            if (document.getElementById('voicePartial').textContent === 'Listening...')
              document.getElementById('voicePartial').textContent = '';
          }, 2000);
        }
      } catch { /* ignore */ }
    };

    ws.onclose = () => {
      if (voiceState.recording) stopVoiceLocal();
    };

    ws.onerror = () => {
      document.getElementById('voicePartial').textContent = 'Connection failed';
      setTimeout(() => { document.getElementById('voicePartial').textContent = ''; }, 3000);
      stopVoiceLocal();
    };

    // Audio capture pipeline
    const source = voiceState.audioCtx.createMediaStreamSource(voiceState.stream);
    // ScriptProcessor is deprecated but widely supported and simple for PCM capture
    voiceState.processor = voiceState.audioCtx.createScriptProcessor(4096, 1, 1);
    let audioChunkCount = 0;
    voiceState.processor.onaudioprocess = (e) => {
      if (!voiceState.recording || !ws || ws.readyState !== WebSocket.OPEN) return;
      audioChunkCount++;
      if (audioChunkCount % 50 === 1) console.log('[voice] Sending audio chunk', audioChunkCount);
      const float32 = e.inputBuffer.getChannelData(0);
      // Convert Float32 to Int16 PCM
      const int16 = new Int16Array(float32.length);
      for (let i = 0; i < float32.length; i++) {
        const s = Math.max(-1, Math.min(1, float32[i]));
        int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
      }
      // Send as binary
      ws.send(int16.buffer);
    };
    source.connect(voiceState.processor);
    voiceState.processor.connect(voiceState.audioCtx.destination);
  }

  function stopVoice() {
    if (voiceState.ws && voiceState.ws.readyState === WebSocket.OPEN) {
      voiceState.ws.close();
    }
    stopVoiceLocal();
  }

  function stopVoiceLocal() {
    voiceState.recording = false;
    voiceState.sid = null;

    document.getElementById('voiceBtn').classList.remove('recording');
    document.getElementById('voicePartial').textContent = '';

    if (voiceState.processor) {
      voiceState.processor.disconnect();
      voiceState.processor = null;
    }
    if (voiceState.audioCtx) {
      voiceState.audioCtx.close().catch(() => {});
      voiceState.audioCtx = null;
    }
    if (voiceState.stream) {
      // Don't close the pre-acquired PTT stream — it's reused across presses
      if (voiceState.stream !== voiceState.pttStream) {
        voiceState.stream.getTracks().forEach(t => t.stop());
      }
      voiceState.stream = null;
    }
    voiceState.ws = null;
  }

  // ── Init ──
  // Always try connecting first. If the server requires auth and we don't have
  // a token, the WebSocket will close with 401 and we'll show the auth modal.
  connect();
  initVoice();
  // Refresh relative timestamps every 30s
  setInterval(() => { if (state.agents.length > 0) renderAgents(); }, 30000);
  // Fetch engine usage every 2 minutes (poller runs server-side every 10min)
  fetchEngineUsage();
  setInterval(fetchEngineUsage, 120_000);
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Collab</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #d18616;
    --purple: #bc8cff;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 16px; font-weight: 600; }
  .conn-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
  }
  .conn-dot.connected { background: var(--green); }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 49px);
  }

  /* ── Agent Grid ── */
  .agent-list {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card.selected { border-color: var(--accent); background: #1c2333; }
  .agent-card.flash { animation: flash-card 0.6s ease; }

  @keyframes flash-card {
    0%,100% { background: var(--surface); }
    50% { background: #1a2a1a; }
  }

  .agent-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .agent-name { font-weight: 600; font-size: 14px; }
  .state-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .state-active   { background: rgba(63,185,80,0.15); color: var(--green); }
  .state-idle     { background: rgba(139,148,158,0.15); color: var(--text-dim); }
  .state-spawning { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-suspended { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .state-failed   { background: rgba(248,81,73,0.15); color: var(--red); }
  .state-suspending { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-resuming  { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-void     { background: rgba(139,148,158,0.1); color: var(--text-dim); }

  .agent-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .agent-meta span { display: flex; align-items: center; gap: 4px; }

  .agent-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .agent-actions button {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .agent-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .agent-actions button.danger:hover { border-color: var(--red); color: var(--red); }

  /* ── Thread Panel ── */
  .thread-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
  }
  .thread-messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .thread-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
  }

  .msg {
    max-width: 70%;
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg.to-agent {
    align-self: flex-end;
    background: #1a3a5c;
    border: 1px solid rgba(88,166,255,0.3);
  }
  .msg.from-agent {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .msg-sender {
    font-size: 11px;
    color: var(--text-dim);
    margin-bottom: 2px;
  }
  .msg-time {
    font-size: 10px;
    color: var(--text-dim);
    margin-top: 4px;
    text-align: right;
  }

  /* ── Input ── */
  .thread-input {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    background: var(--surface);
  }
  .thread-input input {
    flex: 1;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .thread-input input:focus { border-color: var(--accent); }
  .thread-input button {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  .thread-input button:hover { opacity: 0.9; }
  .thread-input button:disabled { opacity: 0.5; cursor: not-allowed; }
  .thread-input input:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Confirm Dialog ── */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  }
  .confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    max-width: 360px;
    box-shadow: var(--shadow);
  }
  .confirm-box p { margin-bottom: 16px; font-size: 14px; line-height: 1.5; }
  .confirm-box .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .confirm-box button {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .confirm-box button.danger-btn {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .confirm-box button:hover { opacity: 0.9; }

  /* ── Unread Badge ── */
  .unread-badge {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
    margin-left: 6px;
  }

  /* ── Create Form ── */
  .create-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .create-form-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .create-form-toggle:hover { color: var(--accent); }
  .create-form-toggle .chevron { transition: transform 0.15s; }
  .create-form.open .chevron { transform: rotate(90deg); }
  .create-form-body {
    display: none;
    padding: 0 14px 14px;
    flex-direction: column;
    gap: 8px;
  }
  .create-form.open .create-form-body { display: flex; }
  .create-form input, .create-form select, .create-form textarea {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    resize: vertical;
  }
  .create-form input:focus, .create-form select:focus, .create-form textarea:focus { border-color: var(--accent); }
  .create-form-actions { display: flex; gap: 6px; }
  .create-form-actions button {
    padding: 7px 14px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
  }
  .create-form-actions button:hover { opacity: 0.9; }
  .create-form-actions button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .create-form-actions button.secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── System message ── */
  .msg.system-msg {
    align-self: center;
    max-width: 90%;
    background: rgba(139,148,158,0.08);
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-size: 12px;
    font-style: italic;
  }

  /* ── Button loading state ── */
  .agent-actions button.loading {
    opacity: 0.5;
    pointer-events: none;
    position: relative;
  }
  .agent-actions button.loading::after {
    content: '';
    width: 10px; height: 10px;
    border: 2px solid var(--text-dim);
    border-top-color: transparent;
    border-radius: 50%;
    animation: btn-spin 0.6s linear infinite;
    display: inline-block;
    margin-left: 4px;
    vertical-align: middle;
  }
  @keyframes btn-spin {
    to { transform: rotate(360deg); }
  }

  /* ── Agent time ── */
  .agent-time {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* ── Agent failure reason ── */
  .agent-failure {
    font-size: 11px;
    color: var(--red);
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Thread header enriched ── */
  .thread-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    font-size: 14px;
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    box-shadow: var(--shadow);
    pointer-events: none;
    animation: toast-in 0.2s ease;
  }
  .toast.error   { background: var(--red); }
  .toast.warning { background: var(--orange); }
  .toast.success { background: var(--green); }

  @keyframes toast-in {
    from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
    .agent-list { max-height: 40vh; border-right: none; border-bottom: 1px solid var(--border); }
  }
</style>
</head>
<body>
<header>
  <h1>Agentic Collab</h1>
  <div class="conn-status">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">Disconnected</span>
  </div>
</header>
<div class="layout">
  <div class="agent-list" id="agentList"></div>
  <div class="thread-panel" id="threadPanel">
    <div class="thread-header" id="threadHeader">Select an agent</div>
    <div class="thread-messages" id="threadMessages">
      <div class="thread-empty">Select an agent to view messages</div>
    </div>
    <div class="thread-input" id="threadInput" style="display:none">
      <input type="text" id="msgInput" placeholder="Type a message..." />
      <button id="sendBtn" disabled>Send</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ── Auth ──
  function getToken() {
    // Use sessionStorage instead of localStorage — token is cleared when tab closes,
    // reducing exposure window for stolen credentials
    let token = sessionStorage.getItem('orchestrator_token');
    if (!token) {
      token = prompt('Enter orchestrator token (leave empty for dev mode):');
      if (token) sessionStorage.setItem('orchestrator_token', token);
    }
    return token || '';
  }

  function authHeaders() {
    const token = getToken();
    const headers = { 'content-type': 'application/json' };
    if (token) headers['authorization'] = `Bearer ${token}`;
    return headers;
  }

  function handleAuthError() {
    sessionStorage.removeItem('orchestrator_token');
    showToast('Authentication failed — token cleared. Reload to re-enter.', 'error');
  }

  // ── State ──
  const state = {
    agents: [],
    threads: {},
    selected: null,
    connected: false,
    unread: {},  // { agentName: count }
  };

  let ws = null;
  let reconnectTimer = null;
  let reconnectDelay = 1000;

  // ── WebSocket ──
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const token = getToken();
    const tokenParam = token ? `?token=${encodeURIComponent(token)}` : '';
    ws = new WebSocket(`${proto}://${location.host}/ws${tokenParam}`);

    ws.onopen = () => {
      state.connected = true;
      reconnectDelay = 1000;
      updateConnStatus();
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    };

    ws.onclose = () => {
      state.connected = false;
      updateConnStatus();
      const jitter = Math.random() * 1000;
      reconnectTimer = setTimeout(connect, reconnectDelay + jitter);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (evt) => {
      let data;
      try {
        data = JSON.parse(evt.data);
      } catch (err) {
        console.warn('Malformed WebSocket frame:', err);
        return;
      }
      switch (data.type) {
        case 'init':
          state.agents = data.agents;
          state.threads = data.threads;
          renderAgents();
          renderThread();
          break;
        case 'agent_update':
          updateAgent(data.agent);
          break;
        case 'message':
          addMessage(data.msg);
          break;
        case 'queue_update':
          handleQueueUpdate(data.message);
          break;
      }
    };
  }

  function updateConnStatus() {
    const dot = document.getElementById('connDot');
    const label = document.getElementById('connLabel');
    dot.classList.toggle('connected', state.connected);
    label.textContent = state.connected ? 'Connected' : 'Disconnected';
  }

  // ── State Updates ──
  function updateAgent(agent) {
    const idx = state.agents.findIndex(a => a.name === agent.name);
    if (idx >= 0) state.agents[idx] = agent;
    else state.agents.push(agent);
    renderAgents();
    if (agent.name === state.selected) {
      updateSendability();
      // Re-render thread header to reflect state change
      const header = document.getElementById('threadHeader');
      const headerBadge = `<span class="state-badge state-${agent.state}">${agent.state}</span>`;
      header.innerHTML = `<span>${esc(agent.name)}</span>${headerBadge}`;
    }
  }

  function addMessage(msg) {
    if (!state.threads[msg.agent]) state.threads[msg.agent] = [];
    state.threads[msg.agent].push(msg);
    if (state.selected === msg.agent) {
      renderThread();
    } else {
      // Track unread for non-selected agents
      state.unread[msg.agent] = (state.unread[msg.agent] || 0) + 1;
    }

    // Flash the agent card
    const card = document.querySelector(`[data-agent="${msg.agent}"]`);
    if (card && state.selected !== msg.agent) {
      card.classList.add('flash');
      setTimeout(() => card.classList.remove('flash'), 600);
    }
    renderAgents();
  }

  // ── Render ──
  let createFormOpen = false;

  function renderAgents() {
    const list = document.getElementById('agentList');

    // Preserve create form input values before clearing
    const prevName = document.getElementById('createName')?.value || '';
    const prevEngine = document.getElementById('createEngine')?.value || 'claude';
    const prevCwd = document.getElementById('createCwd')?.value || '/tmp';
    const prevTask = document.getElementById('createTask')?.value || '';

    list.innerHTML = '';

    // Collapsible create agent form
    const form = document.createElement('div');
    form.className = `create-form${createFormOpen ? ' open' : ''}`;
    form.innerHTML = `
      <div class="create-form-toggle">
        <span>+ New Agent</span>
        <span class="chevron">\u25B8</span>
      </div>
      <div class="create-form-body">
        <input type="text" id="createName" placeholder="Agent name" value="${esc(prevName)}" />
        <select id="createEngine">
          <option value="claude"${prevEngine === 'claude' ? ' selected' : ''}>claude</option>
          <option value="codex"${prevEngine === 'codex' ? ' selected' : ''}>codex</option>
          <option value="opencode"${prevEngine === 'opencode' ? ' selected' : ''}>opencode</option>
        </select>
        <input type="text" id="createCwd" placeholder="Working directory" value="${esc(prevCwd)}" />
        <textarea id="createTask" rows="2" placeholder="Initial task (optional)">${esc(prevTask)}</textarea>
        <div class="create-form-actions">
          <button onclick="document.dispatchEvent(new CustomEvent('create-agent', {detail:{spawn:true}}))">Create & Spawn</button>
          <button class="secondary" onclick="document.dispatchEvent(new CustomEvent('create-agent', {detail:{spawn:false}}))">Create Only</button>
        </div>
      </div>
    `;
    form.querySelector('.create-form-toggle').onclick = () => {
      createFormOpen = !createFormOpen;
      form.classList.toggle('open', createFormOpen);
    };
    list.appendChild(form);

    for (const agent of state.agents) {
      const card = document.createElement('div');
      card.className = `agent-card${state.selected === agent.name ? ' selected' : ''}`;
      card.dataset.agent = agent.name;

      const stateClass = `state-${agent.state}`;
      const modelStr = [agent.engine, agent.model, agent.thinking].filter(Boolean).join(' ');
      const ctxStr = agent.lastContextPct != null ? `${agent.lastContextPct}%` : '--';
      const unreadCount = state.unread[agent.name] || 0;
      const unreadBadge = unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : '';
      const activityTime = agent.lastActivity || agent.createdAt;
      const timeStr = timeAgo(activityTime);

      const activeIdle = agent.state === 'active' || agent.state === 'idle';
      const suspendedFailed = agent.state === 'suspended' || agent.state === 'failed';
      const transitioning = agent.state === 'spawning' || agent.state === 'suspending' || agent.state === 'resuming';
      const isVoid = agent.state === 'void';
      const failureInfo = agent.state === 'failed' && agent.failureReason
        ? `<div class="agent-failure" title="${esc(agent.failureReason)}">${esc(agent.failureReason)}</div>` : '';
      card.setAttribute('tabindex', '0');
      card.innerHTML = `
        <div class="agent-header">
          <span class="agent-name">${esc(agent.name)}${unreadBadge}</span>
          <span class="agent-time">${timeStr}</span>
          <span class="state-badge ${stateClass}">${agent.state}</span>
        </div>
        <div class="agent-meta">
          <span>${esc(modelStr)}</span>
          <span>ctx: ${ctxStr}</span>
        </div>
        ${failureInfo}
        <div class="agent-actions">
          ${activeIdle ? `
            <button data-action="interrupt">Interrupt</button>
            <button data-action="compact">Compact</button>
            <button data-action="suspend">Suspend</button>
            <button class="danger" data-action="kill">Kill</button>
          ` : ''}
          ${suspendedFailed ? `
            <button data-action="resume">Resume</button>
            <button class="danger" data-action="destroy">Destroy</button>
          ` : ''}
          ${transitioning ? `
            <button class="danger" data-action="kill">Kill</button>
          ` : ''}
          ${isVoid ? `
            <button data-action="spawn">Spawn</button>
            <button class="danger" data-action="destroy">Destroy</button>
          ` : ''}
        </div>
      `;
      list.appendChild(card);
    }
  }

  function renderThread() {
    const header = document.getElementById('threadHeader');
    const messages = document.getElementById('threadMessages');
    const input = document.getElementById('threadInput');

    if (!state.selected) {
      header.textContent = 'Select an agent';
      messages.innerHTML = '<div class="thread-empty">Select an agent to view messages</div>';
      input.style.display = 'none';
      return;
    }

    const selectedAgent = state.agents.find(a => a.name === state.selected);
    const headerBadge = selectedAgent ? `<span class="state-badge state-${selectedAgent.state}">${selectedAgent.state}</span>` : '';
    header.innerHTML = `<span>${esc(state.selected)}</span>${headerBadge}`;
    input.style.display = 'flex';

    const thread = state.threads[state.selected] || [];
    if (thread.length === 0) {
      messages.innerHTML = '<div class="thread-empty">No messages yet</div>';
      return;
    }

    messages.innerHTML = '';
    for (const msg of thread) {
      const div = document.createElement('div');
      const isSystem = msg.message && msg.message.startsWith('[system]');
      if (isSystem) {
        div.className = 'msg system-msg';
      } else {
        div.className = `msg ${msg.direction === 'to_agent' ? 'to-agent' : 'from-agent'}`;
      }
      const sender = isSystem ? 'system' : (msg.direction === 'to_agent' ? 'you' : state.selected);
      const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const topicStr = msg.topic ? ` (re: ${esc(msg.topic)})` : '';
      const displayMsg = isSystem ? msg.message.replace(/^\[system\]\s*/, '') : msg.message;
      div.innerHTML = `
        <div class="msg-sender">${esc(sender)}${topicStr}</div>
        <div>${esc(displayMsg)}</div>
        <div class="msg-time">${time}</div>
      `;
      messages.appendChild(div);
    }
    messages.scrollTop = messages.scrollHeight;
  }

  function selectAgent(name) {
    state.selected = name;
    state.unread[name] = 0;
    renderAgents();
    renderThread();
    updateSendability();
    document.getElementById('msgInput').focus();
  }

  // ── Toast ──
  function showToast(message, type = 'error') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = message;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ── Send enable/disable based on agent state ──
  const CANT_RECEIVE = new Set(['void', 'failed', 'spawning']);

  function updateSendability() {
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    if (!state.selected) return;
    const agent = state.agents.find(a => a.name === state.selected);
    const blocked = agent && CANT_RECEIVE.has(agent.state);
    sendBtn.disabled = blocked;
    msgInput.disabled = blocked;
    msgInput.placeholder = blocked
      ? `Agent is ${agent ? agent.state : 'unavailable'} — cannot receive messages`
      : 'Type a message...';
  }

  // ── Queue Updates ──
  function handleQueueUpdate(message) {
    if (message.status === 'delivered') {
      showToast(`Message delivered to ${message.targetAgent}`, 'success');
    } else if (message.status === 'failed') {
      showToast(`Delivery to ${message.targetAgent} failed: ${message.error || 'unknown'}`, 'error');
    }
  }

  // ── Confirm Dialog ──
  function confirmAction(message) {
    return new Promise((resolve) => {
      const overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML = `
        <div class="confirm-box">
          <p>${esc(message)}</p>
          <div class="actions">
            <button class="cancel-btn">Cancel</button>
            <button class="danger-btn">Confirm</button>
          </div>
        </div>
      `;
      overlay.querySelector('.cancel-btn').onclick = () => { overlay.remove(); resolve(false); };
      overlay.querySelector('.danger-btn').onclick = () => { overlay.remove(); resolve(true); };
      overlay.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { overlay.remove(); resolve(false); }
      });
      document.body.appendChild(overlay);
      overlay.querySelector('.danger-btn').focus();
    });
  }

  const DESTRUCTIVE_ACTIONS = new Set(['kill', 'destroy']);
  const ACTION_LABELS = { kill: 'Kill', destroy: 'Destroy', suspend: 'Suspend', resume: 'Resume', interrupt: 'Interrupt', compact: 'Compact', spawn: 'Spawn' };

  // ── Actions ──
  async function agentAction(name, act) {
    if (DESTRUCTIVE_ACTIONS.has(act)) {
      const confirmed = await confirmAction(`${ACTION_LABELS[act] || act} agent "${name}"? This cannot be undone.`);
      if (!confirmed) return;
    }

    try {
      const res = await fetch(`/api/agents/${encodeURIComponent(name)}/${act}`, {
        method: 'POST',
        headers: authHeaders(),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (!res.ok) {
        let msg = `Action "${act}" failed (HTTP ${res.status})`;
        try {
          const body = await res.json();
          if (body && body.error) msg = body.error;
        } catch (_) {}
        showToast(msg, 'error');
      } else {
        showToast(`${ACTION_LABELS[act] || act}: ${name}`, 'success');
      }
    } catch (err) {
      console.error(`Action ${act} failed:`, err);
      showToast(`Action "${act}" failed — network error`, 'error');
    }
  }

  // Event delegation on agent list — handles both card selection and action buttons.
  function handleAgentListEvent(e) {
    const btn = e.target.closest('button[data-action]');
    if (btn) {
      e.stopPropagation();
      if (btn.classList.contains('loading')) return;
      const card = btn.closest('[data-agent]');
      if (card) {
        btn.classList.add('loading');
        agentAction(card.dataset.agent, btn.dataset.action)
          .finally(() => btn.classList.remove('loading'));
      }
      return;
    }
    const card = e.target.closest('[data-agent]');
    if (card) selectAgent(card.dataset.agent);
  }
  document.getElementById('agentList').addEventListener('click', handleAgentListEvent);
  document.getElementById('agentList').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      handleAgentListEvent(e);
    }
  });

  // ── Send Message ──
  function showSendError(input, sendBtn) {
    input.style.borderColor = 'var(--red)';
    const errEl = document.createElement('span');
    errEl.id = 'sendError';
    errEl.style.cssText = 'color:var(--red);font-size:11px;align-self:center;white-space:nowrap';
    errEl.textContent = 'Send failed';
    input.parentNode.insertBefore(errEl, sendBtn);
    setTimeout(() => { errEl.remove(); input.style.borderColor = ''; }, 3000);
  }

  async function sendMessage() {
    if (!state.selected) return;
    const input = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const text = input.value.trim();
    if (!text) return;

    // Clear any previous error state
    input.style.borderColor = '';
    const existingErr = document.getElementById('sendError');
    if (existingErr) existingErr.remove();

    sendBtn.disabled = true;
    try {
      const res = await fetch('/api/dashboard/send', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ agent: state.selected, message: text }),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (!res.ok) {
        let body = null;
        try { body = await res.json(); } catch (_) {}
        if (body && body.msg) {
          input.value = '';
          showToast('Message saved but delivery failed \u2014 agent may be unreachable', 'warning');
        } else {
          console.error('Send failed: HTTP', res.status);
          showSendError(input, sendBtn);
        }
      } else {
        input.value = '';
      }
    } catch (err) {
      console.error('Send failed:', err);
      showSendError(input, sendBtn);
    } finally {
      updateSendability();
    }
  }

  document.getElementById('sendBtn').onclick = sendMessage;
  document.getElementById('msgInput').onkeydown = (e) => {
    if (e.key === 'Enter') sendMessage();
  };

  // ── Helpers ──
  function esc(s) {
    if (!s) return '';
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  function timeAgo(isoStr) {
    if (!isoStr) return '';
    const diff = Math.max(0, Date.now() - new Date(isoStr).getTime());
    const secs = Math.floor(diff / 1000);
    if (secs < 60) return `${secs}s ago`;
    const mins = Math.floor(secs / 60);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    return `${days}d ago`;
  }

  // ── Create Agent ──
  document.addEventListener('create-agent', async (e) => {
    const shouldSpawn = e.detail?.spawn ?? false;
    const name = document.getElementById('createName')?.value.trim();
    const engine = document.getElementById('createEngine')?.value;
    const cwd = document.getElementById('createCwd')?.value.trim();
    const task = document.getElementById('createTask')?.value.trim();
    if (!name) { showToast('Agent name is required', 'error'); return; }
    if (!cwd) { showToast('Working directory is required', 'error'); return; }

    try {
      // Step 1: Create the agent
      const createRes = await fetch('/api/agents', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ name, engine, cwd }),
      });
      if (createRes.status === 401) { handleAuthError(); return; }
      const createBody = await createRes.json();
      if (!createRes.ok) {
        showToast(createBody.error || 'Create failed', 'error');
        return;
      }

      document.getElementById('createName').value = '';
      document.getElementById('createTask').value = '';
      createFormOpen = false;

      if (shouldSpawn) {
        // Step 2: Spawn with optional task
        const spawnBody = {};
        if (task) spawnBody.task = task;
        const spawnRes = await fetch(`/api/agents/${encodeURIComponent(name)}/spawn`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(spawnBody),
        });
        if (spawnRes.ok) {
          showToast(`Agent "${name}" created and spawning`, 'success');
        } else {
          showToast(`Agent created but spawn failed`, 'warning');
        }
      } else {
        showToast(`Agent "${name}" created`, 'success');
      }
      selectAgent(name);
    } catch (err) {
      showToast('Create failed — network error', 'error');
    }
  });

  // ── Init ──
  connect();
  // Refresh relative timestamps every 30s
  setInterval(() => { if (state.agents.length > 0) renderAgents(); }, 30000);
})();
</script>
</body>
</html>

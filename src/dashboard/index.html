<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Collab</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #d18616;
    --purple: #bc8cff;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 16px; font-weight: 600; }
  .conn-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
  }
  .conn-dot.connected { background: var(--green); }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 49px);
  }

  /* ── Agent Grid ── */
  .agent-list {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card.selected { border-color: var(--accent); background: #1c2333; }
  .agent-card.flash { animation: flash-card 0.6s ease; }

  @keyframes flash-card {
    0%,100% { background: var(--surface); }
    50% { background: #1a2a1a; }
  }

  .agent-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .agent-name { font-weight: 600; font-size: 14px; }
  .state-badge {
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .state-active   { background: rgba(63,185,80,0.15); color: var(--green); }
  .state-idle     { background: rgba(139,148,158,0.15); color: var(--text-dim); }
  .state-spawning { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-suspended { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .state-failed   { background: rgba(248,81,73,0.15); color: var(--red); }
  .state-suspending { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-resuming  { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-void     { background: rgba(139,148,158,0.1); color: var(--text-dim); }

  .agent-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .agent-meta span { display: flex; align-items: center; gap: 4px; }

  .agent-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .agent-actions button {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .agent-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .agent-actions button.danger:hover { border-color: var(--red); color: var(--red); }

  /* ── Thread Panel ── */
  .thread-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    overflow: hidden;
  }
  .thread-messages {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .thread-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
  }

  .msg {
    max-width: 70%;
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg-body { white-space: normal; }
  .msg-body p { margin: 4px 0; }
  .msg-body code { background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .msg-body pre { white-space: pre-wrap; }
  .msg-body ul, .msg-body ol { margin: 4px 0; padding-left: 20px; }
  .msg-body h1, .msg-body h2, .msg-body h3, .msg-body h4, .msg-body h5, .msg-body h6 { margin: 8px 0 4px; }
  .msg.to-agent {
    align-self: flex-end;
    background: #1a3a5c;
    border: 1px solid rgba(88,166,255,0.3);
  }
  .msg.from-agent {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .msg-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .msg-sender { font-weight: 600; }
  .msg-time { font-size: 10px; }
  .msg-meta { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .msg-status { font-size: 10px; }
  .msg-status.pending { color: var(--text-dim); }
  .msg-status.delivered { color: var(--green); }
  .msg-status.failed { color: var(--red); }

  /* ── Input ── */
  .thread-input {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 8px;
    background: var(--surface);
  }
  .thread-input textarea {
    flex: 1;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    resize: none;
    overflow-y: hidden;
    min-height: 36px;
    max-height: 120px;
    line-height: 1.4;
  }
  .thread-input textarea:focus { border-color: var(--accent); }
  .thread-input button {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  .thread-input button:hover { opacity: 0.9; }
  .thread-input button:disabled { opacity: 0.5; cursor: not-allowed; }
  .thread-input textarea:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Upload Button ── */
  .upload-btn {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
  }
  .upload-btn:hover { border-color: var(--accent); color: var(--accent); }
  .upload-btn:disabled { opacity: 0.5; cursor: not-allowed; }
  .upload-btn.uploading {
    pointer-events: none;
    position: relative;
    color: transparent;
  }
  .upload-btn.uploading::after {
    content: '';
    position: absolute;
    inset: 0;
    margin: auto;
    width: 14px; height: 14px;
    border: 2px solid var(--text-dim);
    border-top-color: transparent;
    border-radius: 50%;
    animation: btn-spin 0.6s linear infinite;
  }

  .msg.file-upload .file-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .msg.file-upload .file-icon { font-size: 16px; }

  .thread-messages.drag-over {
    outline: 2px dashed var(--accent);
    outline-offset: -4px;
    background: rgba(88,166,255,0.05);
  }

  /* ── Confirm Dialog ── */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  }
  .confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    max-width: 360px;
    box-shadow: var(--shadow);
  }
  .confirm-box p { margin-bottom: 16px; font-size: 14px; line-height: 1.5; }
  .confirm-box .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .confirm-box button {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .confirm-box button.danger-btn {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .confirm-box button:hover { opacity: 0.9; }

  /* ── Unread Badge ── */
  .unread-badge {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
    margin-left: 6px;
  }

  /* ── Create Form ── */
  .create-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .create-form-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .create-form-toggle:hover { color: var(--accent); }
  .create-form-toggle .chevron { transition: transform 0.15s; }
  .create-form.open .chevron { transform: rotate(90deg); }
  .create-form-body {
    display: none;
    padding: 0 14px 14px;
    flex-direction: column;
    gap: 8px;
  }
  .create-form.open .create-form-body { display: flex; }
  .create-form input, .create-form select, .create-form textarea {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    resize: vertical;
  }
  .create-form input:focus, .create-form select:focus, .create-form textarea:focus { border-color: var(--accent); }
  .create-form-actions { display: flex; gap: 6px; }
  .create-form-actions button {
    padding: 7px 14px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
  }
  .create-form-actions button:hover { opacity: 0.9; }
  .create-form-actions button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .create-form-actions button.secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── System message ── */
  .msg.system-msg {
    align-self: center;
    max-width: 90%;
    background: rgba(139,148,158,0.08);
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-size: 12px;
    font-style: italic;
  }

  /* ── Button loading state ── */
  .agent-actions button.loading {
    opacity: 0.5;
    pointer-events: none;
    position: relative;
  }
  .agent-actions button.loading::after {
    content: '';
    width: 10px; height: 10px;
    border: 2px solid var(--text-dim);
    border-top-color: transparent;
    border-radius: 50%;
    animation: btn-spin 0.6s linear infinite;
    display: inline-block;
    margin-left: 4px;
    vertical-align: middle;
  }
  @keyframes btn-spin {
    to { transform: rotate(360deg); }
  }

  /* ── Agent time ── */
  .agent-time {
    font-size: 11px;
    color: var(--text-dim);
    margin-left: auto;
  }

  /* ── Agent failure reason ── */
  .agent-failure {
    font-size: 11px;
    color: var(--red);
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Thread header enriched ── */
  .thread-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    position: relative;
    font-size: 14px;
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Thread tabs ── */
  .thread-tabs {
    display: flex;
    gap: 2px;
    margin-left: auto;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 2px;
  }
  .thread-tabs button {
    padding: 4px 12px;
    border: none;
    border-radius: calc(var(--radius) - 2px);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .thread-tabs button:hover { color: var(--fg); }
  .thread-tabs button.active {
    background: var(--surface);
    color: var(--fg);
  }
  .clear-chat-btn {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: 4px;
  }
  .clear-chat-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── Persona panel ── */
  .persona-panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--fg);
  }
  .persona-panel .persona-empty {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    padding: 40px 20px;
  }
  .persona-panel pre {
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: inherit;
    margin: 0;
  }

  .watch-panel {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    background: #0d1117;
    font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.4;
    color: #c9d1d9;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .watch-panel .watch-status {
    color: var(--text-dim);
    font-family: var(--font);
    font-size: 11px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    box-shadow: var(--shadow);
    pointer-events: none;
    animation: toast-in 0.2s ease;
  }
  .toast.error   { background: var(--red); }
  .toast.warning { background: var(--orange); }
  .toast.success { background: var(--green); }

  @keyframes toast-in {
    from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── Auth Modal ── */
  .auth-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10001;
  }
  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    max-width: 380px;
    width: 90%;
    box-shadow: var(--shadow);
  }
  .auth-box h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .auth-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.5; }
  .auth-box input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
  }
  .auth-box input:focus { border-color: var(--accent); }
  .auth-box .auth-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .auth-box button {
    padding: 8px 20px;
    border-radius: 6px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .auth-box button.primary { background: var(--accent); color: #fff; }
  .auth-box button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .auth-box button:hover { opacity: 0.9; }

  /* ── Search Input ── */
  .agent-search {
    padding: 0 0 8px;
    position: sticky;
    top: 0;
    z-index: 1;
    background: transparent;
  }
  .agent-search input {
    width: 100%;
    padding: 8px 10px 8px 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .agent-search input:focus { border-color: var(--accent); }
  .agent-search .search-icon {
    position: absolute;
    left: 9px;
    top: 9px;
    font-size: 13px;
    color: var(--text-dim);
    pointer-events: none;
  }

  /* ── Persona frontmatter table ── */
  .persona-meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 12px;
    font-size: 12px;
    margin-bottom: 16px;
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .persona-meta dt {
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    font-size: 11px;
    padding: 2px 0;
  }
  .persona-meta dd {
    color: var(--text);
    padding: 2px 0;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 12px;
  }
  .persona-body {
    white-space: normal;
    word-wrap: break-word;
    font-family: inherit;
    margin: 0;
    line-height: 1.7;
  }
  .persona-body ul, .persona-body ol { margin: 4px 0; padding-left: 20px; }
  .persona-body li { margin: 2px 0; }

  /* ── Mobile back button ── */
  .mobile-back {
    display: none;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    margin-right: 4px;
  }
  .mobile-back:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    html, body { overflow-x: hidden; }
    .layout { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .agent-list {
      border-right: none;
      height: calc(100vh - 49px);
      max-height: none;
    }
    .thread-panel { height: calc(100vh - 49px); }
    .layout.mobile-thread .agent-list { display: none; }
    .layout.mobile-thread .thread-panel { display: flex; }
    .layout:not(.mobile-thread) .thread-panel { display: none; }
    .layout:not(.mobile-thread) .agent-list { display: flex; }
    .mobile-back { display: block; }
    .msg { max-width: 85%; }
    .thread-input { padding: 8px 10px; gap: 6px; }
    .thread-input textarea { font-size: 16px; } /* prevent iOS zoom */
    header h1 { font-size: 14px; }
    header { padding: 10px 12px; }
    .agent-card { padding: 10px; }
    .agent-header { flex-wrap: wrap; gap: 4px; }
    .agent-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: calc(100vw - 140px);
    }
    .agent-meta {
      flex-wrap: wrap;
      gap: 6px 10px;
    }
    .agent-meta span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: calc(100vw - 60px);
    }
    .agent-actions { gap: 4px; }
    .agent-actions button { padding: 4px 8px; font-size: 11px; }
    .agent-list { padding: 8px; overflow-x: hidden; }
    .create-form-body input,
    .create-form-body select,
    .create-form-body textarea { font-size: 16px; } /* prevent iOS zoom */
    .thread-header {
      flex-wrap: wrap;
      padding: 10px 12px;
      gap: 6px;
    }
    .thread-header > span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 50vw;
    }
    .thread-tabs {
      order: 10;
      width: 100%;
      margin-left: 0;
      justify-content: stretch;
    }
    .thread-tabs button {
      flex: 1;
      text-align: center;
    }
    .clear-chat-btn { margin-left: auto; }
    .thread-messages { padding: 12px 10px; }
    .persona-panel { padding: 14px 10px; }
    .watch-panel { padding: 10px 8px; font-size: 11px; }
  }
</style>
</head>
<body>
<header>
  <h1>Agentic Collab</h1>
  <div class="conn-status">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">Disconnected</span>
  </div>
</header>
<div class="layout">
  <div class="agent-list" id="agentList">
    <div class="agent-search" style="position:relative">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="agentSearch" placeholder="Filter agents..." />
    </div>
  </div>
  <div class="thread-panel" id="threadPanel">
    <div class="thread-header" id="threadHeader">Select an agent</div>
    <div class="thread-messages" id="threadMessages">
      <div class="thread-empty">Select an agent to view messages</div>
    </div>
    <div class="persona-panel" id="personaPanel" style="display:none"></div>
    <div class="watch-panel" id="watchPanel" style="display:none"></div>
    <div class="thread-input" id="threadInput" style="display:none">
      <input type="file" id="fileInput" style="display:none" multiple />
      <textarea id="msgInput" placeholder="Type a message..." rows="1"></textarea>
      <button class="upload-btn" id="uploadBtn" disabled title="Upload files">+</button>
      <button id="sendBtn" disabled>Send</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ── Auth ──
  // Token stored in sessionStorage — cleared when tab closes
  function getToken() {
    return sessionStorage.getItem('orchestrator_token') || '';
  }

  function setToken(token) {
    if (token) sessionStorage.setItem('orchestrator_token', token);
    else sessionStorage.removeItem('orchestrator_token');
  }

  function authHeaders() {
    const token = getToken();
    const headers = { 'content-type': 'application/json' };
    if (token) headers['authorization'] = `Bearer ${token}`;
    return headers;
  }

  function handleAuthError() {
    setToken('');
    promptForToken('Authentication failed. Please re-enter your token.');
  }

  function promptForToken(message) {
    // Remove existing overlay if present
    const existing = document.querySelector('.auth-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'auth-overlay';
    overlay.innerHTML = `
      <div class="auth-box">
        <h2>Agentic Collab</h2>
        <p>${esc(message || 'Enter your orchestrator token to connect, or skip for dev mode (no auth).')}</p>
        <input type="password" id="authTokenInput" placeholder="Orchestrator token" autocomplete="off" />
        <div class="auth-actions">
          <button class="secondary" id="authSkipBtn">Dev Mode</button>
          <button class="primary" id="authConnectBtn">Connect</button>
        </div>
      </div>
    `;

    function submit(token) {
      setToken(token);
      overlay.remove();
      // Reconnect with new token
      if (ws) { ws.onclose = null; ws.close(); }
      connect();
    }

    overlay.querySelector('#authConnectBtn').onclick = () => {
      const val = document.getElementById('authTokenInput').value.trim();
      if (!val) { document.getElementById('authTokenInput').style.borderColor = 'var(--red)'; return; }
      submit(val);
    };
    overlay.querySelector('#authSkipBtn').onclick = () => submit('');
    overlay.querySelector('#authTokenInput').onkeydown = (e) => {
      if (e.key === 'Enter') overlay.querySelector('#authConnectBtn').click();
    };

    document.body.appendChild(overlay);
    setTimeout(() => document.getElementById('authTokenInput')?.focus(), 50);
  }

  // ── State ──
  const state = {
    agents: [],
    threads: {},
    selected: null,
    connected: false,
    unread: {},  // { agentName: count }
    threadView: 'messages',  // 'messages' | 'persona' | 'watch'
    watchTimer: null,
    personaCache: {},  // { agentName: { content, fetched } }
    searchFilter: '',
    engineUsage: {},  // { engine: EngineUsage }
  };

  let ws = null;
  let reconnectTimer = null;
  let reconnectDelay = 1000;

  // ── WebSocket ──
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const token = getToken();
    const tokenParam = token ? `?token=${encodeURIComponent(token)}` : '';
    let opened = false;
    ws = new WebSocket(`${proto}://${location.host}/ws${tokenParam}`);

    ws.onopen = () => {
      opened = true;
      state.connected = true;
      reconnectDelay = 1000;
      updateConnStatus();
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    };

    ws.onclose = () => {
      state.connected = false;
      updateConnStatus();
      if (!opened) {
        // Never connected — likely auth failure (401 on upgrade)
        setToken('');
        promptForToken('Connection rejected — enter your orchestrator token.');
        return;
      }
      const jitter = Math.random() * 1000;
      reconnectTimer = setTimeout(connect, reconnectDelay + jitter);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (evt) => {
      let data;
      try {
        data = JSON.parse(evt.data);
      } catch (err) {
        console.warn('Malformed WebSocket frame:', err);
        return;
      }
      switch (data.type) {
        case 'init':
          state.agents = data.agents;
          state.threads = data.threads;
          renderAgents();
          renderThread();
          break;
        case 'agent_update':
          updateAgent(data.agent);
          break;
        case 'message':
          addMessage(data.msg);
          break;
        case 'queue_update':
          handleQueueUpdate(data.message);
          break;
      }
    };
  }

  function updateConnStatus() {
    const dot = document.getElementById('connDot');
    const label = document.getElementById('connLabel');
    dot.classList.toggle('connected', state.connected);
    label.textContent = state.connected ? 'Connected' : 'Disconnected';
  }

  // ── State Updates ──
  function updateAgent(agent) {
    const idx = state.agents.findIndex(a => a.name === agent.name);
    if (idx >= 0) state.agents[idx] = agent;
    else state.agents.push(agent);
    renderAgents();
    if (agent.name === state.selected) {
      updateSendability();
      // Update state badge without wiping tabs/buttons from the header
      const header = document.getElementById('threadHeader');
      const badge = header.querySelector('.state-badge');
      if (badge) {
        badge.className = `state-badge state-${agent.state}`;
        badge.textContent = agent.state;
      }
    }
  }

  function addMessage(msg) {
    if (!state.threads[msg.agent]) state.threads[msg.agent] = [];
    state.threads[msg.agent].push(msg);
    if (state.selected === msg.agent) {
      renderThread();
    } else {
      // Track unread for non-selected agents
      state.unread[msg.agent] = (state.unread[msg.agent] || 0) + 1;
    }

    // Flash the agent card
    const card = document.querySelector(`[data-agent="${msg.agent}"]`);
    if (card && state.selected !== msg.agent) {
      card.classList.add('flash');
      setTimeout(() => card.classList.remove('flash'), 600);
    }
    renderAgents();
  }

  // ── Render ──
  let createFormOpen = false;

  function renderAgents() {
    const list = document.getElementById('agentList');

    // Preserve create form input values before clearing
    const prevName = document.getElementById('createName')?.value || '';
    const prevEngine = document.getElementById('createEngine')?.value || 'claude';
    const prevCwd = document.getElementById('createCwd')?.value || '/tmp';
    const prevTask = document.getElementById('createTask')?.value || '';

    // Remove everything except the search box
    list.querySelectorAll(':scope > :not(.agent-search)').forEach(el => el.remove());

    // Collapsible create agent form
    const form = document.createElement('div');
    form.className = `create-form${createFormOpen ? ' open' : ''}`;
    form.innerHTML = `
      <div class="create-form-toggle">
        <span>+ New Agent</span>
        <span class="chevron">\u25B8</span>
      </div>
      <div class="create-form-body">
        <input type="text" id="createName" placeholder="Agent name" value="${esc(prevName)}" />
        <select id="createEngine">
          <option value="claude"${prevEngine === 'claude' ? ' selected' : ''}>claude</option>
          <option value="codex"${prevEngine === 'codex' ? ' selected' : ''}>codex</option>
          <option value="opencode"${prevEngine === 'opencode' ? ' selected' : ''}>opencode</option>
        </select>
        <input type="text" id="createCwd" placeholder="Working directory" value="${esc(prevCwd)}" />
        <textarea id="createTask" rows="2" placeholder="Initial task (optional)">${esc(prevTask)}</textarea>
        <div class="create-form-actions">
          <button onclick="document.dispatchEvent(new CustomEvent('create-agent', {detail:{spawn:true}}))">Create & Spawn</button>
          <button class="secondary" onclick="document.dispatchEvent(new CustomEvent('create-agent', {detail:{spawn:false}}))">Create Only</button>
        </div>
      </div>
    `;
    form.querySelector('.create-form-toggle').onclick = () => {
      createFormOpen = !createFormOpen;
      form.classList.toggle('open', createFormOpen);
    };
    list.appendChild(form);

    const filter = state.searchFilter.toLowerCase();
    const filtered = filter
      ? state.agents.filter(a => a.name.toLowerCase().includes(filter) || a.engine.toLowerCase().includes(filter) || a.state.toLowerCase().includes(filter))
      : state.agents;

    for (const agent of filtered) {
      const card = document.createElement('div');
      card.className = `agent-card${state.selected === agent.name ? ' selected' : ''}`;
      card.dataset.agent = agent.name;

      const stateClass = `state-${agent.state}`;
      const modelStr = [agent.engine, agent.model, agent.thinking].filter(Boolean).join(' ');
      const ctxStr = agent.lastContextPct != null ? `${agent.lastContextPct}%` : '--';
      const unreadCount = state.unread[agent.name] || 0;
      const unreadBadge = unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : '';
      const activityTime = agent.lastActivity || agent.createdAt;
      const timeStr = timeAgo(activityTime);

      const activeIdle = agent.state === 'active' || agent.state === 'idle';
      const suspendedFailed = agent.state === 'suspended' || agent.state === 'failed';
      const transitioning = agent.state === 'spawning' || agent.state === 'suspending' || agent.state === 'resuming';
      const isVoid = agent.state === 'void';
      const failureInfo = agent.state === 'failed' && agent.failureReason
        ? `<div class="agent-failure" title="${esc(agent.failureReason)}">${esc(agent.failureReason)}</div>` : '';
      card.setAttribute('tabindex', '0');
      card.innerHTML = `
        <div class="agent-header">
          <span class="agent-name">${esc(agent.name)}${unreadBadge}</span>
          <span class="agent-time">${timeStr}</span>
          <span class="state-badge ${stateClass}">${agent.state}</span>
        </div>
        <div class="agent-meta">
          <span>${esc(modelStr)}</span>
          <span>ctx: ${ctxStr}</span>
          ${agent.proxyId ? `<span title="proxy: ${esc(agent.proxyId)}">${esc(agent.proxyId)}</span>` : ''}
        </div>
        ${failureInfo}
        <div class="agent-actions">
          ${activeIdle ? `
            <button data-action="interrupt">Interrupt</button>
            <button data-action="compact">Compact</button>
            <button data-action="suspend">Suspend</button>
            <button class="danger" data-action="kill">Kill</button>
          ` : ''}
          ${suspendedFailed ? `
            <button data-action="resume">Resume</button>
            <button class="danger" data-action="destroy">Destroy</button>
          ` : ''}
          ${transitioning ? `
            <button class="danger" data-action="kill">Kill</button>
          ` : ''}
          ${isVoid ? `
            <button data-action="spawn">Spawn</button>
            <button class="danger" data-action="destroy">Destroy</button>
          ` : ''}
        </div>
      `;
      list.appendChild(card);
    }

    // Engine status summary
    const engineSummary = document.createElement('div');
    engineSummary.style.cssText = 'margin-top:12px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:12px';
    const engineCounts = {};
    for (const a of state.agents) {
      if (!engineCounts[a.engine]) engineCounts[a.engine] = { total: 0, active: 0, idle: 0, failed: 0 };
      engineCounts[a.engine].total++;
      if (a.state === 'active') engineCounts[a.engine].active++;
      else if (a.state === 'idle') engineCounts[a.engine].idle++;
      else if (a.state === 'failed') engineCounts[a.engine].failed++;
    }
    let engineHtml = '<div style="font-weight:600;margin-bottom:6px;color:var(--text)">Engines</div>';
    for (const engine of ['claude', 'codex', 'opencode']) {
      const c = engineCounts[engine];
      if (!c) {
        engineHtml += `<div style="color:var(--text-dim);margin:2px 0">${engine}: <span style="color:var(--text-dim)">not configured</span></div>`;
      } else {
        const parts = [];
        if (c.active) parts.push(`<span style="color:var(--green)">${c.active} active</span>`);
        if (c.idle) parts.push(`<span style="color:var(--yellow)">${c.idle} idle</span>`);
        if (c.failed) parts.push(`<span style="color:var(--red)">${c.failed} failed</span>`);
        const rest = c.total - c.active - c.idle - c.failed;
        if (rest > 0) parts.push(`${rest} other`);
        engineHtml += `<div style="margin:2px 0">${engine}: ${parts.join(', ')}</div>`;

        // Usage buckets
        const usage = state.engineUsage[engine];
        if (usage && usage.buckets && usage.buckets.length > 0) {
          for (const b of usage.buckets) {
            const barPct = Math.min(100, Math.max(0, b.pctUsed));
            const color = barPct >= 80 ? 'var(--red)' : barPct >= 50 ? 'var(--yellow)' : 'var(--green)';
            engineHtml += `<div style="margin:2px 0 2px 12px;font-size:11px;color:var(--text-dim)">`;
            engineHtml += `${b.label}: `;
            engineHtml += `<span style="display:inline-block;width:60px;height:8px;background:var(--border);border-radius:4px;vertical-align:middle;overflow:hidden">`;
            engineHtml += `<span style="display:block;width:${barPct}%;height:100%;background:${color};border-radius:4px"></span></span>`;
            engineHtml += ` <span style="color:${color}">${b.pctUsed}%</span>`;
            if (b.resetsAt) engineHtml += ` <span style="font-size:10px">(resets ${b.resetsAt})</span>`;
            engineHtml += `</div>`;
          }
          const ago = timeAgo(usage.queriedAt);
          engineHtml += `<div style="margin:1px 0 4px 12px;font-size:10px;color:var(--text-dim)">queried ${ago}</div>`;
        }
      }
    }
    engineSummary.innerHTML = engineHtml;
    list.appendChild(engineSummary);
  }

  function renderThread() {
    const header = document.getElementById('threadHeader');
    const messages = document.getElementById('threadMessages');
    const personaPanel = document.getElementById('personaPanel');
    const watchPanel = document.getElementById('watchPanel');
    const input = document.getElementById('threadInput');

    // Stop watch polling when leaving the tab
    if (state.watchTimer) {
      clearInterval(state.watchTimer);
      state.watchTimer = null;
    }

    if (!state.selected) {
      header.textContent = 'Select an agent';
      messages.innerHTML = '<div class="thread-empty">Select an agent to view messages</div>';
      personaPanel.style.display = 'none';
      watchPanel.style.display = 'none';
      input.style.display = 'none';
      return;
    }

    const selectedAgent = state.agents.find(a => a.name === state.selected);
    const headerBadge = selectedAgent ? `<span class="state-badge state-${selectedAgent.state}">${selectedAgent.state}</span>` : '';
    const tabs = `<div class="thread-tabs">
      <button class="${state.threadView === 'messages' ? 'active' : ''}" data-tab="messages">Messages</button>
      <button class="${state.threadView === 'persona' ? 'active' : ''}" data-tab="persona">Persona</button>
      <button class="${state.threadView === 'watch' ? 'active' : ''}" data-tab="watch">Watch</button>
    </div>`;
    const clearBtn = `<button class="clear-chat-btn" id="clearChatBtn" title="Clear chat history">\u2715</button>`;
    header.innerHTML = `<button class="mobile-back" id="mobileBackBtn">\u2190</button><span>${esc(state.selected)}</span>${headerBadge}${tabs}${clearBtn}`;
    document.getElementById('mobileBackBtn').onclick = mobileBack;
    document.getElementById('clearChatBtn').onclick = () => clearChat(state.selected);
    header.querySelectorAll('.thread-tabs button').forEach(btn => {
      btn.onclick = () => { state.threadView = btn.dataset.tab; renderThread(); };
    });

    const view = state.threadView;
    messages.style.display = view === 'messages' ? 'flex' : 'none';
    personaPanel.style.display = view === 'persona' ? 'block' : 'none';
    watchPanel.style.display = view === 'watch' ? 'block' : 'none';
    input.style.display = view === 'messages' ? 'flex' : 'none';

    if (view === 'persona') {
      renderPersona();
      return;
    }

    if (view === 'watch') {
      startWatchPolling();
      return;
    }

    const thread = state.threads[state.selected] || [];
    if (thread.length === 0) {
      messages.innerHTML = '<div class="thread-empty">No messages yet</div>';
      return;
    }

    messages.innerHTML = '';
    for (const msg of thread) {
      const div = document.createElement('div');
      const isSystem = msg.message && msg.message.startsWith('[system]');
      const isUpload = msg.topic === 'file-upload' && msg.direction === 'to_agent';
      if (isSystem) {
        div.className = 'msg system-msg';
      } else if (isUpload) {
        div.className = 'msg to-agent file-upload';
      } else {
        div.className = `msg ${msg.direction === 'to_agent' ? 'to-agent' : 'from-agent'}`;
      }
      const sender = isSystem ? 'system' : (msg.direction === 'to_agent' ? 'you' : state.selected);
      const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const topicStr = (!isUpload && msg.topic) ? ` (re: ${esc(msg.topic)})` : '';
      const displayMsg = isSystem ? msg.message.replace(/^\[system\]\s*/, '') : msg.message;
      const statusHtml = (msg.direction === 'to_agent' && msg.queueId)
        ? `<span class="msg-status ${msg.deliveryStatus || 'pending'}" data-queue-id="${msg.queueId}">${
            msg.deliveryStatus === 'delivered' ? '\u2713 delivered' :
            msg.deliveryStatus === 'failed' ? '\u2717 failed' :
            '\u2022\u2022\u2022 sending'
          }</span>`
        : '';
      const headerHtml = `<div class="msg-header"><span class="msg-sender">${esc(sender)}${topicStr}</span><span class="msg-meta"><span class="msg-time">${time}</span>${statusHtml}</span></div>`;
      if (isUpload) {
        div.innerHTML = `${headerHtml}<div class="file-info"><span class="file-icon">&#128206;</span> ${esc(displayMsg)}</div>`;
      } else {
        div.innerHTML = `${headerHtml}<div class="msg-body">${renderMarkdown(esc(displayMsg))}</div>`;
      }
      messages.appendChild(div);
    }
    messages.scrollTop = messages.scrollHeight;
  }

  function selectAgent(name) {
    state.selected = name;
    state.unread[name] = 0;
    state.threadView = 'messages';
    renderAgents();
    renderThread();
    updateSendability();
    // Mobile: show thread panel
    document.querySelector('.layout').classList.add('mobile-thread');
    document.getElementById('msgInput').focus();
  }

  function mobileBack() {
    document.querySelector('.layout').classList.remove('mobile-thread');
  }

  async function fetchPersona(name) {
    const cached = state.personaCache[name];
    if (cached && Date.now() - cached.fetched < 30000) return cached.data;
    try {
      const token = getToken();
      const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
      const res = await fetch(`/api/personas/${encodeURIComponent(name)}`, { headers });
      if (res.status === 404) {
        state.personaCache[name] = { data: null, fetched: Date.now() };
        return null;
      }
      if (!res.ok) return null;
      const data = await res.json();
      state.personaCache[name] = { data, fetched: Date.now() };
      return data;
    } catch {
      return null;
    }
  }

  const FM_LABELS = {
    engine: 'Engine', model: 'Model', thinking: 'Thinking',
    cwd: 'Working Dir', proxy_host: 'Proxy Host', permissions: 'Permissions',
  };

  async function renderPersona() {
    const panel = document.getElementById('personaPanel');
    if (!state.selected) return;
    panel.innerHTML = '<div class="persona-empty">Loading…</div>';
    const data = await fetchPersona(state.selected);
    if (state.threadView !== 'persona' || !state.selected) return;
    if (!data) {
      panel.innerHTML = '<div class="persona-empty">No persona defined for this agent.<br>Create <code>persistent-agents/' + esc(state.selected) + '.md</code> to add one.</div>';
      return;
    }
    let html = '<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="clear-chat-btn" id="editPersonaBtn">Edit</button></div>';
    const fm = data.frontmatter;
    if (fm && Object.keys(fm).length > 0) {
      html += '<dl class="persona-meta">';
      for (const [key, label] of Object.entries(FM_LABELS)) {
        if (fm[key]) html += '<dt>' + label + '</dt><dd>' + esc(fm[key]) + '</dd>';
      }
      for (const key of Object.keys(fm)) {
        if (!FM_LABELS[key] && fm[key]) html += '<dt>' + esc(key) + '</dt><dd>' + esc(fm[key]) + '</dd>';
      }
      html += '</dl>';
    }
    if (data.body) {
      html += '<div class="persona-body">' + renderMarkdown(esc(data.body)) + '</div>';
    }
    panel.innerHTML = html || '<div class="persona-empty">Persona file is empty.</div>';
    const editBtn = document.getElementById('editPersonaBtn');
    if (editBtn) {
      editBtn.onclick = () => enterPersonaEdit(state.selected, data.content);
    }
  }

  // ── Watch View ──

  async function fetchPaneOutput(agentName) {
    try {
      const resp = await fetch(`/api/agents/${encodeURIComponent(agentName)}/peek`, {
        headers: getToken() ? { 'Authorization': `Bearer ${getToken()}` } : {},
      });
      if (!resp.ok) return null;
      const data = await resp.json();
      return data.output ?? null;
    } catch { return null; }
  }

  function startWatchPolling() {
    const panel = document.getElementById('watchPanel');
    if (!state.selected) return;
    panel.innerHTML = '<div class="watch-status">Connecting...</div>';

    async function poll() {
      if (state.threadView !== 'watch' || !state.selected) return;
      const output = await fetchPaneOutput(state.selected);
      if (state.threadView !== 'watch' || !state.selected) return;
      if (output === null) {
        panel.innerHTML = '<div class="watch-status">Agent has no active session</div>';
      } else {
        const now = new Date().toLocaleTimeString();
        panel.innerHTML = `<div class="watch-status">Last capture: ${now}</div>${esc(output)}`;
      }
    }

    poll();
    state.watchTimer = setInterval(poll, 3000);
  }

  function enterPersonaEdit(agentName, rawContent) {
    const panel = document.getElementById('personaPanel');
    panel.innerHTML = `
      <div style="display:flex;flex-direction:column;height:100%;padding:0">
        <div style="display:flex;gap:8px;padding:8px 0;align-items:center">
          <button class="clear-chat-btn" id="cancelEditBtn">Cancel</button>
          <button id="savePersonaBtn" style="padding:4px 12px;border:none;border-radius:4px;background:var(--green);color:#fff;font-size:12px;cursor:pointer">Save</button>
          <span id="personaSaveStatus" style="font-size:11px;color:var(--text-dim)"></span>
        </div>
        <textarea id="personaEditor" style="flex:1;width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:12px;font-family:monospace;font-size:12px;resize:none;outline:none;box-sizing:border-box">${esc(rawContent || '')}</textarea>
      </div>
    `;
    document.getElementById('cancelEditBtn').onclick = () => {
      delete state.personaCache[agentName];
      renderPersona();
    };
    document.getElementById('savePersonaBtn').onclick = async () => {
      const content = document.getElementById('personaEditor').value;
      const statusEl = document.getElementById('personaSaveStatus');
      try {
        const res = await fetch(`/api/personas/${encodeURIComponent(agentName)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ content }),
        });
        if (res.status === 401) { handleAuthError(); return; }
        if (res.ok) {
          statusEl.style.color = 'var(--green)';
          statusEl.textContent = '\u2713 Saved — changes take effect when the agent restarts';
          delete state.personaCache[agentName];
        } else {
          const err = await res.json().catch(() => ({}));
          statusEl.style.color = 'var(--red)';
          statusEl.textContent = '\u2717 ' + (err.error || 'Save failed');
        }
      } catch (err) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = '\u2717 Save failed';
      }
    };
  }

  // ── Toast ──
  function showToast(message, type = 'error') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = message;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ── Send enable/disable based on agent state ──
  const CANT_RECEIVE = new Set(['void', 'failed', 'spawning']);

  function updateSendability() {
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    if (!state.selected) return;
    const agent = state.agents.find(a => a.name === state.selected);
    const blocked = agent && CANT_RECEIVE.has(agent.state);
    sendBtn.disabled = blocked;
    uploadBtn.disabled = blocked;
    msgInput.disabled = blocked;
    msgInput.placeholder = blocked
      ? `Agent is ${agent ? agent.state : 'unavailable'} — cannot receive messages`
      : 'Type a message...';
  }

  // ── Queue Updates ──
  function handleQueueUpdate(message) {
    // Update delivery status in thread data
    const thread = state.threads[message.targetAgent];
    if (thread) {
      for (const msg of thread) {
        if (msg.queueId === message.id) {
          msg.deliveryStatus = message.status;
          break;
        }
      }
    }

    // Update inline status badge in DOM
    const badge = document.querySelector(`[data-queue-id="${message.id}"]`);
    if (badge) {
      badge.className = `msg-status ${message.status}`;
      badge.textContent = message.status === 'delivered' ? '\u2713 delivered' :
                          message.status === 'failed' ? '\u2717 failed' :
                          '\u2022\u2022\u2022 sending';
    }
  }

  // ── Confirm Dialog ──
  function confirmAction(message) {
    return new Promise((resolve) => {
      const overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML = `
        <div class="confirm-box">
          <p>${esc(message)}</p>
          <div class="actions">
            <button class="cancel-btn">Cancel</button>
            <button class="danger-btn">Confirm</button>
          </div>
        </div>
      `;
      overlay.querySelector('.cancel-btn').onclick = () => { overlay.remove(); resolve(false); };
      overlay.querySelector('.danger-btn').onclick = () => { overlay.remove(); resolve(true); };
      overlay.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { overlay.remove(); resolve(false); }
      });
      document.body.appendChild(overlay);
      overlay.querySelector('.danger-btn').focus();
    });
  }

  const DESTRUCTIVE_ACTIONS = new Set(['kill', 'destroy']);
  const ACTION_LABELS = { kill: 'Kill', destroy: 'Destroy', suspend: 'Suspend', resume: 'Resume', interrupt: 'Interrupt', compact: 'Compact', spawn: 'Spawn' };

  // ── Actions ──
  async function agentAction(name, act) {
    if (DESTRUCTIVE_ACTIONS.has(act)) {
      const confirmed = await confirmAction(`${ACTION_LABELS[act] || act} agent "${name}"? This cannot be undone.`);
      if (!confirmed) return;
    }

    try {
      const res = await fetch(`/api/agents/${encodeURIComponent(name)}/${act}`, {
        method: 'POST',
        headers: authHeaders(),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (!res.ok) {
        let msg = `Action "${act}" failed (HTTP ${res.status})`;
        try {
          const body = await res.json();
          if (body && body.error) msg = body.error;
        } catch (_) {}
        showToast(msg, 'error');
      } else {
        showToast(`${ACTION_LABELS[act] || act}: ${name}`, 'success');
      }
    } catch (err) {
      console.error(`Action ${act} failed:`, err);
      showToast(`Action "${act}" failed — network error`, 'error');
    }
  }

  // Event delegation on agent list — handles both card selection and action buttons.
  function handleAgentListEvent(e) {
    const btn = e.target.closest('button[data-action]');
    if (btn) {
      e.stopPropagation();
      if (btn.classList.contains('loading')) return;
      const card = btn.closest('[data-agent]');
      if (card) {
        btn.classList.add('loading');
        agentAction(card.dataset.agent, btn.dataset.action)
          .finally(() => btn.classList.remove('loading'));
      }
      return;
    }
    const card = e.target.closest('[data-agent]');
    if (card) selectAgent(card.dataset.agent);
  }
  document.getElementById('agentList').addEventListener('click', handleAgentListEvent);
  document.getElementById('agentList').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      handleAgentListEvent(e);
    }
  });

  // ── Clear Chat ──
  async function clearChat(agentName) {
    if (!agentName) return;
    try {
      const res = await fetch(`/api/dashboard/messages/${encodeURIComponent(agentName)}`, {
        method: 'DELETE',
        headers: authHeaders(),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (res.ok) {
        state.threads[agentName] = [];
        renderThread();
      }
    } catch (err) {
      console.error('Clear chat failed:', err);
    }
  }

  // ── Send Message ──
  function showSendError(input, sendBtn) {
    input.style.borderColor = 'var(--red)';
    const errEl = document.createElement('span');
    errEl.id = 'sendError';
    errEl.style.cssText = 'color:var(--red);font-size:11px;align-self:center;white-space:nowrap';
    errEl.textContent = 'Send failed';
    input.parentNode.insertBefore(errEl, sendBtn);
    setTimeout(() => { errEl.remove(); input.style.borderColor = ''; }, 3000);
  }

  async function sendMessage() {
    if (!state.selected) return;
    const input = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const text = input.value.trim();
    if (!text) return;

    // Clear any previous error state
    input.style.borderColor = '';
    const existingErr = document.getElementById('sendError');
    if (existingErr) existingErr.remove();

    sendBtn.disabled = true;
    try {
      const res = await fetch('/api/dashboard/send', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ agent: state.selected, message: text }),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (!res.ok) {
        let body = null;
        try { body = await res.json(); } catch (_) {}
        if (body && body.msg) {
          input.value = '';
          input.style.height = 'auto';
          // Delivery status shown inline on the message bubble via queue_update
        } else {
          console.error('Send failed: HTTP', res.status);
          showSendError(input, sendBtn);
        }
      } else {
        input.value = '';
        input.style.height = 'auto';
      }
    } catch (err) {
      console.error('Send failed:', err);
      showSendError(input, sendBtn);
    } finally {
      updateSendability();
    }
  }

  document.getElementById('sendBtn').onclick = sendMessage;
  const msgTextarea = document.getElementById('msgInput');
  msgTextarea.onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  };
  msgTextarea.oninput = () => {
    msgTextarea.style.height = 'auto';
    msgTextarea.style.height = Math.min(msgTextarea.scrollHeight, 120) + 'px';
    msgTextarea.style.overflowY = msgTextarea.scrollHeight > 120 ? 'auto' : 'hidden';
  };

  // ── File Upload ──

  async function uploadFile(file) {
    const url = `/api/dashboard/upload?agent=${encodeURIComponent(state.selected)}&filename=${encodeURIComponent(file.name)}`;
    const headers = { 'content-type': 'application/octet-stream' };
    const t = getToken();
    if (t) headers['authorization'] = `Bearer ${t}`;

    const res = await fetch(url, { method: 'POST', headers, body: file });
    if (res.status === 401) { handleAuthError(); throw new Error('auth'); }
    const body = await res.json();
    return { file: file.name, ok: res.ok, ...body };
  }

  document.getElementById('uploadBtn').onclick = () => {
    document.getElementById('fileInput').click();
  };

  const LARGE_FILE_THRESHOLD = 100 * 1024 * 1024; // 100 MB

  function formatFileSize(bytes) {
    if (bytes < 1024) return bytes + 'B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
    if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
    return (bytes / (1024 * 1024 * 1024)).toFixed(1) + 'GB';
  }

  document.getElementById('fileInput').onchange = async (e) => {
    const files = Array.from(e.target.files);
    if (!files.length || !state.selected) return;

    // Warn about large files
    const largeFiles = files.filter(f => f.size >= LARGE_FILE_THRESHOLD);
    if (largeFiles.length > 0) {
      const totalSize = files.reduce((sum, f) => sum + f.size, 0);
      const confirmed = await confirmAction(
        `${largeFiles.length} file${largeFiles.length > 1 ? 's are' : ' is'} large (total ${formatFileSize(totalSize)}). Upload may take a while. Continue?`
      );
      if (!confirmed) { e.target.value = ''; return; }
    }

    const uploadBtn = document.getElementById('uploadBtn');
    uploadBtn.classList.add('uploading');

    try {
      const results = await Promise.allSettled(files.map(uploadFile));
      const succeeded = results.filter(r => r.status === 'fulfilled' && r.value.ok).length;
      const failed = results.length - succeeded;

      if (failed === 0) {
        showToast(`Uploaded ${succeeded} file${succeeded > 1 ? 's' : ''}`, 'success');
      } else {
        showToast(`${succeeded} uploaded, ${failed} failed`, failed === results.length ? 'error' : 'warning');
      }
    } catch (err) {
      if (err.message !== 'auth') showToast('Upload failed', 'error');
    } finally {
      uploadBtn.classList.remove('uploading');
      e.target.value = '';
    }
  };

  // Paste image/file from clipboard
  document.getElementById('msgInput').addEventListener('paste', (e) => {
    const items = e.clipboardData?.items;
    if (!items || !state.selected) return;

    const files = [];
    for (let i = 0; i < items.length; i++) {
      const item = items[i];
      if (item.kind === 'file') {
        const file = item.getAsFile();
        if (file) files.push(file);
      }
    }

    if (files.length === 0) return; // plain text paste, let default handle it
    e.preventDefault();

    const dt = new DataTransfer();
    for (const f of files) dt.items.add(f);
    const fileInput = document.getElementById('fileInput');
    fileInput.files = dt.files;
    fileInput.dispatchEvent(new Event('change'));
  });

  // Drag-and-drop on thread messages
  const threadMsgs = document.getElementById('threadMessages');
  threadMsgs.addEventListener('dragover', (e) => {
    e.preventDefault();
    threadMsgs.classList.add('drag-over');
  });
  threadMsgs.addEventListener('dragleave', () => {
    threadMsgs.classList.remove('drag-over');
  });
  threadMsgs.addEventListener('drop', (e) => {
    e.preventDefault();
    threadMsgs.classList.remove('drag-over');
    const droppedFiles = e.dataTransfer?.files;
    if (droppedFiles && droppedFiles.length > 0 && state.selected) {
      // Use DataTransfer to build a synthetic FileList (Firefox doesn't allow
      // assigning to input.files from a drop event's FileList directly)
      const dt = new DataTransfer();
      for (let i = 0; i < droppedFiles.length; i++) dt.items.add(droppedFiles[i]);
      const fileInput = document.getElementById('fileInput');
      fileInput.files = dt.files;
      fileInput.dispatchEvent(new Event('change'));
    }
  });

  // ── Helpers ──
  function esc(s) {
    if (!s) return '';
    const div = document.createElement('div');
    div.textContent = s;
    return div.innerHTML;
  }

  /**
   * Minimal zero-dependency markdown renderer.
   * Input must already be HTML-escaped via esc().
   * Supports: headings, bold, italic, code blocks, inline code, lists, links, paragraphs.
   */
  function renderMarkdown(escaped) {
    if (!escaped) return '';
    // Preserve code blocks first — extract and replace with placeholders
    const codeBlocks = [];
    let text = escaped.replace(/```(?:\w*)\n([\s\S]*?)```/g, (_m, code) => {
      codeBlocks.push(code.replace(/\n$/, ''));
      return '\x00CB' + (codeBlocks.length - 1) + '\x00';
    });
    // Inline code
    text = text.replace(/`([^`\n]+)`/g, '<code>$1</code>');
    // Headings (must be at start of line)
    text = text.replace(/^(#{1,6})\s+(.+)$/gm, (_m, hashes, content) => {
      const level = hashes.length;
      return `<h${level} style="margin:8px 0 4px;font-size:${18 - level * 1.5}px">${content}</h${level}>`;
    });
    // Bold
    text = text.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    // Italic (single asterisk, not inside words)
    text = text.replace(/(?<!\w)\*(.+?)\*(?!\w)/g, '<em>$1</em>');
    // Links
    text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" style="color:var(--accent)">$1</a>');
    // Lists and paragraphs: line-based parser for proper nesting
    {
      const lines = text.split('\n');
      const out = [];
      const listStack = []; // stack of { tag: 'ul'|'ol', indent: number }
      let inPara = false;

      function closeListsTo(indent) {
        while (listStack.length > 0 && listStack[listStack.length - 1].indent >= indent) {
          out.push('</' + listStack.pop().tag + '>');
        }
      }
      function closeAllLists() { closeListsTo(-1); }
      function closePara() { if (inPara) { out.push('</p>'); inPara = false; } }

      for (const line of lines) {
        const hrMatch = line.match(/^---+$/);
        if (hrMatch) {
          closePara(); closeAllLists();
          out.push('<hr style="border:none;border-top:1px solid var(--border);margin:8px 0">');
          continue;
        }

        const ulMatch = line.match(/^(\s*)([-*])\s+(.+)$/);
        const olMatch = !ulMatch && line.match(/^(\s*)\d+\.\s+(.+)$/);

        if (ulMatch || olMatch) {
          closePara();
          const indent = (ulMatch || olMatch)[1].length;
          const tag = ulMatch ? 'ul' : 'ol';
          const content = ulMatch ? ulMatch[3] : olMatch[2];

          if (listStack.length === 0 || indent > listStack[listStack.length - 1].indent) {
            out.push('<' + tag + '>');
            listStack.push({ tag, indent });
          } else if (indent < listStack[listStack.length - 1].indent) {
            closeListsTo(indent);
            if (listStack.length === 0 || listStack[listStack.length - 1].indent < indent) {
              out.push('<' + tag + '>');
              listStack.push({ tag, indent });
            }
          }
          out.push('<li>' + content + '</li>');
          continue;
        }

        // Non-list line
        closeAllLists();

        if (line.trim() === '') {
          closePara();
        } else if (line.startsWith('<h') || line.startsWith('<hr')) {
          closePara();
          out.push(line);
        } else {
          if (!inPara) { out.push('<p style="margin:4px 0">'); inPara = true; }
          else { out.push('<br>'); }
          out.push(line);
        }
      }
      closePara();
      closeAllLists();
      text = out.join('\n');
    }
    // Restore code blocks
    text = text.replace(/\x00CB(\d+)\x00/g, (_m, idx) => {
      return `<pre style="background:var(--bg);padding:8px;border-radius:4px;overflow-x:auto;margin:4px 0;font-size:12px"><code>${codeBlocks[parseInt(idx)]}</code></pre>`;
    });
    return text;
  }

  function timeAgo(isoStr) {
    if (!isoStr) return '';
    const diff = Math.max(0, Date.now() - new Date(isoStr).getTime());
    const secs = Math.floor(diff / 1000);
    if (secs < 60) return `${secs}s ago`;
    const mins = Math.floor(secs / 60);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    const days = Math.floor(hrs / 24);
    return `${days}d ago`;
  }

  // ── Create Agent ──
  document.addEventListener('create-agent', async (e) => {
    const shouldSpawn = e.detail?.spawn ?? false;
    const name = document.getElementById('createName')?.value.trim();
    const engine = document.getElementById('createEngine')?.value;
    const cwd = document.getElementById('createCwd')?.value.trim();
    const task = document.getElementById('createTask')?.value.trim();
    if (!name) { showToast('Agent name is required', 'error'); return; }
    if (!cwd) { showToast('Working directory is required', 'error'); return; }

    try {
      // Step 1: Create the agent
      const createRes = await fetch('/api/agents', {
        method: 'POST',
        headers: authHeaders(),
        body: JSON.stringify({ name, engine, cwd }),
      });
      if (createRes.status === 401) { handleAuthError(); return; }
      const createBody = await createRes.json();
      if (!createRes.ok) {
        showToast(createBody.error || 'Create failed', 'error');
        return;
      }

      document.getElementById('createName').value = '';
      document.getElementById('createTask').value = '';
      createFormOpen = false;

      if (shouldSpawn) {
        // Step 2: Spawn with optional task
        const spawnBody = {};
        if (task) spawnBody.task = task;
        const spawnRes = await fetch(`/api/agents/${encodeURIComponent(name)}/spawn`, {
          method: 'POST',
          headers: authHeaders(),
          body: JSON.stringify(spawnBody),
        });
        if (spawnRes.ok) {
          showToast(`Agent "${name}" created and spawning`, 'success');
        } else {
          showToast(`Agent created but spawn failed`, 'warning');
        }
      } else {
        showToast(`Agent "${name}" created`, 'success');
      }
      selectAgent(name);
    } catch (err) {
      showToast('Create failed — network error', 'error');
    }
  });

  // ── Search Filter ──
  document.getElementById('agentSearch').addEventListener('input', (e) => {
    state.searchFilter = e.target.value;
    renderAgents();
  });

  // ── Engine Usage Fetch ──
  async function fetchEngineUsage() {
    try {
      const resp = await fetch('/api/engines/status', {
        headers: getToken() ? { 'Authorization': `Bearer ${getToken()}` } : {},
      });
      if (!resp.ok) return;
      const data = await resp.json();
      if (data.usage) {
        state.engineUsage = data.usage;
        renderAgents();
      }
    } catch { /* ignore */ }
  }

  // ── Init ──
  // Always try connecting first. If the server requires auth and we don't have
  // a token, the WebSocket will close with 401 and we'll show the auth modal.
  connect();
  // Refresh relative timestamps every 30s
  setInterval(() => { if (state.agents.length > 0) renderAgents(); }, 30000);
  // Fetch engine usage every 2 minutes (poller runs server-side every 10min)
  fetchEngineUsage();
  setInterval(fetchEngineUsage, 120_000);
})();
</script>
</body>
</html>

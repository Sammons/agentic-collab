<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Agentic Collab</title>
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --border: #30363d;
    --text: #e6edf3;
    --text-dim: #8b949e;
    --accent: #58a6ff;
    --green: #3fb950;
    --yellow: #d29922;
    --red: #f85149;
    --orange: #d18616;
    --purple: #bc8cff;
    --radius: 8px;
    --shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* ── Header ── */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
  }
  header h1 { font-size: 16px; font-weight: 600; }
  .conn-status {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    color: var(--text-dim);
  }
  .conn-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--red);
  }
  .conn-dot.connected { background: var(--green); }

  /* ── Layout ── */
  .layout {
    display: grid;
    grid-template-columns: 340px 1fr;
    height: calc(100vh - 49px);
    height: calc(100dvh - 49px);
  }

  /* ── Agent Grid ── */
  .agent-list {
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .agent-card:hover { border-color: var(--accent); }
  .agent-card.selected { border-color: var(--accent); background: #1c2333; }
  .agent-card.flash { animation: flash-card 0.6s ease; }
  .agent-group-header {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    padding: 8px 4px 2px;
    margin-top: 4px;
    cursor: grab;
    border-radius: 4px;
    transition: background 0.15s;
  }
  .agent-group-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .group-chevron {
    font-size: 10px;
    margin-right: 4px;
    transition: transform 0.15s;
    display: inline-block;
  }
  .agent-group-header.collapsed .group-chevron { transform: rotate(-90deg); }
  .group-actions {
    display: flex;
    gap: 2px;
  }
  .group-actions button {
    background: none;
    border: none;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 11px;
    padding: 1px 4px;
    border-radius: 3px;
  }
  .group-actions button:hover { color: var(--accent); background: rgba(88,166,255,0.1); }
  .group-actions .group-delete:hover { color: var(--red); background: rgba(248,81,73,0.1); }
  .agent-group-header.dragging { opacity: 0.4; }
  .agent-group-header.drag-over {
    background: color-mix(in srgb, var(--accent) 15%, transparent);
    box-shadow: 0 0 0 1px var(--accent);
  }
  .agent-group-header.drag-over-above { box-shadow: 0 -2px 0 var(--accent); }
  .agent-group-header.drag-over-below { box-shadow: 0 2px 0 var(--accent); }
  .agent-card[draggable="true"] { cursor: grab; }
  .agent-card.dragging { opacity: 0.4; }
  .agent-card.drag-over-above { box-shadow: 0 -2px 0 var(--accent); }
  .agent-card.drag-over-below { box-shadow: 0 2px 0 var(--accent); }
  .drag-handle { display: none; }

  @keyframes flash-card {
    0%,100% { background: var(--surface); }
    50% { background: #1a2a1a; }
  }

  .agent-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .agent-name { font-weight: 600; font-size: 14px; }
  .state-badge {
    margin-left: auto;
    font-size: 11px;
    padding: 2px 8px;
    border-radius: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .state-active   { background: rgba(63,185,80,0.15); color: var(--green); }
  .state-idle     { background: rgba(139,148,158,0.15); color: var(--text-dim); }
  .state-spawning { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-suspended { background: rgba(210,153,34,0.15); color: var(--yellow); }
  .state-failed   { background: rgba(248,81,73,0.15); color: var(--red); }
  .state-suspending { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-resuming  { background: rgba(88,166,255,0.15); color: var(--accent); }
  .state-void     { background: rgba(139,148,158,0.1); color: var(--text-dim); }

  .agent-meta {
    display: flex;
    gap: 12px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 8px;
  }
  .agent-meta span { display: flex; align-items: center; gap: 4px; }

  .agent-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .agent-actions button {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
  }
  .agent-actions button:hover { border-color: var(--accent); color: var(--accent); }
  .agent-actions button.danger:hover { border-color: var(--red); color: var(--red); }

  /* ── Thread Panel ── */
  .thread-panel {
    display: flex;
    flex-direction: column;
    height: 100%;
    min-height: 0;
    overflow: hidden;
  }
  .thread-messages {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .thread-empty {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text-dim);
    font-size: 14px;
  }

  .msg {
    max-width: 70%;
    padding: 8px 12px;
    border-radius: var(--radius);
    font-size: 13px;
    line-height: 1.5;
    word-break: break-word;
  }
  .msg-body { white-space: normal; }
  .msg-body p { margin: 4px 0; }
  .msg-body code { background: rgba(255,255,255,0.1); padding: 1px 4px; border-radius: 3px; font-size: 12px; }
  .msg-body pre { white-space: pre-wrap; }
  .msg-body ul, .msg-body ol { margin: 4px 0; padding-left: 20px; }
  .msg-body h1, .msg-body h2, .msg-body h3, .msg-body h4, .msg-body h5, .msg-body h6 { margin: 8px 0 4px; }
  .msg.to-agent {
    align-self: flex-end;
    background: #1a3a5c;
    border: 1px solid rgba(88,166,255,0.3);
  }
  .msg.from-agent {
    align-self: flex-start;
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .msg-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
    font-size: 11px;
    color: var(--text-dim);
  }
  .msg-sender { font-weight: 600; }
  .msg-time { font-size: 10px; }
  .msg-meta { margin-left: auto; display: flex; align-items: center; gap: 6px; }
  .msg-status { font-size: 10px; }
  .msg-status.pending { color: var(--text-dim); }
  .msg-status.delivered { color: var(--green); }
  .msg-status.failed { color: var(--red); }
  .msg.withdrawn { opacity: 0.5; }
  .msg.withdrawn .msg-body { text-decoration: line-through; }
  .msg-withdraw {
    font-size: 10px;
    color: var(--text-dim);
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .msg:hover .msg-withdraw { opacity: 1; }
  .msg-withdraw:hover { color: var(--red); }

  /* ── Input ── */
  .thread-input {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    background: var(--surface);
  }
  .thread-input textarea {
    flex: 0 0 100%;
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    resize: none;
    overflow-y: hidden;
    min-height: 36px;
    max-height: 120px;
    line-height: 1.4;
  }
  .thread-input textarea:focus { border-color: var(--accent); }
  .thread-input .upload-wrap { order: 1; }
  .thread-input #sendBtn {
    order: 3;
    margin-left: auto;
  }
  .thread-input button {
    padding: 8px 16px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
  }
  .thread-input button:hover { opacity: 0.9; }
  .thread-input button:disabled { opacity: 0.5; cursor: not-allowed; }
  .thread-input textarea:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ── Upload Button ── */
  .upload-wrap {
    position: relative;
    display: inline-flex;
  }
  .upload-wrap input[type="file"] {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    opacity: 0;
    cursor: pointer;
    z-index: 1;
  }
  .upload-wrap input[type="file"]:disabled { cursor: not-allowed; }
  .upload-btn {
    padding: 8px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
    position: relative;
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .upload-btn:hover { border-color: var(--accent); color: var(--accent); }
  .upload-btn.disabled { opacity: 0.5; cursor: not-allowed; }
  .upload-wrap.uploading { pointer-events: none; }
  .upload-wrap.uploading .upload-btn {
    color: transparent;
  }
  .upload-wrap.uploading .upload-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    margin: auto;
    width: 14px; height: 14px;
    border: 2px solid var(--text-dim);
    border-top-color: transparent;
    border-radius: 50%;
    animation: btn-spin 0.6s linear infinite;
  }

  .msg.file-upload .file-info {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
  }
  .msg.file-upload .file-icon { font-size: 16px; }

  /* ── Voice Dictation ── */
  .voice-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    order: 2;
  }
  .voice-toggle {
    display: flex;
    align-items: center;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    overflow: hidden;
  }
  .voice-toggle button {
    padding: 8px 10px;
    border: none;
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    font-size: 13px;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .voice-toggle button.active {
    background: var(--green);
    color: #fff;
  }
  .voice-toggle button:not(.active):hover {
    background: rgba(88,166,255,0.1);
  }
  .voice-btn {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    font-size: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    padding: 0;
    touch-action: none;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
  }
  .voice-btn:hover { border-color: var(--accent); color: var(--accent); }
  .voice-btn.recording {
    border-color: #e74c3c;
    background: #e74c3c;
    color: #fff;
    animation: voice-pulse 1.5s ease-in-out infinite;
  }
  .voice-btn.disabled { opacity: 0.4; cursor: not-allowed; }
  .voice-btn.inactive { opacity: 0.3; cursor: default; }
  @keyframes voice-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(231, 76, 60, 0.4); }
    50% { box-shadow: 0 0 0 6px rgba(231, 76, 60, 0); }
  }
  .voice-partial {
    font-size: 11px;
    color: var(--text-dim);
    font-style: italic;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .thread-messages.drag-over {
    outline: 2px dashed var(--accent);
    outline-offset: -4px;
    background: rgba(88,166,255,0.05);
  }

  /* ── Confirm Dialog ── */
  .confirm-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10000;
  }
  .confirm-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    max-width: 360px;
    box-shadow: var(--shadow);
  }
  .confirm-box p { margin-bottom: 16px; font-size: 14px; line-height: 1.5; }
  .confirm-box .actions { display: flex; gap: 8px; justify-content: flex-end; }
  .confirm-box button {
    padding: 6px 16px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-size: 13px;
    cursor: pointer;
  }
  .confirm-box button.danger-btn {
    background: var(--red);
    border-color: var(--red);
    color: #fff;
  }
  .confirm-box button:hover { opacity: 0.9; }

  /* ── Unread Badge ── */
  .unread-badge {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    padding: 0 5px;
    margin-left: 6px;
  }

  /* ── Create Form ── */
  .create-form {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .create-form-toggle {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .create-form-toggle:hover { color: var(--accent); }
  .create-form-toggle .chevron { transition: transform 0.15s; }
  .create-form.open .chevron { transform: rotate(90deg); }
  .create-form-body {
    display: none;
    padding: 0 14px 14px;
    flex-direction: column;
    gap: 8px;
  }
  .create-form.open .create-form-body { display: flex; }
  .create-form input, .create-form select, .create-form textarea {
    padding: 8px 10px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    resize: vertical;
  }
  .create-form input:focus, .create-form select:focus, .create-form textarea:focus { border-color: var(--accent); }
  .create-form-actions { display: flex; gap: 6px; }
  .create-form-actions button {
    padding: 7px 14px;
    border-radius: 6px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
  }
  .create-form-actions button:hover { opacity: 0.9; }
  .create-form-actions button:disabled { opacity: 0.4; cursor: not-allowed; }
  .create-form-actions button.secondary {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .create-form-actions button.secondary:hover { border-color: var(--accent); color: var(--accent); }

  /* ── System message ── */
  .msg.system-msg {
    align-self: center;
    max-width: 90%;
    background: rgba(139,148,158,0.08);
    border: 1px dashed var(--border);
    color: var(--text-dim);
    font-size: 12px;
    font-style: italic;
  }

  /* ── Button loading state ── */
  .agent-actions button.loading {
    opacity: 0.5;
    pointer-events: none;
    position: relative;
  }
  .agent-actions button.loading::after {
    content: '';
    width: 10px; height: 10px;
    border: 2px solid var(--text-dim);
    border-top-color: transparent;
    border-radius: 50%;
    animation: btn-spin 0.6s linear infinite;
    display: inline-block;
    margin-left: 4px;
    vertical-align: middle;
  }
  @keyframes btn-spin {
    to { transform: rotate(360deg); }
  }


  /* ── Agent failure reason ── */
  .agent-failure {
    font-size: 11px;
    color: var(--red);
    margin-top: 4px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ── Thread header enriched ── */
  .thread-header {
    padding: 12px 20px;
    border-bottom: 1px solid var(--border);
    font-weight: 600;
    position: relative;
    font-size: 14px;
    background: var(--surface);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Thread tabs ── */
  .thread-tabs {
    display: flex;
    gap: 2px;
    margin-left: auto;
    background: var(--bg);
    border-radius: var(--radius);
    padding: 2px;
  }
  .thread-tabs button {
    padding: 4px 12px;
    border: none;
    border-radius: calc(var(--radius) - 2px);
    background: transparent;
    color: var(--muted);
    font-size: 12px;
    font-weight: 500;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .thread-tabs button:hover { color: var(--fg); }
  .thread-tabs button.active {
    background: var(--surface);
    color: var(--fg);
  }
  .clear-chat-btn {
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: transparent;
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    margin-left: 4px;
  }
  .clear-chat-btn:hover { border-color: var(--red); color: var(--red); }

  /* ── Persona panel ── */
  .persona-panel {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    font-size: 13px;
    line-height: 1.7;
    color: var(--fg);
  }
  .persona-panel .persona-empty {
    color: var(--muted);
    font-style: italic;
    text-align: center;
    padding: 40px 20px;
  }
  .persona-panel pre {
    white-space: pre-wrap;
    word-wrap: break-word;
    font-family: inherit;
    margin: 0;
  }

  .watch-panel {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
    background: #0d1117;
  }
  .watch-output {
    flex: 1;
    overflow-y: auto;
    padding: 12px;
    font-family: 'SF Mono', 'Menlo', 'Monaco', 'Consolas', monospace;
    font-size: 12px;
    line-height: 1.4;
    color: #c9d1d9;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .watch-output .watch-status {
    color: var(--text-dim);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
    font-size: 11px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .watch-keys {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    padding: 8px 12px;
    border-top: 1px solid var(--border);
    background: var(--surface);
    justify-content: center;
    align-items: center;
  }
  .watch-keys button {
    min-width: 36px;
    height: 32px;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.1s;
    font-family: inherit;
  }
  .watch-keys button:hover { border-color: var(--accent); color: var(--accent); }
  .watch-keys button:active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .watch-type {
    display: flex;
    gap: 6px;
    padding: 6px 12px 8px;
    border-top: 1px solid var(--border);
    align-items: center;
  }
  .watch-type-input {
    flex: 1;
    height: 32px;
    padding: 4px 8px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    font-family: monospace;
    outline: none;
    box-sizing: border-box;
  }
  .watch-type-input:focus { border-color: var(--accent); }
  .watch-type button {
    height: 32px;
    padding: 4px 10px;
    border-radius: 4px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  .watch-type button:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Toast ── */
  .toast {
    position: fixed;
    top: 16px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 9999;
    padding: 10px 18px;
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 500;
    color: #fff;
    box-shadow: var(--shadow);
    pointer-events: none;
    animation: toast-in 0.2s ease;
  }
  .toast.error   { background: var(--red); }
  .toast.warning { background: var(--orange); }
  .toast.success { background: var(--green); }

  @keyframes toast-in {
    from { opacity: 0; transform: translateX(-50%) translateY(-8px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── Auth Modal ── */
  .auth-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10001;
  }
  .auth-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px 28px;
    max-width: 380px;
    width: 90%;
    box-shadow: var(--shadow);
  }
  .auth-box h2 { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .auth-box p { font-size: 13px; color: var(--text-dim); margin-bottom: 16px; line-height: 1.5; }
  .auth-box input {
    width: 100%;
    padding: 10px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    outline: none;
    margin-bottom: 12px;
  }
  .auth-box input:focus { border-color: var(--accent); }
  .auth-box .auth-actions { display: flex; gap: 8px; justify-content: flex-end; }
  .auth-box button {
    padding: 8px 20px;
    border-radius: 6px;
    border: none;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
  }
  .auth-box button.primary { background: var(--accent); color: #fff; }
  .auth-box button.secondary { background: transparent; border: 1px solid var(--border); color: var(--text-dim); }
  .auth-box button:hover { opacity: 0.9; }

  /* ── Search Input ── */
  .agent-search {
    padding: 0 0 8px;
    position: sticky;
    top: 0;
    z-index: 1;
    background: transparent;
  }
  .agent-search input {
    width: 100%;
    padding: 8px 10px 8px 30px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--bg);
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .agent-search input:focus { border-color: var(--accent); }
  .agent-search .search-icon {
    position: absolute;
    left: 9px;
    top: 9px;
    font-size: 13px;
    color: var(--text-dim);
    pointer-events: none;
  }

  /* ── Persona frontmatter table ── */
  .persona-meta {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 12px;
    font-size: 12px;
    margin-bottom: 16px;
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .persona-meta dt {
    color: var(--text-dim);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
    font-size: 11px;
    padding: 2px 0;
  }
  .persona-meta dd {
    color: var(--text);
    padding: 2px 0;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 12px;
  }
  .persona-body {
    white-space: normal;
    word-wrap: break-word;
    font-family: inherit;
    margin: 0;
    line-height: 1.7;
  }
  .persona-body ul, .persona-body ol { margin: 4px 0; padding-left: 20px; }
  .persona-body li { margin: 2px 0; }

  /* ── Mobile back button ── */
  .mobile-back {
    display: none;
    padding: 4px 8px;
    border: 1px solid var(--border);
    border-radius: 4px;
    background: var(--surface);
    color: var(--text-dim);
    font-size: 12px;
    cursor: pointer;
    margin-right: 4px;
  }
  .mobile-back:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    html, body { overflow-x: hidden; }
    .layout { grid-template-columns: 1fr; grid-template-rows: 1fr; }
    .agent-list {
      border-right: none;
      height: calc(100vh - 49px);
      height: calc(100dvh - 49px);
      max-height: none;
    }
    .thread-panel { height: calc(100vh - 49px); height: calc(100dvh - 49px); }
    .layout.mobile-thread .agent-list { display: none; }
    .layout.mobile-thread .thread-panel { display: flex; }
    .layout:not(.mobile-thread) .thread-panel { display: none; }
    .layout:not(.mobile-thread) .agent-list { display: flex; }
    .mobile-back { display: block; }
    .msg { max-width: 85%; }
    .thread-input {
      padding: 8px 10px;
      gap: 6px;
    }
    .thread-input textarea {
      font-size: 16px; /* prevent iOS zoom */
    }
    .voice-toggle button {
      font-size: 16px; /* prevent iOS zoom */
    }
    .voice-controls {
      order: 3;
      flex: 0 0 auto;
    }
    .voice-partial { display: none; }
    header h1 { font-size: 14px; }
    header { padding: 10px 12px; }
    .agent-card { padding: 10px; }
    .agent-card[draggable] { cursor: pointer; }
    .drag-handle {
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      right: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 22px;
      color: var(--text-dim);
      cursor: grab;
      padding: 8px 4px;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    .drag-handle:active { color: var(--accent); }
    .agent-card { position: relative; padding-right: 40px; }
    .agent-header { flex-wrap: wrap; gap: 4px; }
    .agent-name {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: calc(100vw - 140px);
    }
    .agent-meta {
      flex-wrap: wrap;
      gap: 6px 10px;
    }
    .agent-meta span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: calc(100vw - 60px);
    }
    .agent-actions { gap: 4px; }
    .agent-actions button { padding: 4px 8px; font-size: 11px; }
    .agent-list { padding: 8px; overflow-x: hidden; }
    .create-form-body input,
    .create-form-body select,
    .create-form-body textarea { font-size: 16px; } /* prevent iOS zoom */
    .thread-header {
      flex-wrap: wrap;
      padding: 10px 12px;
      gap: 6px;
    }
    .thread-header > span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 50vw;
    }
    .thread-tabs {
      order: 10;
      width: 100%;
      margin-left: 0;
      justify-content: stretch;
    }
    .thread-tabs button {
      flex: 1;
      text-align: center;
    }
    .clear-chat-btn { margin-left: auto; }
    .thread-messages { padding: 12px 10px; }
    .persona-panel { padding: 14px 10px; }
    .watch-panel { padding: 10px 8px; font-size: 11px; }
  }
</style>
</head>
<body>
<header>
  <h1>Agentic Collab</h1>
  <div class="conn-status">
    <div class="conn-dot" id="connDot"></div>
    <span id="connLabel">Disconnected</span>
  </div>
</header>
<div class="layout">
  <div class="agent-list" id="agentList">
    <div class="agent-search" style="position:relative">
      <span class="search-icon">&#128269;</span>
      <input type="text" id="agentSearch" placeholder="Filter agents..." autocomplete="off" />
    </div>
  </div>
  <div class="thread-panel" id="threadPanel">
    <div class="thread-header" id="threadHeader">Select an agent</div>
    <div class="thread-messages" id="threadMessages">
      <div class="thread-empty">Select an agent to view messages</div>
    </div>
    <div class="persona-panel" id="personaPanel" style="display:none"></div>
    <div class="watch-panel" id="watchPanel" style="display:none"></div>
    <div class="thread-input" id="threadInput" style="display:none">
      <textarea id="msgInput" placeholder="Type a message..." rows="1" autocomplete="off" autocorrect="on" autocapitalize="sentences" spellcheck="false" name="msg-no-autofill"></textarea>
      <div class="upload-wrap" id="uploadWrap">
        <input type="file" id="fileInput" multiple disabled />
        <span class="upload-btn" id="uploadBtn">+</span>
      </div>
      <div class="voice-controls" id="voiceControls" style="display:none">
        <div class="voice-toggle" id="voiceToggle">
          <button data-mode="off" class="active">Off</button>
          <button data-mode="ptt">PTT</button>
        </div>
        <button class="voice-btn inactive" id="voiceBtn" title="Hold to talk (or hold Spacebar)">&#127908;</button>
        <span class="voice-partial" id="voicePartial"></span>
      </div>
      <button id="sendBtn" disabled>Send</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ── Auth ──
  // Token stored in sessionStorage — cleared when tab closes
  function getToken() {
    return sessionStorage.getItem('orchestrator_token') || '';
  }

  function setToken(token) {
    if (token) sessionStorage.setItem('orchestrator_token', token);
    else sessionStorage.removeItem('orchestrator_token');
  }

  function authHeaders() {
    const token = getToken();
    const headers = { 'content-type': 'application/json' };
    if (token) headers['authorization'] = `Bearer ${token}`;
    return headers;
  }

  function handleAuthError() {
    setToken('');
    promptForToken('Authentication failed. Please re-enter your token.');
  }

  function promptForToken(message) {
    // Remove existing overlay if present
    const existing = document.querySelector('.auth-overlay');
    if (existing) existing.remove();

    const overlay = document.createElement('div');
    overlay.className = 'auth-overlay';
    overlay.innerHTML = `
      <div class="auth-box">
        <h2>Agentic Collab</h2>
        <p>${esc(message || 'Enter your orchestrator token to connect, or skip for dev mode (no auth).')}</p>
        <input type="password" id="authTokenInput" placeholder="Orchestrator token" autocomplete="off" />
        <div class="auth-actions">
          <button class="secondary" id="authSkipBtn">Dev Mode</button>
          <button class="primary" id="authConnectBtn">Connect</button>
        </div>
      </div>
    `;

    function submit(token) {
      setToken(token);
      overlay.remove();
      // Reconnect with new token
      if (ws) { ws.onclose = null; ws.close(); }
      connect();
    }

    overlay.querySelector('#authConnectBtn').onclick = () => {
      const val = document.getElementById('authTokenInput').value.trim();
      if (!val) { document.getElementById('authTokenInput').style.borderColor = 'var(--red)'; return; }
      submit(val);
    };
    overlay.querySelector('#authSkipBtn').onclick = () => submit('');
    overlay.querySelector('#authTokenInput').onkeydown = (e) => {
      if (e.key === 'Enter') overlay.querySelector('#authConnectBtn').click();
    };

    document.body.appendChild(overlay);
    setTimeout(() => document.getElementById('authTokenInput')?.focus(), 50);
  }

  // ── State ──
  const state = {
    agents: [],
    threads: {},
    selected: null,
    connected: false,
    unread: {},  // { agentName: count }
    threadView: 'messages',  // 'messages' | 'persona' | 'watch'
    watchTimer: null,
    personaCache: {},  // { agentName: { content, fetched } }
    searchFilter: '',
    engineUsage: {},  // { engine: EngineUsage }
    proxies: [],      // registered proxy list from init
    emptyGroups: [],  // groups created via + New Group (no agents yet)
    drafts: {},       // { agentName: draftText }
    editingPersona: false,
  };

  let ws = null;
  let reconnectTimer = null;
  let reconnectDelay = 1000;

  // ── WebSocket ──
  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const token = getToken();
    const tokenParam = token ? `?token=${encodeURIComponent(token)}` : '';
    let opened = false;
    ws = new WebSocket(`${proto}://${location.host}/ws${tokenParam}`);

    ws.onopen = () => {
      opened = true;
      state.connected = true;
      reconnectDelay = 1000;
      updateConnStatus();
      if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
    };

    ws.onclose = () => {
      state.connected = false;
      updateConnStatus();
      if (!opened) {
        // Never connected — likely auth failure (401 on upgrade)
        setToken('');
        promptForToken('Connection rejected — enter your orchestrator token.');
        return;
      }
      const jitter = Math.random() * 1000;
      reconnectTimer = setTimeout(connect, reconnectDelay + jitter);
      reconnectDelay = Math.min(reconnectDelay * 2, 30000);
    };

    ws.onerror = () => ws.close();

    ws.onmessage = (evt) => {
      let data;
      try {
        data = JSON.parse(evt.data);
      } catch (err) {
        console.warn('Malformed WebSocket frame:', err);
        return;
      }
      switch (data.type) {
        case 'init':
          state.agents = data.agents;
          state.threads = data.threads;
          state.proxies = data.proxies || [];
          renderAgents();
          renderThread();
          break;
        case 'agent_update':
          updateAgent(data.agent);
          break;
        case 'message':
          addMessage(data.msg);
          break;
        case 'queue_update':
          handleQueueUpdate(data.message);
          break;
        case 'message_withdrawn':
          handleMessageWithdrawn(data.msg);
          break;
        case 'proxy_update':
          if (data.proxies) { state.proxies = data.proxies; renderAgents(); }
          break;
        case 'agent_destroyed':
          state.agents = state.agents.filter(a => a.name !== data.name);
          delete state.threads[data.name];
          delete state.unread[data.name];
          if (state.selected === data.name) {
            state.selected = null;
            renderThread();
          }
          renderAgents();
          break;
      }
    };
  }

  function updateConnStatus() {
    const dot = document.getElementById('connDot');
    const label = document.getElementById('connLabel');
    dot.classList.toggle('connected', state.connected);
    label.textContent = state.connected ? 'Connected' : 'Disconnected';
  }

  // ── State Updates ──
  function updateAgent(agent) {
    const idx = state.agents.findIndex(a => a.name === agent.name);
    if (idx >= 0) state.agents[idx] = agent;
    else state.agents.push(agent);
    renderAgents();
    if (agent.name === state.selected) {
      updateSendability();
      // Update state badge without wiping tabs/buttons from the header
      const header = document.getElementById('threadHeader');
      const badge = header.querySelector('.state-badge');
      if (badge) {
        badge.className = `state-badge state-${agent.state}`;
        badge.textContent = agent.state;
      }
    }
  }

  function addMessage(msg) {
    if (!state.threads[msg.agent]) state.threads[msg.agent] = [];
    state.threads[msg.agent].push(msg);
    if (state.selected === msg.agent) {
      renderThread();
    } else {
      // Track unread for non-selected agents
      state.unread[msg.agent] = (state.unread[msg.agent] || 0) + 1;
    }

    // Flash the agent card
    const card = document.querySelector(`[data-agent="${msg.agent}"]`);
    if (card && state.selected !== msg.agent) {
      card.classList.add('flash');
      setTimeout(() => card.classList.remove('flash'), 600);
    }
    renderAgents();
  }

  function handleMessageWithdrawn(msg) {
    const thread = state.threads[msg.agent];
    if (!thread) return;
    const idx = thread.findIndex(m => m.id === msg.id);
    if (idx >= 0) {
      thread[idx] = msg;
      if (state.selected === msg.agent) renderThread();
    }
  }

  // ── Render ──
  let createFormOpen = false;

  function renderAgents() {
    const list = document.getElementById('agentList');

    // Preserve create form input values before clearing
    const prevName = document.getElementById('createName')?.value || '';
    const prevEngine = document.getElementById('createEngine')?.value || 'claude';
    const prevProxy = document.getElementById('createProxy')?.value || '';
    const prevCwd = document.getElementById('createCwd')?.value || '/tmp';
    const prevTask = document.getElementById('createTask')?.value || '';

    // Remove everything except the search box
    list.querySelectorAll(':scope > :not(.agent-search)').forEach(el => el.remove());

    // Collapsible create agent form
    const hasProxies = state.proxies && state.proxies.length > 0;
    const form = document.createElement('div');
    form.className = `create-form${createFormOpen ? ' open' : ''}`;
    form.innerHTML = `
      <div class="create-form-toggle">
        <span>+ New Agent</span>
        <span class="chevron">\u25B8</span>
      </div>
      <div class="create-form-body">
        <input type="text" id="createName" placeholder="Agent name" value="${esc(prevName)}" autocomplete="off" />
        <select id="createEngine">
          <option value="claude"${prevEngine === 'claude' ? ' selected' : ''}>claude</option>
          <option value="codex"${prevEngine === 'codex' ? ' selected' : ''}>codex</option>
          <option value="opencode"${prevEngine === 'opencode' ? ' selected' : ''}>opencode</option>
        </select>
        <select id="createProxy">
          ${(state.proxies || []).map(p => `<option value="${esc(p.proxyId)}"${prevProxy === p.proxyId ? ' selected' : ''}>${esc(p.proxyId)}</option>`).join('')}
        </select>
        <input type="text" id="createCwd" placeholder="Working directory" value="${esc(prevCwd)}" autocomplete="off" />
        <textarea id="createTask" rows="2" placeholder="Initial task (optional)" autocomplete="off">${esc(prevTask)}</textarea>
        <div class="create-form-actions">
          <button onclick="document.dispatchEvent(new CustomEvent('create-agent', {detail:{spawn:true}}))" ${hasProxies ? '' : 'disabled title="No proxy servers registered"'}>Create & Spawn</button>
          <button class="secondary" onclick="document.dispatchEvent(new CustomEvent('create-agent', {detail:{spawn:false}}))">Create Only</button>
        </div>
        ${!hasProxies ? '<div style="font-size:11px;color:var(--yellow);margin-top:2px">No proxy servers registered — spawning disabled</div>' : ''}
      </div>
    `;
    form.querySelector('.create-form-toggle').onclick = () => {
      createFormOpen = !createFormOpen;
      form.classList.toggle('open', createFormOpen);
    };
    list.appendChild(form);

    const filter = state.searchFilter.toLowerCase();
    const filtered = filter
      ? state.agents.filter(a => a.name.toLowerCase().includes(filter) || a.engine.toLowerCase().includes(filter) || a.state.toLowerCase().includes(filter) || (a.agentGroup || '').toLowerCase().includes(filter))
      : state.agents;

    // Group agents
    const groups = new Map();
    for (const agent of filtered) {
      const g = agent.agentGroup || 'General';
      if (!groups.has(g)) groups.set(g, []);
      groups.get(g).push(agent);
    }
    // Include empty groups created via "+ New Group"
    if (state.emptyGroups) {
      for (const g of state.emptyGroups) {
        if (!groups.has(g)) groups.set(g, []);
      }
    }
    // Sort: use saved order from localStorage, then General first, then alphabetical
    const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
    const sortedGroups = [...groups.keys()].sort((a, b) => {
      const ai = savedOrder.indexOf(a);
      const bi = savedOrder.indexOf(b);
      if (ai !== -1 && bi !== -1) return ai - bi;
      if (ai !== -1) return -1;
      if (bi !== -1) return 1;
      if (a === 'General') return -1;
      if (b === 'General') return 1;
      return a.localeCompare(b);
    });

    const collapsedGroups = JSON.parse(localStorage.getItem('collapsedGroups') || '[]');
    for (const groupName of sortedGroups) {
      const isCollapsed = collapsedGroups.includes(groupName);
      const showHeader = sortedGroups.length > 1 || groupName !== 'General';
      if (showHeader) {
        const groupHeader = document.createElement('div');
        groupHeader.className = `agent-group-header${isCollapsed ? ' collapsed' : ''}`;
        groupHeader.setAttribute('draggable', 'true');
        groupHeader.dataset.group = groupName;
        const label = document.createElement('span');
        label.innerHTML = `<span class="group-chevron">\u25BC</span>${esc(groupName)}`;
        label.style.cursor = 'pointer';
        label.onclick = (e) => {
          e.stopPropagation();
          const saved = JSON.parse(localStorage.getItem('collapsedGroups') || '[]');
          const idx = saved.indexOf(groupName);
          if (idx !== -1) saved.splice(idx, 1); else saved.push(groupName);
          localStorage.setItem('collapsedGroups', JSON.stringify(saved));
          renderAgents();
        };
        groupHeader.appendChild(label);
        if (groupName !== 'General') {
          const actions = document.createElement('span');
          actions.className = 'group-actions';
          actions.innerHTML = '<button class="group-rename" title="Rename group">&#9998;</button><button class="group-delete" title="Delete group">&#10005;</button>';
          actions.querySelector('.group-rename').onclick = async (e) => {
            e.stopPropagation();
            const newName = await promptInput('Rename group:', groupName);
            if (!newName || newName === groupName) return;
            renameGroup(groupName, newName);
          };
          actions.querySelector('.group-delete').onclick = (e) => {
            e.stopPropagation();
            deleteGroup(groupName);
          };
          groupHeader.appendChild(actions);
        }
        list.appendChild(groupHeader);
      }

    if (showHeader && isCollapsed) continue;
    for (const agent of groups.get(groupName)) {
      const card = document.createElement('div');
      card.className = `agent-card${state.selected === agent.name ? ' selected' : ''}`;
      card.dataset.agent = agent.name;

      const stateClass = `state-${agent.state}`;
      const modelStr = [agent.engine, agent.model, agent.thinking].filter(Boolean).join(' ');
      const ctxStr = agent.lastContextPct != null ? `${agent.lastContextPct}%` : '--';
      const unreadCount = state.unread[agent.name] || 0;
      const unreadBadge = unreadCount > 0 ? `<span class="unread-badge">${unreadCount}</span>` : '';

      const activeIdle = agent.state === 'active' || agent.state === 'idle';
      const suspendedFailed = agent.state === 'suspended' || agent.state === 'failed';
      const transitioning = agent.state === 'spawning' || agent.state === 'suspending' || agent.state === 'resuming';
      const isVoid = agent.state === 'void';
      const failureInfo = agent.state === 'failed' && agent.failureReason
        ? `<div class="agent-failure" title="${esc(agent.failureReason)}">${esc(agent.failureReason)}</div>` : '';
      card.setAttribute('tabindex', '0');
      card.setAttribute('draggable', 'true');
      card.innerHTML = `
        <div class="agent-header">
          <span class="agent-name">${esc(agent.name)}${unreadBadge}</span>
          <span class="state-badge ${stateClass}">${agent.state}</span>
        </div>
        <div class="agent-meta">
          <span>${esc(modelStr)}</span>
          <span>ctx: ${ctxStr}</span>
          ${agent.proxyId ? `<span title="proxy: ${esc(agent.proxyId)}">${esc(agent.proxyId)}</span>` : ''}
        </div>
        ${failureInfo}
        <div class="drag-handle" title="Drag to reorder or move to group">\u2261</div>
        <div class="agent-actions">
          ${activeIdle ? `
            <button data-action="interrupt">Interrupt</button>
            <button data-action="compact">Compact</button>
            <button data-action="suspend">Suspend</button>
            <button class="danger" data-action="kill">Kill</button>
          ` : ''}
          ${suspendedFailed ? `
            <button data-action="resume">Resume</button>
            <button class="danger" data-action="destroy">Destroy</button>
          ` : ''}
          ${transitioning ? `
            <button class="danger" data-action="kill">Kill</button>
          ` : ''}
          ${isVoid ? `
            <button data-action="spawn">Spawn</button>
            <button class="danger" data-action="destroy">Destroy</button>
          ` : ''}
        </div>
      `;
      list.appendChild(card);
    }
    } // end group loop

    // New Group button
    const newGroupBtn = document.createElement('button');
    newGroupBtn.className = 'secondary';
    newGroupBtn.style.cssText = 'margin-top:6px;padding:6px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-dim);font-size:11px;cursor:pointer;width:100%;text-align:left';
    newGroupBtn.textContent = '+ New Group';
    newGroupBtn.onmouseenter = () => { newGroupBtn.style.borderColor = 'var(--accent)'; newGroupBtn.style.color = 'var(--accent)'; };
    newGroupBtn.onmouseleave = () => { newGroupBtn.style.borderColor = 'var(--border)'; newGroupBtn.style.color = 'var(--text-dim)'; };
    newGroupBtn.onclick = async () => {
      const groupName = await promptInput('Group name:');
      if (!groupName) return;
      // Add to saved section order so it persists
      const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
      if (!savedOrder.includes(groupName)) {
        savedOrder.push(groupName);
        localStorage.setItem('sectionOrder', JSON.stringify(savedOrder));
      }
      // Create a placeholder so the group header renders
      // The group will appear empty until agents are moved into it
      if (!state.emptyGroups) state.emptyGroups = [];
      if (!state.emptyGroups.includes(groupName)) state.emptyGroups.push(groupName);
      renderAgents();
    };
    list.appendChild(newGroupBtn);

    // Engine status summary
    const engineSummary = document.createElement('div');
    engineSummary.style.cssText = 'margin-top:12px;padding:10px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);font-size:12px';
    const engineCounts = {};
    for (const a of state.agents) {
      if (!engineCounts[a.engine]) engineCounts[a.engine] = { total: 0, active: 0, idle: 0, failed: 0 };
      engineCounts[a.engine].total++;
      if (a.state === 'active') engineCounts[a.engine].active++;
      else if (a.state === 'idle') engineCounts[a.engine].idle++;
      else if (a.state === 'failed') engineCounts[a.engine].failed++;
    }
    let engineHtml = '<div style="font-weight:600;margin-bottom:6px;color:var(--text)">Engines</div>';
    for (const engine of ['claude', 'codex', 'opencode']) {
      const c = engineCounts[engine];
      if (!c) {
        engineHtml += `<div style="color:var(--text-dim);margin:2px 0">${engine}: <span style="color:var(--text-dim)">not configured</span></div>`;
      } else {
        const parts = [];
        if (c.active) parts.push(`<span style="color:var(--green)">${c.active} active</span>`);
        if (c.idle) parts.push(`<span style="color:var(--yellow)">${c.idle} idle</span>`);
        if (c.failed) parts.push(`<span style="color:var(--red)">${c.failed} failed</span>`);
        const rest = c.total - c.active - c.idle - c.failed;
        if (rest > 0) parts.push(`${rest} other`);
        engineHtml += `<div style="margin:2px 0">${engine}: ${parts.join(', ')}</div>`;

        // Usage buckets
        const usage = state.engineUsage[engine];
        if (usage && usage.buckets && usage.buckets.length > 0) {
          for (const b of usage.buckets) {
            const barPct = Math.min(100, Math.max(0, b.pctUsed));
            const color = barPct >= 80 ? 'var(--red)' : barPct >= 50 ? 'var(--yellow)' : 'var(--green)';
            engineHtml += `<div style="margin:2px 0 2px 12px;font-size:11px;color:var(--text-dim)">`;
            engineHtml += `${b.label}: `;
            engineHtml += `<span style="display:inline-block;width:60px;height:8px;background:var(--border);border-radius:4px;vertical-align:middle;overflow:hidden">`;
            engineHtml += `<span style="display:block;width:${barPct}%;height:100%;background:${color};border-radius:4px"></span></span>`;
            engineHtml += ` <span style="color:${color}">${b.pctUsed}%</span>`;
            if (b.resetsAt) engineHtml += ` <span style="font-size:10px">(resets ${b.resetsAt})</span>`;
            engineHtml += `</div>`;
          }
          const ago = timeAgo(usage.queriedAt);
          engineHtml += `<div style="margin:1px 0 4px 12px;font-size:10px;color:var(--text-dim)">queried ${ago}</div>`;
        }
      }
    }
    engineSummary.innerHTML = engineHtml;
    list.appendChild(engineSummary);
  }

  function renderThread() {
    // Don't re-render if user is editing a persona — would destroy their work
    if (state.editingPersona && state.threadView === 'persona') return;

    const header = document.getElementById('threadHeader');
    const messages = document.getElementById('threadMessages');
    const personaPanel = document.getElementById('personaPanel');
    const watchPanel = document.getElementById('watchPanel');
    const input = document.getElementById('threadInput');

    // Stop watch polling when leaving the tab
    if (state.watchTimer) {
      clearInterval(state.watchTimer);
      state.watchTimer = null;
    }

    if (!state.selected) {
      header.textContent = 'Select an agent';
      messages.innerHTML = '<div class="thread-empty">Select an agent to view messages</div>';
      personaPanel.style.display = 'none';
      watchPanel.style.display = 'none';
      input.style.display = 'none';
      return;
    }

    const selectedAgent = state.agents.find(a => a.name === state.selected);
    const headerBadge = selectedAgent ? `<span class="state-badge state-${selectedAgent.state}">${selectedAgent.state}</span>` : '';
    const tabs = `<div class="thread-tabs">
      <button class="${state.threadView === 'messages' ? 'active' : ''}" data-tab="messages">Messages</button>
      <button class="${state.threadView === 'persona' ? 'active' : ''}" data-tab="persona">Persona</button>
      <button class="${state.threadView === 'watch' ? 'active' : ''}" data-tab="watch">Watch</button>
      <button class="${state.threadView === 'archive' ? 'active' : ''}" data-tab="archive">Archive</button>
    </div>`;
    const clearBtn = `<button class="clear-chat-btn" id="clearChatBtn" title="Archive chat">\u2715</button>`;
    header.innerHTML = `<button class="mobile-back" id="mobileBackBtn">\u2190</button><span>${esc(state.selected)}</span>${headerBadge}${tabs}${clearBtn}`;
    document.getElementById('mobileBackBtn').onclick = mobileBack;
    document.getElementById('clearChatBtn').onclick = () => archiveChat(state.selected);
    header.querySelectorAll('.thread-tabs button').forEach(btn => {
      btn.onclick = () => { state.editingPersona = false; state.threadView = btn.dataset.tab; renderThread(); };
    });

    const view = state.threadView;
    messages.style.display = (view === 'messages' || view === 'archive') ? 'flex' : 'none';
    personaPanel.style.display = view === 'persona' ? 'block' : 'none';
    watchPanel.style.display = view === 'watch' ? 'flex' : 'none';
    input.style.display = view === 'messages' ? 'flex' : 'none';

    if (view === 'persona') {
      renderPersona();
      return;
    }

    if (view === 'watch') {
      startWatchPolling();
      return;
    }

    if (view === 'archive') {
      renderArchive();
      return;
    }

    const thread = state.threads[state.selected] || [];
    if (thread.length === 0) {
      messages.innerHTML = '<div class="thread-empty">No messages yet</div>';
      return;
    }

    messages.innerHTML = '';
    for (const msg of thread) {
      const div = document.createElement('div');
      const isSystem = msg.message && msg.message.startsWith('[system]');
      const isUpload = msg.topic === 'file-upload' && msg.direction === 'to_agent';
      if (isSystem) {
        div.className = 'msg system-msg';
      } else if (isUpload) {
        div.className = 'msg to-agent file-upload';
      } else {
        div.className = `msg ${msg.direction === 'to_agent' ? 'to-agent' : 'from-agent'}`;
      }
      if (msg.withdrawn) div.classList.add('withdrawn');
      const sender = isSystem ? 'system' : (msg.direction === 'to_agent' ? 'you' : state.selected);
      const time = new Date(msg.createdAt).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const topicStr = (!isUpload && msg.topic) ? ` (re: ${esc(msg.topic)})` : '';
      const displayMsg = isSystem ? msg.message.replace(/^\[system\]\s*/, '') : msg.message;
      const statusHtml = (msg.direction === 'to_agent' && msg.queueId)
        ? `<span class="msg-status ${msg.deliveryStatus || 'pending'}" data-queue-id="${msg.queueId}">${
            msg.deliveryStatus === 'delivered' ? '\u2713 delivered' :
            msg.deliveryStatus === 'failed' ? '\u2717 failed' :
            '\u2022\u2022\u2022 sending'
          }</span>`
        : '';
      const canWithdraw = msg.direction === 'to_agent' && !isSystem && !msg.withdrawn;
      const withdrawHtml = canWithdraw ? `<span class="msg-withdraw" data-msg-id="${msg.id}" title="Withdraw message">unsend</span>` : '';
      const headerHtml = `<div class="msg-header"><span class="msg-sender">${esc(sender)}${topicStr}</span><span class="msg-meta">${withdrawHtml}<span class="msg-time">${time}</span>${statusHtml}</span></div>`;
      if (isUpload) {
        div.innerHTML = `${headerHtml}<div class="file-info"><span class="file-icon">&#128206;</span> ${esc(displayMsg)}</div>`;
      } else {
        div.innerHTML = `${headerHtml}<div class="msg-body">${renderMarkdown(esc(displayMsg))}</div>`;
      }
      messages.appendChild(div);
    }
    messages.scrollTop = messages.scrollHeight;
  }

  function selectAgent(name) {
    state.editingPersona = false;
    // Save draft for previous agent
    const input = document.getElementById('msgInput');
    if (state.selected && input) {
      const text = input.value;
      if (text) state.drafts[state.selected] = text;
      else delete state.drafts[state.selected];
    }
    state.selected = name;
    state.unread[name] = 0;
    // Preserve current tab (messages/persona/watch) when switching agents
    renderAgents();
    renderThread();
    // Restore draft for new agent (re-query since renderThread rebuilds DOM)
    const freshInput = document.getElementById('msgInput');
    if (freshInput) {
      freshInput.value = state.drafts[name] || '';
      freshInput.style.height = 'auto';
      freshInput.style.height = freshInput.scrollHeight + 'px';
    }
    updateSendability();
    // Mobile: show thread panel
    document.querySelector('.layout').classList.add('mobile-thread');
    freshInput?.focus();
  }

  function mobileBack() {
    document.querySelector('.layout').classList.remove('mobile-thread');
  }

  async function fetchPersona(name) {
    const cached = state.personaCache[name];
    if (cached && Date.now() - cached.fetched < 30000) return cached.data;
    try {
      const token = getToken();
      const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
      const res = await fetch(`/api/personas/${encodeURIComponent(name)}`, { headers });
      if (res.status === 404) {
        state.personaCache[name] = { data: null, fetched: Date.now() };
        return null;
      }
      if (!res.ok) return null;
      const data = await res.json();
      state.personaCache[name] = { data, fetched: Date.now() };
      return data;
    } catch {
      return null;
    }
  }

  const FM_LABELS = {
    engine: 'Engine', model: 'Model', thinking: 'Thinking',
    cwd: 'Working Dir', proxy_host: 'Proxy Host', permissions: 'Permissions',
  };

  async function renderPersona() {
    const panel = document.getElementById('personaPanel');
    if (!state.selected) return;
    panel.innerHTML = '<div class="persona-empty">Loading…</div>';
    const data = await fetchPersona(state.selected);
    if (state.threadView !== 'persona' || !state.selected) return;
    if (!data) {
      panel.innerHTML = '<div class="persona-empty">No persona defined for this agent.<br>Create <code>persistent-agents/' + esc(state.selected) + '.md</code> to add one.</div>';
      return;
    }
    let html = '<div style="display:flex;justify-content:flex-end;margin-bottom:8px"><button class="clear-chat-btn" id="editPersonaBtn">Edit</button></div>';
    const fm = data.frontmatter;
    if (fm && Object.keys(fm).length > 0) {
      html += '<dl class="persona-meta">';
      for (const [key, label] of Object.entries(FM_LABELS)) {
        if (fm[key]) html += '<dt>' + label + '</dt><dd>' + esc(fm[key]) + '</dd>';
      }
      for (const key of Object.keys(fm)) {
        if (!FM_LABELS[key] && fm[key]) html += '<dt>' + esc(key) + '</dt><dd>' + esc(fm[key]) + '</dd>';
      }
      html += '</dl>';
    }
    if (data.body) {
      html += '<div class="persona-body">' + renderMarkdown(esc(data.body)) + '</div>';
    }
    panel.innerHTML = html || '<div class="persona-empty">Persona file is empty.</div>';
    const editBtn = document.getElementById('editPersonaBtn');
    if (editBtn) {
      editBtn.onclick = () => enterPersonaEdit(state.selected, data.content);
    }
  }

  // ── Watch View ──

  async function fetchPaneOutput(agentName) {
    try {
      const resp = await fetch(`/api/agents/${encodeURIComponent(agentName)}/peek`, {
        headers: getToken() ? { 'Authorization': `Bearer ${getToken()}` } : {},
      });
      if (!resp.ok) return null;
      const data = await resp.json();
      return data.output ?? null;
    } catch { return null; }
  }

  function startWatchPolling() {
    const panel = document.getElementById('watchPanel');
    if (!state.selected) return;

    const keyButtons = [
      { label: '\u2191', key: 'Up' },
      { label: '\u2193', key: 'Down' },
      { label: '\u2190', key: 'Left' },
      { label: '\u2192', key: 'Right' },
      { label: '\u232b', key: 'BSpace' },
      { label: 'Enter', key: 'Enter' },
      { label: 'Esc', key: 'Escape' },
      { label: 'q', key: 'q' },
      { label: 'Tab', key: 'Tab' },
      { label: 'Space', key: 'Space' },
      { label: 'y', key: 'y' },
      { label: 'n', key: 'n' },
    ];

    const keysHtml = keyButtons.map(b =>
      `<button data-key="${b.key}" title="Send ${b.key}">${b.label}</button>`
    ).join('');

    panel.innerHTML = `
      <div class="watch-output"><div class="watch-status">Connecting...</div></div>
      <div class="watch-keys">${keysHtml}</div>
      <div class="watch-type">
        <input type="text" class="watch-type-input" placeholder="Type literal text..." />
        <button class="watch-type-send" title="Send text (no Enter)">Send</button>
        <button class="watch-type-enter" title="Send text + Enter">Send+\u21b5</button>
      </div>
    `;

    const outputEl = panel.querySelector('.watch-output');

    // Key button handlers
    panel.querySelector('.watch-keys').addEventListener('click', async (e) => {
      const btn = e.target.closest('button[data-key]');
      if (!btn || !state.selected) return;
      const key = btn.dataset.key;
      try {
        await fetch(`/api/agents/${encodeURIComponent(state.selected)}/keys`, {
          method: 'POST',
          headers: { 'content-type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ keys: key }),
        });
      } catch (err) {
        console.error('[watch] Key send failed:', err);
      }
    });

    // Literal text input handlers
    const typeInput = panel.querySelector('.watch-type-input');
    const typeSend = panel.querySelector('.watch-type-send');
    const typeEnter = panel.querySelector('.watch-type-enter');

    async function sendLiteral(pressEnter) {
      const text = typeInput.value;
      if (!text || !state.selected) return;
      try {
        await fetch(`/api/agents/${encodeURIComponent(state.selected)}/type`, {
          method: 'POST',
          headers: { 'content-type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ text, pressEnter }),
        });
        typeInput.value = '';
      } catch (err) {
        console.error('[watch] Type send failed:', err);
      }
    }

    typeSend.addEventListener('click', () => sendLiteral(false));
    typeEnter.addEventListener('click', () => sendLiteral(true));
    typeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        sendLiteral(e.shiftKey ? false : true);
      }
    });

    async function poll() {
      if (state.threadView !== 'watch' || !state.selected) return;
      const output = await fetchPaneOutput(state.selected);
      if (state.threadView !== 'watch' || !state.selected) return;
      if (output === null) {
        outputEl.innerHTML = '<div class="watch-status">Agent has no active session</div>';
      } else {
        const now = new Date().toLocaleTimeString();
        const wasAtBottom = outputEl.scrollTop + outputEl.clientHeight >= outputEl.scrollHeight - 20;
        outputEl.innerHTML = `<div class="watch-status">Last capture: ${now}</div>${esc(output)}`;
        if (wasAtBottom) outputEl.scrollTop = outputEl.scrollHeight;
      }
    }

    poll().then(() => { outputEl.scrollTop = outputEl.scrollHeight; });
    state.watchTimer = setInterval(poll, 3000);
  }

  function enterPersonaEdit(agentName, rawContent) {
    state.editingPersona = true;
    const panel = document.getElementById('personaPanel');
    panel.innerHTML = `
      <div style="display:flex;flex-direction:column;height:100%;padding:0">
        <div style="display:flex;gap:8px;padding:8px 0;align-items:center">
          <button class="clear-chat-btn" id="cancelEditBtn">Cancel</button>
          <button id="savePersonaBtn" style="padding:4px 12px;border:none;border-radius:4px;background:var(--green);color:#fff;font-size:12px;cursor:pointer">Save</button>
          <span id="personaSaveStatus" style="font-size:11px;color:var(--text-dim)"></span>
        </div>
        <textarea id="personaEditor" style="flex:1;width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:4px;padding:12px;font-family:monospace;font-size:12px;resize:none;outline:none;box-sizing:border-box">${esc(rawContent || '')}</textarea>
      </div>
    `;
    document.getElementById('cancelEditBtn').onclick = () => {
      state.editingPersona = false;
      delete state.personaCache[agentName];
      renderPersona();
    };
    document.getElementById('savePersonaBtn').onclick = async () => {
      const content = document.getElementById('personaEditor').value;
      const statusEl = document.getElementById('personaSaveStatus');
      try {
        const res = await fetch(`/api/personas/${encodeURIComponent(agentName)}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ content }),
        });
        if (res.status === 401) { handleAuthError(); return; }
        if (res.ok) {
          statusEl.style.color = 'var(--green)';
          statusEl.textContent = '\u2713 Saved — changes take effect when the agent restarts';
          delete state.personaCache[agentName];
        } else {
          const err = await res.json().catch(() => ({}));
          statusEl.style.color = 'var(--red)';
          statusEl.textContent = '\u2717 ' + (err.error || 'Save failed');
        }
      } catch (err) {
        statusEl.style.color = 'var(--red)';
        statusEl.textContent = '\u2717 Save failed';
      }
    };
  }

  // ── Toast ──
  function showToast(message, type = 'error') {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.className = `toast ${type}`;
    t.textContent = message;
    document.body.appendChild(t);
    setTimeout(() => t.remove(), 3000);
  }

  // ── Send enable/disable based on agent state ──
  const CANT_RECEIVE = new Set(['void', 'failed', 'spawning']);

  function updateSendability() {
    const msgInput = document.getElementById('msgInput');
    const sendBtn = document.getElementById('sendBtn');
    const uploadBtn = document.getElementById('uploadBtn');
    if (!state.selected) return;
    const agent = state.agents.find(a => a.name === state.selected);
    const blocked = agent && CANT_RECEIVE.has(agent.state);
    sendBtn.disabled = blocked;
    const fileInput = document.getElementById('fileInput');
    fileInput.disabled = blocked;
    uploadBtn.classList.toggle('disabled', !!blocked);
    msgInput.disabled = blocked;
    msgInput.placeholder = blocked
      ? `Agent is ${agent ? agent.state : 'unavailable'} — cannot receive messages`
      : 'Type a message...';
  }

  // ── Queue Updates ──
  function handleQueueUpdate(message) {
    // Update delivery status in thread data
    const thread = state.threads[message.targetAgent];
    if (thread) {
      for (const msg of thread) {
        if (msg.queueId === message.id) {
          msg.deliveryStatus = message.status;
          break;
        }
      }
    }

    // Update inline status badge in DOM
    const badge = document.querySelector(`[data-queue-id="${message.id}"]`);
    if (badge) {
      badge.className = `msg-status ${message.status}`;
      badge.textContent = message.status === 'delivered' ? '\u2713 delivered' :
                          message.status === 'failed' ? '\u2717 failed' :
                          '\u2022\u2022\u2022 sending';
    }
  }

  // ── Prompt Dialog (themed replacement for browser prompt()) ──
  function promptInput(label, defaultValue) {
    return new Promise((resolve) => {
      const overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML = `
        <div class="confirm-box">
          <p>${esc(label)}</p>
          <input type="text" value="${esc(defaultValue || '')}" style="width:100%;padding:6px 10px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:13px;box-sizing:border-box;margin-bottom:16px" autocomplete="off" />
          <div class="actions">
            <button class="cancel-btn">Cancel</button>
            <button class="danger-btn" style="background:var(--accent);border-color:var(--accent)">OK</button>
          </div>
        </div>
      `;
      const input = overlay.querySelector('input');
      const submit = () => { const v = input.value.trim(); overlay.remove(); resolve(v || null); };
      overlay.querySelector('.cancel-btn').onclick = () => { overlay.remove(); resolve(null); };
      overlay.querySelector('.danger-btn').onclick = submit;
      input.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') submit();
        if (e.key === 'Escape') { overlay.remove(); resolve(null); }
      });
      overlay.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { overlay.remove(); resolve(null); }
      });
      document.body.appendChild(overlay);
      input.focus();
      input.select();
    });
  }

  // ── Confirm Dialog ──
  function confirmAction(message) {
    return new Promise((resolve) => {
      const overlay = document.createElement('div');
      overlay.className = 'confirm-overlay';
      overlay.innerHTML = `
        <div class="confirm-box">
          <p>${esc(message)}</p>
          <div class="actions">
            <button class="cancel-btn">Cancel</button>
            <button class="danger-btn">Confirm</button>
          </div>
        </div>
      `;
      overlay.querySelector('.cancel-btn').onclick = () => { overlay.remove(); resolve(false); };
      overlay.querySelector('.danger-btn').onclick = () => { overlay.remove(); resolve(true); };
      overlay.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') { overlay.remove(); resolve(false); }
      });
      document.body.appendChild(overlay);
      overlay.querySelector('.danger-btn').focus();
    });
  }

  const DESTRUCTIVE_ACTIONS = new Set(['kill', 'destroy']);
  const ACTION_LABELS = { kill: 'Kill', destroy: 'Destroy', suspend: 'Suspend', resume: 'Resume', interrupt: 'Interrupt', compact: 'Compact', spawn: 'Spawn' };

  // ── Actions ──
  async function agentAction(name, act) {
    if (DESTRUCTIVE_ACTIONS.has(act)) {
      const confirmed = await confirmAction(`${ACTION_LABELS[act] || act} agent "${name}"? This cannot be undone.`);
      if (!confirmed) return;
    }

    try {
      const res = await fetch(`/api/agents/${encodeURIComponent(name)}/${act}`, {
        method: 'POST',
        headers: authHeaders(),
      });
      if (res.status === 401) { handleAuthError(); return; }
      if (!res.ok) {
        let msg = `Action "${act}" failed (HTTP ${res.status})`;
        try {
          const body = await res.json();
          if (body && body.error) msg = body.error;
        } catch (_) {}
        showToast(msg, 'error');
      } else {
        showToast(`${ACTION_LABELS[act] || act}: ${name}`, 'success');
      }
    } catch (err) {
      console.error(`Action ${act} failed:`, err);
      showToast(`Action "${act}" failed — network error`, 'error');
    }
  }

  // ── Group Management ──
  async function renameGroup(oldName, newName) {
    // Update all agents in this group
    const agents = state.agents.filter(a => (a.agentGroup || 'General') === oldName);
    for (const agent of agents) {
      agent.agentGroup = newName;
      fetch(`/api/agents/${encodeURIComponent(agent.name)}/group`, {
        method: 'PATCH',
        headers: { 'content-type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ group: newName }),
      }).catch(err => console.error('[group] Rename failed for', agent.name, err));
    }
    // Update saved section order
    const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
    const idx = savedOrder.indexOf(oldName);
    if (idx !== -1) savedOrder[idx] = newName;
    localStorage.setItem('sectionOrder', JSON.stringify(savedOrder));
    // Update empty groups
    if (state.emptyGroups) {
      const ei = state.emptyGroups.indexOf(oldName);
      if (ei !== -1) state.emptyGroups[ei] = newName;
    }
    renderAgents();
  }

  async function deleteGroup(groupName) {
    // Move all agents in this group back to General
    const agents = state.agents.filter(a => (a.agentGroup || 'General') === groupName);
    for (const agent of agents) {
      agent.agentGroup = null;
      fetch(`/api/agents/${encodeURIComponent(agent.name)}/group`, {
        method: 'PATCH',
        headers: { 'content-type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ group: '' }),
      }).catch(err => console.error('[group] Delete-move failed for', agent.name, err));
    }
    // Remove from saved section order
    const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
    const idx = savedOrder.indexOf(groupName);
    if (idx !== -1) savedOrder.splice(idx, 1);
    localStorage.setItem('sectionOrder', JSON.stringify(savedOrder));
    // Remove from empty groups
    if (state.emptyGroups) {
      state.emptyGroups = state.emptyGroups.filter(g => g !== groupName);
    }
    renderAgents();
  }

  // Event delegation on agent list — handles both card selection and action buttons.
  function handleAgentListEvent(e) {
    // Ignore taps on drag handle (mobile touch-drag)
    if (e.target.closest('.drag-handle')) return;

    const btn = e.target.closest('button[data-action]');
    if (btn) {
      e.stopPropagation();
      if (btn.classList.contains('loading')) return;
      const card = btn.closest('[data-agent]');
      if (card) {
        btn.classList.add('loading');
        agentAction(card.dataset.agent, btn.dataset.action)
          .finally(() => btn.classList.remove('loading'));
      }
      return;
    }
    const card = e.target.closest('[data-agent]');
    if (card) selectAgent(card.dataset.agent);
  }
  document.getElementById('agentList').addEventListener('click', handleAgentListEvent);
  document.getElementById('agentList').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') {
      e.preventDefault();
      handleAgentListEvent(e);
    }
  });

  let draggedAgent = null;
  let draggedGroup = null;
  const agentListEl = document.getElementById('agentList');

  function clearDragIndicators() {
    agentListEl.querySelectorAll('.drag-over-above, .drag-over-below, .drag-over').forEach(el => {
      el.classList.remove('drag-over-above', 'drag-over-below', 'drag-over');
    });
  }

  agentListEl.addEventListener('dragstart', (e) => {
    const card = e.target.closest('.agent-card[data-agent]');
    const header = e.target.closest('.agent-group-header[data-group]');
    if (card) {
      draggedAgent = card.dataset.agent;
      draggedGroup = null;
      card.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedAgent);
    } else if (header) {
      draggedGroup = header.dataset.group;
      draggedAgent = null;
      header.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedGroup);
    }
  });

  agentListEl.addEventListener('dragend', (e) => {
    const el = e.target.closest('.agent-card, .agent-group-header');
    if (el) el.classList.remove('dragging');
    clearDragIndicators();
    draggedAgent = null;
    draggedGroup = null;
  });

  agentListEl.addEventListener('dragover', (e) => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    clearDragIndicators();

    const header = e.target.closest('.agent-group-header[data-group]');
    const card = e.target.closest('.agent-card[data-agent]');

    if (draggedAgent && header) {
      // Agent dragged over a section header → highlight for group change
      header.classList.add('drag-over');
    } else if (draggedAgent && card && card.dataset.agent !== draggedAgent) {
      // Agent dragged over another agent → reorder indicator
      const rect = card.getBoundingClientRect();
      card.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
    } else if (draggedGroup && header && header.dataset.group !== draggedGroup) {
      // Section header dragged over another section header → reorder indicator
      const rect = header.getBoundingClientRect();
      header.classList.add(e.clientY < rect.top + rect.height / 2 ? 'drag-over-above' : 'drag-over-below');
    }
  });

  agentListEl.addEventListener('dragleave', (e) => {
    const el = e.target.closest('.agent-card, .agent-group-header');
    if (el) el.classList.remove('drag-over-above', 'drag-over-below', 'drag-over');
  });

  agentListEl.addEventListener('drop', (e) => {
    e.preventDefault();
    clearDragIndicators();

    const targetHeader = e.target.closest('.agent-group-header[data-group]');
    const targetCard = e.target.closest('.agent-card[data-agent]');

    // Case 1: Agent dropped on a section header → change group
    if (draggedAgent && targetHeader) {
      const newGroup = targetHeader.dataset.group;
      const agent = state.agents.find(a => a.name === draggedAgent);
      if (agent && (agent.agentGroup || 'General') !== newGroup) {
        agent.agentGroup = newGroup === 'General' ? null : newGroup;
        renderAgents();
        fetch(`/api/agents/${encodeURIComponent(draggedAgent)}/group`, {
          method: 'PATCH',
          headers: { 'content-type': 'application/json', ...authHeaders() },
          body: JSON.stringify({ group: newGroup === 'General' ? '' : newGroup }),
        }).catch(err => console.error('[drag] Group change failed:', err));
      }
      return;
    }

    // Case 2: Agent dropped on another agent → reorder within list
    if (draggedAgent && targetCard && targetCard.dataset.agent !== draggedAgent) {
      const rect = targetCard.getBoundingClientRect();
      const insertBefore = e.clientY < rect.top + rect.height / 2;
      const fromIdx = state.agents.findIndex(a => a.name === draggedAgent);
      const targetName = targetCard.dataset.agent;
      if (fromIdx === -1) return;
      const [moved] = state.agents.splice(fromIdx, 1);
      let toIdx = state.agents.findIndex(a => a.name === targetName);
      if (!insertBefore) toIdx++;
      state.agents.splice(toIdx, 0, moved);

      const orders = state.agents.map((a, i) => ({ name: a.name, sortOrder: i }));
      state.agents.forEach((a, i) => { a.sortOrder = i; });
      renderAgents();

      fetch('/api/agents/reorder', {
        method: 'POST',
        headers: { 'content-type': 'application/json', ...authHeaders() },
        body: JSON.stringify({ orders }),
      }).catch(err => console.error('[drag] Reorder save failed:', err));
      return;
    }

    // Case 3: Section header dropped on another section header → reorder sections
    if (draggedGroup && targetHeader && targetHeader.dataset.group !== draggedGroup) {
      const savedOrder = JSON.parse(localStorage.getItem('sectionOrder') || '[]');
      // Build current order from DOM
      const headers = agentListEl.querySelectorAll('.agent-group-header[data-group]');
      const currentOrder = [...headers].map(h => h.dataset.group);
      // Ensure all groups are in the order list
      for (const g of currentOrder) {
        if (!savedOrder.includes(g)) savedOrder.push(g);
      }
      // Move dragged group
      const fromIdx = savedOrder.indexOf(draggedGroup);
      if (fromIdx !== -1) savedOrder.splice(fromIdx, 1);
      const rect = targetHeader.getBoundingClientRect();
      let targetIdx = savedOrder.indexOf(targetHeader.dataset.group);
      if (e.clientY >= rect.top + rect.height / 2) targetIdx++;
      savedOrder.splice(targetIdx, 0, draggedGroup);
      localStorage.setItem('sectionOrder', JSON.stringify(savedOrder));
      renderAgents();
    }
  });

  // ── Touch Drag (mobile) ──
  let touchDragState = null;

  agentListEl.addEventListener('touchstart', (e) => {
    const handle = e.target.closest('.drag-handle');
    if (!handle) return;
    const card = handle.closest('.agent-card[data-agent]');
    if (!card) return;
    e.preventDefault();
    const touch = e.touches[0];
    const rect = card.getBoundingClientRect();
    touchDragState = {
      agentName: card.dataset.agent,
      offsetY: touch.clientY - rect.top,
      clone: null,
      startY: touch.clientY,
    };
    // Create floating clone
    const clone = card.cloneNode(true);
    clone.style.cssText = `position:fixed;left:${rect.left}px;top:${rect.top}px;width:${rect.width}px;opacity:0.85;z-index:1000;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,0.5);border-color:var(--accent)`;
    document.body.appendChild(clone);
    touchDragState.clone = clone;
    card.style.opacity = '0.3';
  }, { passive: false });

  agentListEl.addEventListener('touchmove', (e) => {
    if (!touchDragState) return;
    e.preventDefault();
    const touch = e.touches[0];
    if (touchDragState.clone) {
      touchDragState.clone.style.top = (touch.clientY - touchDragState.offsetY) + 'px';
    }
    // Show drop indicators
    clearDragIndicators();
    const el = document.elementFromPoint(touch.clientX, touch.clientY);
    if (!el) return;
    const header = el.closest('.agent-group-header[data-group]');
    const targetCard = el.closest('.agent-card[data-agent]');
    if (header) {
      header.classList.add('drag-over');
    } else if (targetCard && targetCard.dataset.agent !== touchDragState.agentName) {
      const rect = targetCard.getBoundingClientRect();
